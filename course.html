## 【学习目标】

通过本课程学习，学员将全面了解陪诊行业的起源与发展现状，明确陪诊师的职业定位与服务范围，掌握市场需求与就业前景，规划个人职业发展路径。

---

## 第一章 行业起源与发展现状

陪诊行业的兴起并非偶然，而是多重社会因素共同作用的结果。首先，陪诊服务并非新兴行业，但其规模化、职业化发展是近十年的产物。其次，从发展脉络来看，行业经历了从萌芽到规范的完整演进过程。**萌芽阶段（2000-2010年）**主要表现为"黄牛代挂号"形式，服务内容单一，从业者多为个体人员，缺乏规范管理和专业培训，服务对象主要是外地来大城市就医的患者。**起步阶段（2010-2015年）**随着医疗资源分配不均问题日益凸显，以及人口老龄化进程加快，专业陪诊服务开始出现，一些家政公司、养老服务机构开始将陪诊作为增值服务项目。**发展阶段（2015-2020年）**互联网平台的兴起推动了陪诊行业的快速发展，各类陪诊APP、小程序相继上线，陪诊师开始向职业化、专业化方向发展，新冠疫情的爆发更是加速了行业发展，医院防控措施严格，家属陪同受限，陪诊服务需求大幅增长。**规范阶段（2020年至今）**行业规模快速扩大的同时，各地开始出台相关规范标准，从业人员培训体系逐步建立，行业协会陆续成立，陪诊服务向规范化、标准化方向迈进。

陪诊行业的兴起受到多方面因素的驱动。**人口结构变化**是最根本的驱动力，第七次全国人口普查数据显示，我国60岁及以上人口已达2.64亿，占总人口的18.70%，老年人就医需求大但行动不便，是陪诊服务的主要群体。**家庭结构小型化**加剧了陪诊需求的增长，421家庭结构已成为主流，独生子女家庭难以兼顾工作和照顾老人就医，据统计，一线城市双职工家庭中超过60%无法陪同老人定期就医。**医疗资源集中**也是重要因素，优质医疗资源主要集中在一二线城市，以北京为例，三甲医院占全国的7%，但承担了全国15%的疑难重症诊疗任务，异地就医患者占比高达40%，这些患者对陪诊服务需求强烈。**社会分工精细化**方面，随着经济发展和生活水平提高，人们更愿意为专业服务付费，时间成本成为都市人群的重要考量，陪诊服务能够有效节省就医时间成本。**医疗服务复杂性增加**体现在现代医院科室细分、检查项目繁多、智能设备普及，对于老年人、外地患者来说，就医流程日益复杂，需要专业人员引导。

---

当前陪诊服务行业发展势头强劲，市场规模持续扩大。据行业研究数据显示，2023年中国陪诊服务市场规模已突破300亿元，年增长率保持在35%以上，预计到2025年市场规模将达到500亿元。从**区域分布特征**来看，一线城市北京、上海、广州、深圳四个城市市场规模占全国的42%，服务体系相对成熟；新一线城市杭州、成都、重庆、西安等增长迅速，年增长率超过50%；二三线城市市场处于起步阶段但增长潜力巨大。从**服务价格区间**来看，基础陪诊服务为200-500元/半天，全程陪诊服务为400-800元/全天，异地陪诊服务为800-2000元/天（含差旅），专项服务（代问诊、取报告等）为100-300元/次。

行业发展呈现多个显著特点。**服务主体多元化**方面，目前陪诊服务提供者主要包括专业陪诊公司（约占市场份额的30%，规模较大，服务规范）、个体陪诊师（约占50%，通过平台接单或熟人介绍）、家政/养老机构衍生服务（约占15%，作为增值服务）、医院志愿者队伍（约占5%，提供公益性服务）。**服务内容扩展化**体现在从最初的排队挂号、陪同就诊，扩展到诊前咨询、预约专家、病历整理、检查陪同、取药送药、诊后随访、康复指导等全流程服务。**技术赋能明显**体现在互联网平台、大数据、人工智能等技术正在重塑行业，智能分诊系统、在线预约平台、服务质量管理系统等技术应用日益广泛。**规范化进程加速**体现在部分地区已出台地方标准，如上海市《陪诊服务规范》、广东省《陪诊人员服务指南》等，中国生命关怀协会等行业组织正在推动国家标准的制定。

然而，行业在快速发展的同时也存在一些问题需要关注。**准入门槛低**是首要问题，目前行业尚无统一的准入标准，从业人员素质参差不齐，部分人员缺乏专业培训。**服务标准不一**表现为服务内容、收费标准、质量评估缺乏统一规范，消费者权益保障不足。**法律边界模糊**体现在陪诊师的权责界定、医疗风险分担、隐私保护等方面的法律法规尚不完善。**社会认知不足**表现为部分人对陪诊服务存在误解，将其等同于"黄牛"，行业社会认可度有待提高。

---

### 【本章小结】

陪诊行业是医疗服务体系市场化分工的必然产物，在人口老龄化、家庭小型化、医疗资源集中的大背景下快速发展。当前行业正处于快速成长期，市场规模持续扩大，但也面临规范化不足的挑战。未来随着行业标准的建立和监管的完善，行业将向专业化、品牌化方向发展。

## 第二章 陪诊师的定义与职业定位

陪诊师作为一个新兴职业，有着明确的行业标准定义。根据行业共识，陪诊师是指接受过专业培训，具备一定医疗知识和服务技能，在患者就医过程中提供陪同、引导、协助等专业服务的人员。与传统意义上的"陪同就医"不同，专业陪诊师具有四个显著特征。首先是**专业性**，专业陪诊师经过系统培训，掌握医疗常识、沟通技巧、服务流程。其次是**职业性**，专业陪诊师以此为职业，收取合理报酬，承担相应责任。再次是**规范性**，专业陪诊师遵循服务标准和操作流程，有质量保障。最后是**中立性**，专业陪诊师不介入医疗决策，不提供诊疗建议，仅提供服务支持。

明确陪诊师与相关职业的区别对于准确理解这一职业非常重要。**与护士的区别**主要体现在三个方面：护士具备执业资格可从事护理操作，而陪诊师无需执业资格主要提供服务支持；护士工作场所在医疗机构内，陪诊师服务范围更广泛。**与护工的区别**在于护工主要提供生活护理侧重日常照料，陪诊师侧重就医过程中的专业服务支持；护工服务时间较长，陪诊师服务以单次就医为主。**与志愿者的区别**体现在志愿者提供无偿服务，陪诊师提供有偿服务；志愿者服务具有随机性，陪诊师服务具有专业性和持续性。**与黄牛的本质区别**在于黄牛通过倒号获利扰乱医疗秩序，而陪诊师通过提供专业服务创造价值，陪诊师的核心是服务而非倒号。

陪诊师在医疗服务体系中扮演着多重职业角色。**就医导航员**的角色帮助患者在复杂的医疗体系中找到正确的路径，选择合适的医院、科室和医生。**沟通协调者**的角色在医患之间搭建沟通桥梁，帮助患者准确表达病情，理解医生的诊疗建议。**服务支持者**的角色提供就医全过程的事务性服务，包括预约、排队、取药、办理手续等。**情感陪伴者**的角色给予患者心理支持和情感陪伴，缓解就医过程中的焦虑和不安。**健康管理者**的角色协助患者整理病历资料，记录医嘱，提醒用药和复诊。

陪诊师职业价值主要体现在四个维度。**时间价值**体现在帮助患者节省大量时间成本，据统计一次普通门诊就医平均耗时3-4小时，有陪诊师陪同可缩短至1-2小时。**专业价值**体现在通过专业知识提高就医效率避免走弯路，据行业数据有陪诊师陪同的患者检查项目完成率提高30%，复诊准确率提高25%。**情感价值**体现在减轻患者及家属的心理负担，调查显示85%的患者认为有陪诊师陪同就医时焦虑感明显降低。**社会价值**体现在优化医疗资源配置提高医院运行效率，陪诊师的专业引导有助于减少患者的无效流动，缓解医院人流压力。

从事陪诊师职业需要具备多方面的综合能力。**专业知识能力**包括基础医学知识、医院科室设置与就医流程、常见疾病认知、基本急救知识等。**沟通表达能力**涵盖与患者的沟通能力、与医护人员的沟通能力、跨文化沟通能力、冲突协调能力。**服务执行能力**包括时间管理与统筹能力、突发事件应变能力、信息整合与处理能力、细节关注能力。**职业素养能力**涵盖责任心与同理心、保密意识与职业道德、抗压能力与情绪管理、持续学习能力。

陪诊师是一个具有明确定义和职业边界的新兴职业，其核心价值在于通过专业服务为患者创造时间价值、专业价值和情感价值。优秀的陪诊师需要具备医学、沟通、服务等多方面的综合能力。

## 第三章 服务对象与适用人群

陪诊服务的核心人群是**老年人群体（60岁以上）**，约占服务总量的60%。这一群体具有鲜明特点和迫切需求：行动不便需要协助移动和办理手续；听力视力下降需要帮助沟通和理解；记忆力减退需要提醒注意事项和用药；多患有慢性病就医频率高；对智能设备不熟悉需要协助操作。以张阿姨为例，72岁患有糖尿病和高血压，子女在外地工作，每月需要定期到医院复诊取药，医院全面推行智能预约后张阿姨不会操作手机挂号，每次都要提前两小时到医院排队还经常挂不到号，聘请陪诊师后陪诊师提前为她预约好专家号，当天陪同就诊帮助她与医生沟通记录医嘱取好药品送回家，张阿姨说"有了陪诊师，看病再也不是难题了"，这个案例充分说明了陪诊服务对老年人的重要性。

**中青年群体（18-60岁）**约占服务总量的25%，是快速增长的群体。这一人群的特点和需求包括：工作繁忙时间成本高；注重效率希望快速完成就医；信息获取能力强但医疗信息辨别能力有限；对服务质量要求高；愿意为优质服务付费。以李先生为例，35岁互联网公司高管工作繁忙，体检发现肺部结节需要进一步检查但他连半天时间都抽不出来，陪诊师代为完成了CT检查预约、缴费、取报告，并携带影像资料找专家代问诊，将专家意见和下一步建议整理成书面报告发给李先生，整个过程李先生只花了15分钟视频沟通时间，充分体现了陪诊服务为中青年群体节省时间价值。**儿童与青少年群体（0-18岁）**约占服务总量的10%，其需求特点是需要家长陪同但家长可能缺乏经验；儿科就医人数多等待时间长；儿童表述能力有限需要协助沟通病情；容易产生恐惧和抵触情绪。**孕妇群体**约占服务总量的5%属于专项服务，需求特点包括行动不便需要细心照顾；孕检项目多流程复杂；情绪敏感需要心理支持；丈夫可能无法每次陪同。

从地域维度来看，**本地就医患者**约占服务总量的65%，其需求特点主要是老人和行动不便者；需要定期复诊服务；对医院有一定了解但流程不熟悉；服务频率较高容易形成长期合作。**异地就医患者**约占服务总量的35%是高价值客群，其需求特点包括对就医城市完全陌生；需要全方位的服务支持；住宿、交通等延伸需求；单次服务金额高；对陪诊师的依赖度高。

从健康状况维度划分，**慢性病患者**就医频率高需要长期服务，检查项目固定流程相对固定，需要定期取药和复诊提醒，容易建立长期服务关系。**急性病患者**就医紧迫性强情绪焦虑需要安抚，对就医流程不熟悉，服务一次性特征明显。**重症/绝症患者**需要更多的情感支持，服务难度大风险高，需要与家属密切配合，对陪诊师的专业要求高。**健康体检人群**服务需求相对简单，注重效率和舒适度，报告解读需求强烈，容易转化为长期客户。

精准识别目标客户是提供优质服务的基础。**异地就医的中年患者家属**是黄金客户群体，年龄35-50岁年收入20万以上，痛点是家人在大城市就医自己无法陪同、对大城市医院不熟悉、担心家人单独就医出问题，需求是全程陪同食宿安排专家预约病情沟通，愿意为优质服务支付溢价，单次消费高转介绍率高。**独居的高知老年女性**同样是黄金客户，年龄65-80岁退休金较高经济独立，痛点是子女不在身边行动不便害怕独自去医院，需求是定期陪同就医取药报告解读情感陪伴，价格敏感度低看重服务质量，复购率高服务稳定。**高收入忙碌的都市白领**年龄25-40岁年收入30万以上，痛点是工作太忙没时间排队讨厌医院复杂流程，需求是代挂号代问诊取报告优先安排时间管理，愿意为时间付费，单次消费中等频次不稳定。**孕晚期的职业女性**年龄28-35岁中等偏上收入，痛点是行动不便丈夫经常出差产检项目多时间长，需求是陪同产检排队缴费安抚情绪记录医嘱，看重服务细心程度，服务周期固定容易延伸至产后服务。

在实际工作中，陪诊师需要学会识别和婉拒某些类型的客户。**医疗需求过于复杂的患者**需要谨慎评估，包括需要特殊医疗护理的重症患者、精神疾病或认知障碍严重且无家属陪同的患者、传染病急性期患者。**期望值过高的客户**也需要特别注意，如要求保证挂号成功特别是热门专家、要求干预医疗决策、要求承诺治疗效果、对服务价格过度敏感且要求过多。**风险过高的服务场景**应当避免或婉拒，包括夜间单独陪同女性患者、需要在家留宿的服务、需要垫付大额医疗费用、涉及法律纠纷的服务。

陪诊师的服务对象广泛，覆盖各个年龄段和人群。其中老年人、异地就医者、忙碌的中青年人是核心客群。精准识别目标客户，了解其需求特点，是提供优质服务的基础。同时也要学会识别和婉拒风险过高或期望值不合理的客户。

## 第四章 市场需求与就业前景

陪诊服务市场的潜在需求规模十分庞大。从**老年人口就医需求**来看，全国60岁以上人口2.64亿，年均就医次数6.5次/人，有陪诊需求的比例约30%，年潜在服务人次达5.15亿次。从**异地就医需求**来看，全国异地就医人次约1.3亿/年，需要陪诊服务的比例约40%，年潜在服务人次5200万次。此外还有儿童就医陪同、孕妇产检陪同、行动不便者就医、商务人士代问诊等其他需求。综合测算，全国年陪诊服务潜在需求约6亿人次，按人均200元计算市场潜力约1200亿元，目前市场渗透率不足5%发展空间巨大。

需求增长受到多重因素的驱动。**政策层面**，"健康中国2030"规划纲要提出要发展健康服务业，鼓励社会力量参与医疗服务，长期护理保险制度试点扩围，智慧医疗建设加速需要线下服务配套。**经济层面**，人均GDP突破1万美元带来服务消费升级，时间价值提升使专业服务付费意愿增强，中产阶层扩大对生活品质要求提高，银发经济快速发展。**社会层面**，人口老龄化加速，家庭小型化、空巢化趋势明显，跨区域人口流动频繁，健康意识提升就医需求增加。**技术层面**，互联网平台降低了服务对接成本，智能设备普及提高了服务效率，大数据技术提升了服务精准度。

需求地域分布呈现差异化特点。**一线城市**需求旺盛且多元，市场成熟度高客户支付能力强，服务要求专业化但竞争相对激烈。**新一线城市**是增长最快的市场，需求快速释放，竞争相对较小，增长潜力巨大，是布局的最佳时机。**二三线城市**存在差异化机会，需求相对单一以老年人服务为主，价格敏感度较高，熟人经济特征明显。**县域市场**尚待开发，需求分散规模有限，需要结合当地医疗资源特点，适合本地化服务模式。

陪诊师的就业渠道呈现多元化特点。**专业陪诊公司**采用薪资结构为底薪+提成+奖金，一线城市收入水平5000-15000元/月，优势是稳定有培训有品牌支持，劣势是自由度较低提成比例有限。**自主创业/个体陪诊师**收入结构为服务收费，一线城市收入水平8000-25000元/月（视个人能力和资源），优势是自由度高收入全部归己，劣势是需要自己获客风险自担。**家政/养老机构兼职**作为增值服务项目，有稳定的客户来源，收入相对稳定但可能较低，适合起步阶段积累经验。**互联网平台接单**通过美团、大众点评、58同城等生活服务平台和专业陪诊平台（如安心陪诊、e陪诊等）以及社交媒体平台获客，优势是客户量大获客成本低，劣势是平台抽成竞争激烈。**医院合作派驻**与医院合作提供便民服务，有稳定的服务场所容易获得客户信任，但需要较强的合作能力。

收入水平受地区和发展阶段影响差异明显。**一线城市**新手陪诊师4000-7000元/月，成熟陪诊师8000-15000元/月，资深陪诊师/团队15000-30000元/月，工作室/小公司3万-10万元/月。**新一线城市**新手陪诊师3000-5000元/月，成熟陪诊师6000-10000元/月，资深陪诊师/团队10000-20000元/月。**二三线城市**新手陪诊师2000-4000元/月，成熟陪诊师4000-8000元/月，资深陪诊师/团队8000-15000元/月。**影响收入的关键因素**包括服务时长和频次、服务单价和附加值、客户转化率和复购率、服务范围和专业度、个人品牌和口碑。

行业发展呈现四大趋势。**服务专业化**趋势体现在细分领域深耕如儿科陪诊、肿瘤陪诊、生殖陪诊等，服务标准化包括流程标准化、话术标准化、收费标准化，认证体系化包括职业资格认证和技能等级认证。**品牌连锁化**趋势表现为区域性品牌向全国扩张，加盟模式成为主流，标准化复制成为关键，头部企业将占据更大市场份额。**技术融合化**体现在AI智能分诊辅助、服务全程数字化记录、远程陪诊模式探索、健康数据整合管理。**产业生态化**表现为与医疗机构深度合作、与保险产品结合、与养老产业协同、与健康管理服务联动。

## 第五章 职业发展路径与晋升空间

陪诊师的职业发展可以分为清晰的阶段，每个阶段都有其特征、任务和目标。**初级阶段（0-1年）**是新手陪诊师的成长期，这一阶段从业者刚入行缺乏实战经验，对医院和流程不熟悉，服务技能有待提高，需要大量学习和实践。核心任务包括熟悉当地主要医院的布局和流程，掌握基础服务技能和沟通技巧，积累服务案例和客户资源，建立个人服务口碑。能力提升重点在于医院实地踩点制作医院攻略，模拟服务演练熟练服务流程，学习基础医学知识和常见疾病，观察优秀陪诊师的服务方式。一线城市收入预期为3000-6000元/月。

**中级阶段（1-3年）**是成熟陪诊师的稳定期，从业者已熟悉当地医院和医疗资源，服务技能熟练能应对各种情况，有稳定的客户来源，形成个人服务特色。核心任务在于提高服务质量打造个人品牌，拓展客户渠道增加服务量，提升服务附加值提高客单价，建立标准化服务流程。能力提升重点包括深化专业知识向细分领域发展，学习客户管理和营销技巧，提升问题解决和危机处理能力，积累高端客户资源。一线城市收入预期为8000-15000元/月。

**高级阶段（3-5年）**是资深陪诊师/服务专家的进阶期，从业者在业内有一定知名度，有丰富的高端客户资源，具备培训和指导能力，形成系统化的服务体系。核心任务包括专注高端客户和疑难服务，开展培训和知识输出，探索新的服务模式和产品，参与行业标准制定。能力提升重点涵盖行业研究和趋势判断，团队管理和培训能力，资源整合和商务合作，品牌运营和公关能力。一线城市收入预期为15000-30000元/月。

**专家阶段（5年以上）**是行业专家/创业者的成熟期，从业者成为行业资深人士，有自己的团队或公司，有较强的行业影响力，具备商业模式创新能力。发展方向包括创办陪诊服务公司、成为行业培训讲师、担任行业协会职务、进行行业投资和布局。收入预期为30000元/月以上，上不封顶。

对于希望组建团队或创业的从业者，需要把握正确的时机和策略。**组建陪诊团队的时机判断**包括个人接单量达到饱和，每月推单量超过20单，有2-3个稳定的合作渠道，有1-2名可靠的合伙人或员工。**团队架构**通常包括创始人/负责人、陪诊师团队（按区域/专长分工）、客服/调度人员（接单、派单、客户沟通）、营销推广人员（线上线下获客）、行政财务人员（后台支持）。**盈利模式优化**建议基础陪诊服务占60%，高端定制服务占20%，延伸增值服务占15%，培训与咨询占5%。

**创办陪诊公司**需要进行充分的前期准备，包括市场调研和商业计划书、团队组建和资金准备、公司注册和资质办理、服务标准和流程制定、保险方案和风险控制。**关键成功要素**包括标准化服务体系、高效的派单调度系统、强大的获客能力、完善的培训体系、风险管控机制。**发展阶段**划分为验证期（0-6个月）验证商业模式跑通流程，成长期（6-18个月）扩大规模建立品牌，扩张期（18-36个月）区域扩张复制模式，成熟期（36个月以上）全国布局生态构建。

**多元化发展方向**包括横向拓展居家护理服务、康复理疗服务、健康管理服务、养老照护服务，纵向延伸医疗旅游服务、海外就医服务、高端医疗对接、保险产品合作，技术赋能方向开发陪诊服务平台、智能分诊系统、健康管理APP、远程问诊系统。

从事陪诊服务还可以向相关职业转型发展。**健康管理师**转型优势在于已有客户基础可直接转化，医疗知识积累为转型奠定基础，陪诊经验有助于提供更贴合实际的健康建议。**保险经纪人**转型优势在于接触大量客户健康信息，理解客户的风险保障需求，陪诊场景是保险销售的绝佳时机。**养老规划师**转型优势在于深入了解老年群体需求，熟悉医疗和养老资源，可提供全方位养老解决方案。**医疗机构客服/导诊主管**转型优势在于熟悉医院运作流程，具备医患沟通经验，了解患者真实需求。

**跨界发展机会**广泛存在于大健康产业（如医药电商平台、互联网医院、体检中心、康复机构）、养老产业（如养老社区、居家养老服务、老年用品、养老地产）、科技行业（如医疗AI产品、医疗大数据、远程医疗技术、智慧医院建设）。

## 第六章 行业案例分析

**案例一：从护士到陪诊师的职业转型之路**

王女士38岁，之前在某三甲医院急诊科工作了12年，是一名经验丰富的护士。由于长期夜班和高强度工作身体出现状况，加上孩子上学需要照顾，她决定辞职转行。她的转型过程值得借鉴。第一步是市场调研，离职前3个月她利用休息时间考察当地陪诊市场，以客户身份体验了3家不同公司的陪诊服务，发现现有服务的不足在于医学知识欠缺、与医护沟通不畅、对检查结果解读不准确。第二步是技能准备，她系统学习陪诊服务流程和规范，整理自己的医疗知识形成适合陪诊的知识库，学习客户服务技巧和沟通话术，制作当地5家主要医院的详细攻略。第三步是起步运营，她先从熟人圈开始提供免费体验服务，前10单收取半价积累案例和好评，利用护士同事资源在医生群体中建立口碑，3个月后实现稳定接单。

王女士的发展成果令人瞩目，第一年月均服务25单月收入约12000元，第二年组建3人小团队月服务80-100单团队月收入5万元以上，第三年成立公司专注高端医疗陪诊和异地就医服务年营收突破200万元。她的成功启示包括：**专业背景是核心竞争力**，王女士的护士背景让她在医患沟通、医学知识方面具有绝对优势；**差异化定位**，主打"护士级专业陪诊"，价格比普通陪诊高50%但客户依然认可；**口碑传播是关键**，医生同行的推荐和老客户的转介绍是主要获客渠道；**不断升级服务**，从基础陪诊到高端定制再到团队化运营持续提升服务价值。

---

**案例二：90后大学生的陪诊创业之路**

小李27岁，某大学市场营销专业毕业，在一家互联网公司工作了3年。2021年陪奶奶去医院看病的经历让他发现了陪诊服务的商机。当时奶奶行动不便，医院流程复杂，他们花了整整一天才完成检查，这次经历让他看到了市场痛点。他的创业过程体现了务实和智慧。第一步是低成本验证，他利用周末时间兼职做陪诊，在58同城、闲鱼发布服务信息，3个月接了20多单验证了市场需求，发现异地就医客户客单价高需求强烈。第二步是聚焦细分市场，他决定专注服务异地就医客户，与高铁站、汽车站周边的酒店建立合作，制作外地患者就医指南免费发放，与当地老乡会、商会建立联系。第三步是标准化运营，制定异地就医服务标准流程，开发标准化服务包包括接站+住宿+陪诊+送站，建立服务质量监控和回访机制，开发线上预约和支付系统。

小李的发展成果展示了创业的爆发力，第一年服务异地患者200多人次营收40多万元，第二年拓展到3个城市服务1000多人次营收200多万元，第三年获得天使投资启动全国布局。他的经验教训包括：**聚焦细分市场更容易突破**，异地就医客户需求明确支付能力强竞争相对较小；**线下渠道非常重要**，酒店、老乡会、商会这些线下渠道获客精准度高；**标准化是规模化的前提**，没有标准化就无法快速复制和扩张；**创业初期要轻资产运营**，先验证需求再投入资源避免盲目扩张。

---

**案例三：社区养老+陪诊服务的融合发展模式**

张阿姨52岁，原某国营企业行政人员，退休后开办了一家社区养老服务中心，主要提供日间照料和家政服务。在服务过程中发现老人们最大的痛点就是看病难，于是将陪诊服务作为核心业务发展。她的融合发展策略体现了创新思维。第一步是嵌入现有服务，将陪诊服务作为养老服务包的增值项目，对已有客户进行需求调研推出"就医无忧"月卡服务，每月399元含4次半天陪诊和1次全程陪诊，第一个月就有30多位老人购买。第二步是建立社区医疗服务站，与社区卫生服务中心合作，聘请退休医生定期坐诊，提供基础检查、用药指导、健康咨询，建立老人健康档案为陪诊服务提供数据支持。第三步是构建就医绿色通道，与周边2家三甲医院、3家二甲医院建立合作，为社区老人争取优先挂号、优先检查的便利，与医院志愿者团队联动提供公益陪诊服务。

张阿姨的发展成果证明了模式创新的价值，陪诊业务占总营收比例从10%提升到50%，服务老人从50多人发展到300多人，形成了"健康建档-日常监护-门诊陪诊-康复随访"的闭环服务，成为当地社区养老服务的标杆。她的模式优势包括：**客户基础稳定**，依托社区养老服务中心有天然的客户流量；**客户粘性强**，老人长期在中心活动信任度高忠诚度高；**服务可延伸**，陪诊服务可以带动其他养老服务的销售；**社会认可度高**，这种模式得到政府和社区的支持容易获得政策扶持。

## 第一章 医疗卫生相关法律法规

### 1.1 医疗卫生法律体系概述

我国医疗卫生法律体系由法律层级、行政法规层级和部门规章层级三个层次构成，形成了完整的法律框架。在**法律层级**方面，主要包括2020年实施的《中华人民共和国基本医疗卫生与健康促进法》、2022年实施的《中华人民共和国医师法》、《中华人民共和国护士条例》、《中华人民共和国药品管理法》以及《中华人民共和国传染病防治法》等基础性法律。在**行政法规层级**方面，主要包括《医疗机构管理条例》、《医疗纠纷预防和处理条例》、《医疗事故处理条例》和《人体器官移植条例》等重要行政法规。在**部门规章层级**方面，则包括《医疗机构管理条例实施细则》、《医师执业注册管理办法》、《病历书写基本规范》和《医疗机构病历管理规定》等具体操作性规范。

《基本医疗卫生与健康促进法》作为医疗卫生领域的基础性法律，对陪诊服务具有重要的指导意义。**第三十二条**明确规定，公民接受医疗卫生服务时，对病情、诊疗方案、医疗风险、医疗费用等事项依法享有知情同意的权利。需要实施手术、特殊检查、特殊治疗的，医疗卫生人员应当及时向患者说明医疗风险、替代医疗方案等情况，并取得其明确同意；不能或者不宜向患者说明的，应当向患者的近亲属说明，并取得其明确同意。**陪诊师注意**：陪诊师可以帮助患者理解医生的说明，但不能代替患者或其家属做出医疗决策，不能签署任何医疗知情同意书。

**第四十五条**规定，国家建立健全院前急救体系，为急危重症患者提供及时、规范、有效的急救服务。医疗卫生机构应当按照规定对患者进行检查，并采取相应措施。对于需要紧急救治的患者，医疗机构应当立即救治，不得以任何理由拒绝、推诿或者拖延。**陪诊师注意**：遇到紧急情况时，陪诊师有责任协助患者获得紧急救治，但不得自行实施医疗行为。

在**医疗机构分类**方面，根据相关规定，我国医疗机构主要包括以下几个类别：医院（分为一级、二级、三级）、社区卫生服务中心/站、乡镇卫生院、门诊部诊所、妇幼保健院以及专科疾病防治机构等。不同级别的医疗机构在服务能力和资源配置上存在差异，陪诊师需要根据患者的具体需求选择合适的医疗机构。

关于**陪诊师与医疗机构的关系**，需要明确以下要点：陪诊师不是医疗机构的工作人员，其行为不代表医疗机构，但陪诊师需要遵守医疗机构的各项规定，不得干扰医院正常诊疗秩序。**医院对陪诊人员的一般规定**包括：陪诊人员不得替代医护人员进行护理操作，不得进入手术室、ICU等限制区域，不得向患者推荐药品或保健品，不得在医院内进行商业宣传，也不得收取医护人员介绍费或回扣。

## 第二章 患者权益保护法

### 2.1 患者的法定权利

患者的各项法定权利有着明确的法律依据。《民法典》**第一千二百一十九条**规定，医务人员在诊疗活动中应当向患者说明病情和医疗措施。需要实施手术、特殊检查、特殊治疗的，医务人员应当及时向患者具体说明医疗风险、替代医疗方案等情况，并取得其明确同意；不能或者不宜向患者说明的，应当向患者的近亲属说明，并取得其明确同意。医务人员未尽到前款义务，造成患者损害的，医疗机构应当承担赔偿责任。《医疗纠纷预防和处理条例》**第十六条**进一步明确，患者有权查阅、复制其门诊病历、住院志、体温单、医嘱单、化验单（检验报告）、医学影像检查资料、特殊检查同意书、手术同意书、手术及麻醉记录单、病理资料、护理记录、医疗费用以及国务院卫生主管部门规定的其他属于病历的全部资料。患者要求复制病历资料的，医疗机构应当提供复制服务，并在复制的病历资料上加盖证明印记。复制病历资料时，应当有患者或者其近亲属在场。

患者享有**生命健康权**，这是最基本的人身权利。具体而言，患者享有获得适宜医疗服务的权利，医疗机构不得拒绝急救处置，患者有权获得符合标准的医疗服务。陪诊师的**职责**包括：确保患者获得及时的医疗服务，发现紧急情况立即寻求医护帮助，协助患者获得合理的医疗待遇。

患者享有的**知情权**意味着患者有权了解自己的病情、诊断、治疗方案，有权了解医疗风险和预后情况，也有权了解医疗费用明细。陪诊师的**职责**包括：帮助患者准确理解医生的说明，记录医生的诊疗建议和注意事项，协助患者查询和理解费用明细。

患者享有的**选择权**包括有权选择医疗机构和医务人员，有权选择治疗方案和用药，有权决定是否接受某项治疗。陪诊师的**职责**包括：提供客观信息，帮助患者选择，不偏袒或推荐特定医疗机构，尊重患者的最终决定。

患者享有的**隐私权**意味着患者的病情、病史、个人信息受法律保护，未经患者同意不得向第三方透露，医护人员负有保密义务。陪诊师的**职责**包括：严格保护患者隐私，不向无关人员透露患者信息，妥善保管患者的病历资料。

患者享有的**监督权**意味着患者有权监督医疗机构的服务，有权对医疗服务提出批评和建议，有权投诉和举报违法违规行为。陪诊师的**职责**包括：协助患者行使合法监督权，通过正当渠道反映问题，不鼓励或参与医闹行为。

### 2.2 陪诊师在患者权益保护中的角色

陪诊师作为患者权益的**维护者**，在多个方面发挥作用。在**帮助患者实现知情权**方面，陪诊师应提前准备好患者要问的问题清单，就诊时帮助记录医生的解答，遇到专业术语时协助向医生确认解释，就诊后整理并向患者复述关键信息。在**帮助患者实现选择权**方面，陪诊师应提供多家医院和医生的客观信息，解释不同治疗方案的利弊，提醒患者考虑治疗费用和医保报销，尊重并记录患者的选择。在**帮助患者实现隐私权**方面，陪诊师与患者沟通时应选择私密场所，不在公共场合谈论患者病情，不随意向他人透露患者信息，妥善保管和归还患者的病历资料。

陪诊师必须严格遵守**避免侵犯患者权益的红线**，以下是**绝对禁止的行为**：首先，**不得代替患者做出医疗决定**，不能说"这个手术我看可以做"，不能签署任何医疗文书，不能强迫患者接受某种治疗。其次，**不得隐瞒信息误导患者**，不能隐瞒检查结果异常，不能隐瞒医生的重要提醒，不能歪曲或夸大医疗信息。第三，**不得泄露患者隐私**，不能将患者信息用于营销，不能在社交媒体发布患者信息，不能向第三方透露患者病情。第四，**不得限制患者的自由选择权**，不能强迫患者使用特定医院，不能限制患者转院或换医生，不能阻止患者获取第二诊疗意见。

在**特殊人群权益保护**方面，陪诊师需要特别注意以下要点。关于**未成年人权益保护**，陪诊师必须确认有法定监护人陪同或授权，诊疗决定必须由监护人做出，保护未成年人不受伤害，发现虐待迹象有义务报告。关于**精神障碍患者权益保护**，陪诊师应尊重患者的人格尊严，认识到非自愿住院有严格的法律程序，保障患者获得适当治疗，保护患者的通讯和会见权。关于**残疾人和老年人权益保护**，陪诊师应提供无障碍服务，尊重自主决定权，禁止虐待和遗弃，给予特殊关照和便利。

---

### 【本章小结】

患者享有生命健康权、知情权、选择权、隐私权、监督权等法定权利。陪诊师既是患者权益的维护者，也要注意不越界侵犯患者权益。特别是在保护隐私和避免代做医疗决策方面，必须严守法律红线。

## 第三章 个人信息保护与隐私法规

### 3.1 个人信息保护法律体系

我国个人信息保护领域的基础性法律是2021年实施的《个人信息保护法》，该法对个人信息处理活动进行全面规范。其**核心原则**包括：合法、正当、必要、诚信原则，要求任何个人信息处理行为都必须符合这些基本要求；目的明确、最小必要原则，要求处理个人信息必须有明确的目的，并且只收集与目的相关的最小必要信息；公开透明原则，要求个人信息处理者公开处理信息的规则；质量保证原则和责任落实原则，确保个人信息处理的准确性和责任明确。

《民法典》**第一千零三十四条**规定，自然人的个人信息受法律保护。个人信息是以电子或者其他方式记录的能够单独或者与其他信息结合识别特定自然人的各种信息，包括自然人的姓名、出生日期、身份证件号码、生物识别信息、住址、电话号码、电子邮箱、健康信息、行踪轨迹等信息。健康信息因其敏感性，在法律保护中具有特殊地位。

**健康信息属于敏感个人信息**，受到更严格的法律保护。《个人信息保护法》**第二十八条**明确规定，敏感个人信息是一旦泄露或者非法使用，容易导致自然人人格尊严受到侵害或者人身、财产安全受到危害的个人信息，包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息，以及不满十四周岁未成年人的个人信息。只有在具有特定的目的和充分的必要性，并采取严格保护措施的情形下，个人信息处理者方可处理敏感个人信息。**处理健康信息的特殊要求**包括：必须获得个人的单独同意，必须有明确的告知，必须有充分的必要性，必须采取更严格的保护措施。

### 3.2 陪诊服务中的个人信息处理

在**信息收集的规范**方面，陪诊师应遵循**合法收集原则**。**可以收集的信息**包括：患者姓名、联系方式，就诊医院、科室、时间，病情简要描述（用于服务准备），特殊需求和注意事项，紧急联系人信息。**收集信息的要求**主要包括三个方面：一是**告知义务**，需要告知收集信息的目的，告知信息的使用范围，告知信息的保存期限，告知患者的权利；二是**最小必要原则**，只收集服务必需的信息，不过度收集无关信息，不要求提供不必要的隐私信息；三是**获得同意**，获得患者或其家属的明确同意，涉及敏感信息需单独同意，保留同意的证据（可通过合同、聊天记录等）。**不宜收集的信息**包括：详细的完整病史，患者的收入、财产信息，与服务无关的家庭信息，患者的社交账号密码。

在**信息存储与使用规范**方面，陪诊师应注意以下要点。**信息存储安全**方面，首先在**存储方式**上，电子信息应加密存储，纸质资料应上锁保管，定期备份防止丢失，不在公共设备存储患者信息；其次在**存储期限**上，服务完成后建议保存1-2年，超过期限后安全删除或销毁，法律法规另有规定的从其规定；再次在**禁止行为**上，不得出售或向他人提供患者信息，不得将患者信息用于其他商业目的，不得在公开场合展示患者信息，不得未经授权复制患者病历。**信息使用规范**方面，首先在使用范围限制上，仅用于本次陪诊服务，不得超出约定的使用目的，不得用于营销推广；其次在信息共享限制上，未经同意不得向第三方分享，医护人员询问时需确认身份和必要性，向家属分享需获得患者同意；再次在服务完成后处理上，应归还患者提供的所有原件，删除不必要的电子副本，销毁纸质复印件（如非必须保留）。

在**常见法律风险与防范**方面，陪诊师需要警惕以下风险。**风险一：信息泄露**可能发生的**典型场景**包括手机丢失导致患者信息泄露、电脑被黑客攻击、聊天记录被他人看到、病历资料被他人获取等。**防范措施**包括手机设置密码并对重要信息加密，电脑安装杀毒软件和防火墙，及时删除聊天记录中的敏感信息，纸质资料随身携带不离开视线。**风险二：过度收集信息**可能发生的**典型场景**包括要求患者提供完整病历、询问与服务无关的个人隐私、保存大量与服务无关的信息等。**防范措施**包括制定信息收集清单只收集必要信息，对员工进行信息保护培训，定期审查信息收集情况。**风险三：未经同意使用信息**可能发生的**典型场景**包括将患者案例用于宣传（隐去部分信息但仍可识别）、向其他客户推荐时提及某位患者、与同行交流时透露具体患者信息等。**防范措施**包括宣传案例必须获得书面同意，交流经验使用匿名化案例，制定案例使用审批流程。**法律责任**方面，《个人信息保护法》**第六十六条**规定，违法处理个人信息的，没收违法所得，并处违法所得一倍以上十倍以下罚款；没有违法所得或者违法所得不足一百万元的，并处一百万元以下罚款；对直接负责的主管人员和其他直接责任人员处一万元以上十万元以下罚款。情节严重的，还可能承担刑事责任。

---

### 【本章小结】

个人信息特别是健康信息受到法律的严格保护。陪诊师在服务中会接触大量患者个人信息，必须严格遵守合法、正当、必要的原则。信息收集、存储、使用的每个环节都要有规范，严防信息泄露和滥用，否则可能面临严重的法律责任。

## 第四章 医疗纠纷处理与法律责任

### 4.1 医疗纠纷的预防与应对

**医疗纠纷**是指医患双方因诊疗活动引发的争议，这类纠纷具有以下**特点**：专业性强，因为涉及医学专业知识；情绪性强，患者及家属往往情绪激动；处理周期长，可能需要多次协商或诉讼；社会影响大，容易引发舆论关注。**陪诊师可能面临的纠纷类型**包括：患者与医院之间的医疗纠纷（陪诊师作为旁观者）、患者与陪诊师之间的服务纠纷、医院与陪诊师之间的管理纠纷。

在**医疗纠纷中的角色**方面，陪诊师需要明确自己**不是医疗纠纷的当事人**：陪诊师不是医疗行为的实施者，不承担医疗责任，但陪诊师可以作为证人提供证言。陪诊师**可以扮演的角色**包括：**纠纷预防者**，提前向患者说明医疗风险，帮助患者建立合理预期，发现矛盾苗头及时介入调解；**沟通协调者**，协助医患双方理性沟通，帮助患者准确表达诉求，向患者解释医院的处理流程；**情绪安抚者**，安抚患者及家属的激动情绪，引导通过合法途径解决，避免矛盾升级激化；**证据保全者**，协助患者保存相关证据，客观记录事情经过，必要时作为证人出庭。

关于**医疗纠纷的合法解决途径**，《医疗纠纷预防和处理条例》**第二十二条**明确规定，发生医疗纠纷，医患双方可以通过下列途径解决：双方自愿协商、申请人民调解、申请行政调解、向人民法院提起诉讼、法律法规规定的其他途径。**各途径比较**如下：双方协商的优势是灵活、成本低、速度快，劣势是力量可能不对等、协议效力可能有争议，适用于争议较小、双方有诚意的情况；人民调解的优势是免费、专业、有法律效力，劣势是调解结果取决于双方意愿，适用于有调解可能的大多数纠纷；行政调解的优势是有卫生部门介入、公信力强，劣势是程序相对复杂，适用于涉及行政处罚的案件；诉讼的优势是具有终局性、有强制执行力，劣势是成本高、周期长、专业性强，适用于争议较大、其他途径无效的情况。

### 4.2 陪诊服务纠纷的法律责任

陪诊服务本质上是**服务合同关系**，双方的权利义务由合同约定。在**违约责任**方面，主要**违约情形**包括：首先，**未按约定提供服务**，如约定时间未到场、服务内容缩水、提前终止服务等；其次，**服务质量不达标**，如服务态度恶劣、专业技能不足、未能完成约定任务等；再次，**违反保密义务**，如泄露患者隐私、不当使用患者信息等。**违约责任承担方式**包括：继续履行、采取补救措施、赔偿损失、支付违约金、赔礼道歉。

在**侵权责任**方面，陪诊师可能涉及的**侵权类型**包括：**侵犯隐私权**，如泄露患者病情、未经同意公开患者信息、擅自拍摄患者并传播等，法律依据为《民法典》第一千零三十二条，该条规定自然人享有隐私权，任何组织或者个人不得以刺探、侵扰、泄露、公开等方式侵害他人的隐私权；**侵犯名誉权**，如捏造事实损害患者名誉、侮辱诽谤患者、泄露患者隐私导致名誉受损等；**侵犯财产权**，如侵占患者财物、故意损坏患者物品、欺诈患者财物等；**人身损害责任**，如因疏忽导致患者受伤、协助不当导致意外、紧急救助中的责任等。

关于**紧急救助的免责条款**，《民法典》**第一百八十四条（好人法）**规定，因自愿实施紧急救助行为造成受助人损害的，救助人不承担民事责任。**适用条件**包括：情况紧急，不立即救助会造成更大损害；救助人是善意的，没有故意或重大过失；救助行为与损害之间有因果关系。**陪诊师注意**：遇到紧急情况应立即呼叫医护人员，在专业人员到达前可以进行必要的急救，急救操作应在自己的能力范围内，避免进行超出能力的医疗操作。

### 4.3 风险防范与证据保全

在**事前风险防范**方面，陪诊师应做好以下几方面工作。首先，**签订规范的服务合同**，明确服务内容和标准，明确双方权利义务，明确责任划分和免责条款，明确争议解决方式。其次，**购买职业责任保险**，投保责任险转移风险，选择合适的保险额度，了解保险理赔流程。再次，**服务前充分告知**，告知服务范围和边界，告知可能的风险，告知费用构成和支付方式，获得客户的确认。最后，**做好健康状况评估**，了解患者的健康状况，评估服务风险等级，高风险服务谨慎承接或要求家属陪同。

在**事中证据保全**方面，**重要证据清单**包括：服务合同或协议（包括书面合同或电子协议、服务确认单、费用支付凭证）；沟通记录（包括微信/QQ聊天记录、电话录音需告知对方、邮件往来）；服务过程记录（包括服务签到/签退记录、服务过程照片需征得同意、重要事项的书面确认）；纠纷发生后的记录（包括事情经过的书面记录、证人联系方式、相关监控录像如能获取）。**证据保全要点**包括：及时记录避免记忆偏差，客观记录不加入主观判断，完整保存不随意删除，备份存储防止丢失。

在**事后纠纷处理**方面，**处理原则**包括：主动面对不逃避责任，客观分析明确责任边界，理性沟通避免情绪化，依法处理不走极端。**处理步骤**包括：首先**安抚情绪**，先处理情绪再处理问题，表达歉意和理解，承诺认真处理；其次**了解情况**，认真听取对方诉求，核实事情经过，收集相关证据；再次**分析责任**，对照合同约定，参考法律规定，客观评估责任大小；然后**协商解决**，提出解决方案，争取双方都能接受，达成书面和解协议；最后**寻求第三方帮助**，协商不成申请调解，必要时寻求法律帮助，积极应对诉讼。

---

### 【本章小结】

医疗纠纷处理有明确的法律途径，陪诊师不是医疗纠纷的当事人，但可以扮演预防、协调、安抚、见证等角色。陪诊服务自身的纠纷主要涉及违约责任和侵权责任。通过事前签订合同、购买保险，事中保全证据，事后理性处理，可以有效防范和化解法律风险。

## 第五章 陪诊服务的法律边界与风险防范

### 5.1 明确的法律红线

陪诊师必须严格遵守**绝对禁止的行为**红线。在**非法行医行为**方面，法律定义是指无医生执业资格从事诊疗活动，包括在医疗机构中从事诊疗活动和擅自开业从事诊疗活动。《刑法》**第三百三十六条**规定，未取得医生执业资格的人非法行医，情节严重的，处三年以下有期徒刑、拘役或者管制，并处或者单处罚金；严重损害就诊人身体健康的，处三年以上十年以下有期徒刑，并处罚金；造成就诊人死亡的，处十年以上有期徒刑，并处罚金。**陪诊师必须避免的行为**包括：诊断疾病如"你这个情况应该是XX病"，推荐治疗方案如"你应该做XX手术"，推荐药品如"吃这个药效果好"，进行医疗操作如打针、输液、换药等，解读检查结果并给出诊疗建议，声称自己有医学背景可以提供医疗建议。**正确的表述方式**应该是："这个问题建议您咨询医生"，"我帮您把医生的话记录下来"，"我可以帮您向医生转达您的疑问"，"具体用药请遵医嘱"。

在**医托行为**方面，法律定义是指受雇于医疗机构或医务人员，采取欺骗、引诱等方式招揽患者的人员。《卫生部、公安部关于维护医疗机构秩序的通告》明确禁止任何单位和个人从事医托活动，对查获的医托由公安机关依据《治安管理处罚法》予以处罚。**陪诊师必须避免的行为**包括：强制推荐特定医院或医生，从医院或医生处收取介绍费、回扣，夸大或虚假宣传某家医院的疗效，欺骗患者到指定医院就诊。

在**黄牛行为**方面，法律定义是指通过各种手段获取稀缺资源（如专家号），然后高价倒卖牟利的人员。《治安管理处罚法》**第五十二条**规定，伪造、变造、倒卖车票、船票、航空客票、文艺演出票、体育比赛入场券或者其他有价票证、凭证的，处十日以上十五日以下拘留，可以并处一千元以下罚款；情节较轻的，处五日以上十日以下拘留，可以并处五百元以下罚款。**陪诊师必须避免的行为**包括：加价倒卖挂号名额，雇佣多人排队抢占号源，使用虚假身份信息挂号，承诺保证挂上某专家号尤其是热门专家。

在**需要谨慎的灰色地带**方面，陪诊师应特别注意以下行为。关于**代问诊行为**，其法律风险在于医生诊断需要亲自诊查患者，代问诊信息可能不准确不完整，可能导致误诊误治。**规范操作建议**包括：必须获得患者的明确书面授权，向医生说明是代问诊，完整记录医生的每一句话，建议患者后续亲自就诊确认，不对诊断结果负责。关于**代办特殊检查预约**，其法律风险在于部分特殊检查如介入检查有创且有风险，需要患者本人签署知情同意书，代办可能导致患者不了解风险。**规范操作建议**包括：只协助预约不代替同意，预约前让患者了解检查风险，检查当天必须有患者或家属到场，让患者亲自签署知情同意书。关于**涉及精神疾病患者的服务**，其法律风险在于精神疾病患者的民事行为能力可能受限，非自愿住院有严格法律程序，可能涉及强制医疗问题。**规范操作建议**包括：必须有法定监护人陪同或授权，不参与是否住院的决定，发现患者有自伤或伤人倾向立即通知家属和医院，高风险情况建议婉拒服务。

### 5.2 职业风险的系统防范

在**建立风险分级评估机制**方面，陪诊师应建立**服务前风险评估表**，从以下风险因素进行评估：患者年龄方面，18-65岁为低风险，65-75岁或8-18岁为中风险，75岁以上或8岁以下为高风险；行动能力方面，行动自如为低风险，行动不便需协助为中风险，无法行走需轮椅或平车为高风险；意识状态方面，清醒正常为低风险，反应略迟钝为中风险，意识不清或精神异常为高风险；疾病类型方面，普通慢性病为低风险，较严重慢性病为中风险，重症急症传染病为高风险；家属陪同方面，有家属全程陪同为低风险，有家属但不全程为中风险，无家属独自就诊为高风险。**风险应对策略**为：低风险正常提供服务，中风险增加安全提醒并购买额外保险，高风险要求必须有家属陪同或婉拒服务。

在**服务过程中的风险控制点**方面，陪诊师应在以下环节严格把控。**接待环节**应详细了解客户情况和需求，评估服务风险等级，明确告知服务范围和边界，签订服务协议。**准备环节**应确认预约信息准确无误，准备必要的防护用品，规划最佳路线和时间，与客户再次确认服务细节。**服务环节**应准时到达签到确认，全程陪同不离视线，关键节点口头确认并记录，遇异常情况立即报告。**结束环节**应清点物品完整交接，服务确认签字，提醒后续注意事项，24小时内跟进回访。

在**建立危机处理预案**方面，陪诊师应针对**常见危机场景**制定应对方案。**场景一：患者突发疾病**的应对措施包括立即呼叫医护人员，不要随意移动患者，通知患者家属，记录事情经过，配合医院救治。**场景二：患者情绪失控**的应对措施包括保持冷静不激化矛盾，移除周围危险物品，寻求保安或医护帮助，通知家属，必要时报警。**场景三：发生意外受伤**的应对措施包括立即寻求医疗帮助，保护现场，通知家属和公司，收集相关证据，报保险公司。**场景四：被医院工作人员驱赶**的应对措施包括保持礼貌不争吵，出示相关证明如患者授权，联系医院管理部门协调，无法协调时暂时离开，事后向公司或平台反馈。

---

### 【本章小结】

陪诊服务有明确的法律红线，非法行医、医托、黄牛行为是绝对禁止的，可能承担严重的法律责任甚至刑事责任。代问诊、代办检查等灰色地带行为需要谨慎操作，严格规范。建立风险评估机制、控制服务过程关键点、制定危机预案是防范职业风险的系统方法。

## 第六章 合同签订与免责条款

### 6.1 服务合同的基本要素

在**合同的形式与内容**方面，陪诊师应了解不同**合同形式**的法律效力。书面合同是推荐形式，具有明确的证据效力；电子合同与书面合同具有同等法律效力；口头合同不推荐，因为难以举证。在**合同基本要素**方面，**当事人信息**应包括服务提供方（陪诊师/公司）名称、联系方式，服务接受方（患者/家属）姓名、联系方式，紧急联系人信息。**服务内容**应明确具体服务项目（挂号、陪同、取药等），服务时间（日期、时间段），服务地点（具体医院），服务标准（服务质量要求）。**服务费用**应明确服务费用总额，费用构成明细，支付方式和时间，退款政策和条件。**双方权利义务**应明确服务提供方的义务，服务接受方的义务，双方的权利。**责任划分与免责**应明确违约责任，免责情形，责任限额。**争议解决**应明确协商解决方式，调解途径，诉讼管辖法院。**其他条款**应明确合同生效时间，变更和解除条件，保密条款，通知方式。

在**关键条款的撰写要点**方面，**服务内容条款**应具体明确避免模糊表述，列出包含的服务项目，明确不包含的服务项目，可作为附件详细说明。例如：服务内容：陪同患者于2024年5月10日上午到XX医院心内科就诊，包括协助取号、陪同候诊、陪同见医生协助沟通并记录医嘱、陪同完成心电图检查、协助缴费取药。不包含垫付医疗费用、提供医疗建议、签署医疗文书。**费用条款**应明确总费用，列明费用包含的项目，说明哪些费用需另行支付，约定发票事宜。例如：服务费用人民币500元，包含陪诊师服务报酬和市内交通费用。医疗费用、药品费用、医院停车费等由甲方另行支付。乙方在服务完成后提供等额发票。**权利义务条款**应明确乙方（陪诊师）义务包括按时提供服务、保护患者隐私、不提供医疗建议等，甲方（客户）义务包括如实告知病情、配合服务、按时付费等。

在**电子合同的法律效力**方面，《电子签名法》**第三条**规定，民事活动中的合同或者其他文件、单证等文书，当事人可以约定使用或者不使用电子签名、数据电文。当事人约定使用电子签名、数据电文的文书，不得仅因为其采用电子签名、数据电文的形式而否定其法律效力。**有效电子合同的要件**包括：双方真实意思表示，可识别签名人身份，可验证签名未被篡改，内容完整可追溯。**常用电子合同方式**包括：微信确认如"我已阅读并同意以上服务条款"，电子合同平台如法大大、e签宝，邮件确认，服务确认单签字拍照。

### 6.2 免责条款的设计与效力

在**可以约定的免责情形**方面，陪诊师可以与客户约定以下免责条款：**医疗风险免责**，可约定为乙方仅提供陪诊服务，不提供任何医疗建议或诊疗服务。诊疗过程中的医疗决策由甲方或患者本人做出，相应的医疗风险由甲方或患者自行承担，乙方不承担任何医疗责任。**不可抗力免责**，可约定为因不可抗力（包括但不限于自然灾害、突发公共卫生事件、政府行为、医院临时规定变更等）导致服务无法正常提供的，乙方不承担违约责任，双方协商解决方案或退还相应费用。**客户原因免责**，可约定为因甲方或患者原因导致服务无法正常进行（包括但不限于患者未按时到达、临时取消、提供虚假信息等），乙方不承担责任，已收取的服务费用不予退还。**第三人原因免责**，可约定为因医院、医护人员或其他第三方的原因导致服务受阻或造成损害的，乙方不承担责任，但应积极协助甲方维权。**紧急救助免责**，可约定为在紧急情况下，乙方为保护患者生命安全采取必要救助措施的，符合《民法典》"好人法"规定，对因此造成的损害不承担民事责任。

在**免责条款的效力限制**方面，根据《民法典》**第四百九十七条**，有下列情形之一的，格式条款无效：具有本法第一编第六章第三节和本法第五百零六条规定的无效情形；提供格式条款一方不合理地免除或者减轻其责任、加重对方责任、限制对方主要权利；提供格式条款一方排除对方主要权利。**不能免责的情形**包括：因故意或重大过失造成对方人身伤害的，因故意或重大过失造成对方财产损失的，免除自身主要义务的，排除对方主要权利的。**无效条款示例**包括："无论何种情况，乙方均不承担任何责任"（太绝对，无效），"乙方对服务过程中的任何损失概不负责"（范围过大，无效）。**有效免责条款的特征**包括：公平合理不显失公平，明确具体不模糊笼统，与对方有切身利害关系的条款已提请注意，不违反法律强制性规定。

在**责任限制条款**方面，陪诊师可以约定**责任限额条款**，例如：除故意或重大过失情形外，乙方的累计赔偿责任不超过本次服务费用的两倍。这一约定的**合理性**在于陪诊服务收费相对较低，要求无限责任显失公平，符合权利义务对等原则，已有保险作为补充保障。关于**赔偿范围限制**，可约定为乙方承担赔偿责任的范围限于直接损失，不包括间接损失、预期利益损失、精神损害赔偿等。

### 6.3 不同场景的合同模板要点

在**单次陪诊服务合同**方面，其**核心要点**应包括具体的服务时间、地点、内容，明确的服务费用，双方基本信息，基本的权利义务，简单的责任划分。该合同**适用场景**为普通门诊陪诊、代取报告等简单服务。

在**长期/包年服务合同**方面，其**核心要点**应包括服务期限如一年，服务次数和每次服务时长，服务范围和除外责任，费用支付方式（一次性/分期），续约和终止条款，服务质量保证。该合同**适用场景**为慢性病患者长期复诊、家庭健康服务包等。

在**异地就医服务合同**方面，其**核心要点**应包括详细的服务行程安排，费用构成明细（服务费+差旅费+其他），住宿交通安排，特殊需求满足，全程责任划分，紧急联系人及预案。该合同**适用场景**为异地就医全程陪同服务。

---

### 【本章小结】

签订规范的服务合同是防范法律风险的重要手段。合同应包含当事人信息、服务内容、费用、权利义务、责任划分等基本要素。免责条款可以合理设计但不能违反法律规定，要注意公平合理、明确具体。不同类型的服务应有针对性的合同条款。电子合同具有与书面合同同等的法律效力。

## 第七章 法律纠纷案例分析

### 案例一：陪诊师代签手术同意书引发的纠纷

**案情简介**：患者王女士（58岁）因胆囊结石需要手术治疗。儿子工作繁忙无法陪同，聘请了陪诊师小李。术前谈话时，医生要求签署手术同意书，王女士说"小李你帮我签吧，我相信你"。小李心想患者本人在场且口头同意，应该没问题，就在同意书上签署了自己的名字。手术过程顺利，但术后出现并发症，王女士恢复不佳。家属认为手术有问题，复印病历时发现同意书不是患者本人或家属签署的，于是将医院和陪诊师小李一并告上法庭，要求赔偿。

**法律分析**：法院审理认为，首先，根据《民法典》和《医师法》，手术同意书必须由患者本人或其近亲属签署，这是法定要求，不能委托他人代签。其次，陪诊师小李不是患者的近亲属，也没有获得书面授权，无权签署手术同意书。第三，医院未严格审查签字人身份，存在过错。第四，小李作为专业陪诊师，应当知道不能代签医疗文书，也存在过错。

**判决结果**：医院承担主要责任（70%），陪诊师小李承担次要责任（30%），赔偿患者3万余元，小李所在公司承担连带责任。

**教训总结**：陪诊师必须绝对不能代签任何医疗文书，即使患者口头要求也不行。遇到需要签署知情同意书的情况，必须做到：能联系家属的让家属到场签署，患者本人清醒的指导患者自己签署，特殊情况无法签署的请示医院处理。签字是重大法律行为，必须慎之又慎，入职培训中必须强调这一红线。

---

### 案例二：泄露患者隐私引发的名誉侵权案

**案情简介**：陪诊师小张接待了一位知名企业家客户，陪同其进行体检。检查中发现客户患有某种传染性疾病。小张觉得这是个大新闻，在与朋友吃饭时随口说了这件事，还说了客户的名字。朋友又告诉了其他人，消息很快传开，被竞争对手得知后在网络上散布，给客户造成了巨大困扰，生意也受到严重影响。客户通过调查查到消息源头是小张，于是向法院提起诉讼，要求赔偿名誉损失50万元。

**法律分析**：法院审理认为，首先，小张作为陪诊师，在服务过程中获知的患者健康信息属于隐私，受法律保护。其次，小张未经患者同意，擅自向他人泄露患者隐私，构成侵犯隐私权。第三，信息泄露后被进一步传播，造成患者社会评价降低，构成名誉侵权。第四，小张的行为存在明显过错，且后果严重。

**判决结果**：小张赔偿患者精神损害抚慰金10万元，小张在报纸上公开向患者道歉，小张所在公司承担连带赔偿责任。

**教训总结**：保护患者隐私是陪诊师的基本职业操守，也是法律义务。任何情况下都不能泄露患者信息，包括不在朋友圈、社交媒体发布患者信息，不与无关人员谈论客户情况，不拿客户案例作为谈资。即使是匿名分享，也要确保无法通过描述识别出具体个人。泄露隐私可能承担巨额赔偿责任。

---

### 案例三：推荐药品导致患者过敏的赔偿案

**案情简介**：患者李先生因皮肤瘙痒到医院就诊，医生开了外用药膏。陪诊师小王看到后说："这个药膏我之前陪其他病人用过，效果一般。我知道有一种进口药膏效果特别好，我可以帮您买。"李先生同意了，小王帮他买了这种药膏。使用后李先生出现严重过敏反应，全身红肿，住院治疗一周。经检测，药膏本身没问题，但李先生对其中某种成分过敏。李先生要求小王赔偿损失，小王认为自己是好心，而且是患者自己同意的，拒绝赔偿。李先生将小王告上法庭。

**法律分析**：法院审理认为，首先，小王不是医务人员，没有推荐药品的资质。其次，小王向患者推荐药品的行为超出了陪诊服务范围。第三，小王的推荐行为与患者使用药膏有直接因果关系。第四，小王存在过错，应当承担相应责任。第五，患者自身未尽到注意义务，也应承担部分责任。

**判决结果**：小王承担70%责任，赔偿患者2万余元，患者自行承担30%责任。

**教训总结**：陪诊师必须绝对不能向患者推荐任何药品、保健品，即使是"好心"、"有经验"也不行。推荐药品属于医疗行为，需要相应资质。患者问到时应该说："用药请遵医嘱，我不能给您建议"。更不能帮助患者购买处方药。

---

### 案例四："保证挂上专家号"的承诺被认定为欺诈

**案情简介**：患者陈女士想到某大医院找知名专家看病，但专家号非常难挂。陪诊师赵某为了接单，承诺"100%保证挂上王专家的号，挂不到全额退款"，并收取了2000元服务费。赵某连续三天凌晨去排队，都没有挂到号。陈女士要求退款，赵某只同意退1500元，说自己付出了劳动要收取500元辛苦费。陈女士不同意，向市场监管部门和消协投诉。

**处理结果**：市场监管部门调查后认为，首先，赵某作出"100%保证挂号"的承诺，客观上无法保证，属于虚假宣传。其次，未完成约定服务却拒绝全额退款，侵害消费者权益。第三，赵某的行为涉嫌欺诈。

**处罚结果**：赵某全额退还2000元服务费，罚款5000元，所在平台被约谈整改。

**教训总结**：陪诊师不要做出无法兑现的承诺，尤其是热门专家号。可以说我会尽力帮您挂号，但不能说保证一定挂上。即使要收抢号辛苦费，也要事先明确约定。挂不到号要按约定及时退款，不要产生纠纷。黄牛行为更是绝对不能碰。

---

### 案例五：紧急救助行为被认定为免责

**案情简介**：陪诊师小刘陪同70岁的张大爷在医院做检查。候诊时张大爷突然晕倒，意识不清，颈动脉搏动消失。小刘之前参加过急救培训，立即判断是心脏骤停，马上进行心肺复苏。医护人员5分钟后赶到，继续抢救，张大爷恢复了心跳。但由于按压时用力较大，造成了两根肋骨骨折。张大爷痊愈后，家属认为小刘操作不当导致骨折，要求小刘赔偿。

**法律分析**：法院审理认为，首先，小刘在紧急情况下对张大爷进行心肺复苏，属于自愿实施紧急救助行为。其次，肋骨骨折是心肺复苏常见的并发症，不能证明小刘存在故意或重大过失。第三，根据《民法典》第一百八十四条（好人法），因自愿实施紧急救助行为造成受助人损害的，救助人不承担民事责任。

**判决结果**：驳回原告诉讼请求，小刘不承担赔偿责任。

**经验总结**：好人法保护善意的紧急救助行为。遇到紧急情况应该大胆施救，但要做到：在自己能力范围内施救，同时立即呼叫专业人员，按规范操作不做超出能力的事。建议所有陪诊师都接受正规急救培训，施救时最好有其他人在场见证。

---

## 【课程总结】

本课程系统介绍了陪诊服务涉及的法律法规知识，涵盖医疗卫生法规、患者权益保护、个人信息保护、医疗纠纷处理、法律边界与风险防范、合同签订等方面，并通过5个真实案例进行了深入分析。

**核心要点回顾**：陪诊师必须严守法律红线，禁止非法行医、医托、黄牛行为；保护患者隐私是法律义务，也是基本职业操守；绝不能代签医疗文书，不能推荐药品或治疗方案；签订规范的服务合同是防范风险的重要手段；紧急救助行为受法律保护，可以大胆施救。

## 【学习目标】

通过本课程学习，学员将全面掌握陪诊师职业形象规范、沟通礼仪与话术技巧，学会医患沟通中的注意事项，掌握不同服务场景的礼仪要求，以及与特殊人群沟通的技巧，全面提升职业素养和服务水平。

---

## 第一章 职业形象与着装规范

职业形象是陪诊师展现专业素养的第一张名片，它决定了患者和家属对你的第一印象。研究表明，人们在初次见面的7秒钟内就会形成对他人的整体印象，这个印象一旦形成便很难改变。在这三尺之内的判断中，视觉形象占据55%的比重，包括着装、仪容、表情和体态；声音形象占38%，涵盖语速、语调、语气等因素；而语言内容仅占7%。作为陪诊师，当你出现在患者面前的那一刻，对方已经在心里评估你是否专业、是否值得信赖，因此职业形象是建立信任的第一步，不可忽视。

专业的职业形象能够向患者和家属传递四个层面的积极信息，帮助快速建立信任关系。**在专业性方面**，统一的着装显示这是正规服务，整洁的外表反映做事认真细致，专业的形象暗示服务质量有保障，患者看到你会自然联想到“这个人看起来很专业，应该经验丰富”。**在可信赖感方面**，稳重的形象让人觉得踏实，得体的穿着显示有责任感，良好的精神面貌让人愿意信任，患者会感到“这个人看起来可靠，可以托付”。**在尊重感方面**，精心打扮显示对工作的重视，专业形象是对客户的尊重，规范着装体现服务的正式性，让患者感受到“这个人很尊重我们的服务”。**在安全感方面**，专业形象能安抚患者焦虑情绪，训练有素的样子让人心里有底，规范服务减少不确定感，患者会认为“有这个人陪同，看病应该会顺利”。

职业形象的构成需要从多个维度进行全面把控，这些要素相互配合共同塑造专业形象。**仪容仪表**是基础，包括面容、发型和个人卫生，这是第一眼就能看到的内容；**着装规范**是核心，涉及衣服、鞋子、配饰等，是职业性的直接体现；**仪态举止**是细节，包括站姿、坐姿、走姿等，体现个人修养；**表情神态**是关键，涵盖微笑、眼神、面部表情等，传递服务态度；**语言表达**是重点，包括语速、语调、礼貌用语等，决定沟通效果。每一个要素都需要认真对待，才能塑造出完整的专业形象。

---

仪容仪表是职业形象的基础，干净整洁的面容能够给患者带来良好的第一印象。**在面容要求方面**，总体原则是干净、整洁、健康、精神。男性陪诊师需要每日剃须保持面部清洁，不留胡须（特殊宗教信仰除外），鼻毛不外露，不戴夸张耳环或饰品，不化浓妆但可适当使用护肤品。女性陪诊师则应淡妆上岗以彰显精神面貌，不化浓妆避免夸张色彩，不使用浓烈香水（医院环境敏感），指甲修剪整齐不留长指甲，不涂颜色夸张的指甲油，不戴过多饰品以保持专业形象。

发型是仪容的重要组成部分，需要保持干净、整齐、不遮挡视线、方便工作。男性陪诊师的发型应前不覆额、侧不掩耳、后不及领，不染夸张颜色，保持清洁无头屑，不剃光头（特殊医疗原因除外）。女性陪诊师的长发需束起或盘起避免散落，刘海不遮挡眼睛，不染夸张颜色，不戴夸张发饰，保持清洁无头屑。无论男女都需要经常洗头保持头发清洁，避免使用气味浓烈的发胶和发蜡，工作时不频繁整理头发。

个人卫生是仪容仪表中最容易被忽视但又至关重要的环节，直接关系到患者的安全和信任。手部卫生方面，陪诊师应勤洗手特别是接触患者前后，指甲短而干净指甲缝无污垢，不戴戒指（工作不方便且藏污纳垢），接触患者前后使用免洗消毒液。口腔卫生方面，应早晚刷牙饭后漱口，工作前不吃大蒜韭菜等有异味的食物，可随身携带口气清新剂，感冒时戴口罩避免传染。身体卫生方面，应勤洗澡保持身体无异味，不使用浓烈香水（医院环境敏感且可能引起部分患者不适），勤换衣服保持衣物清洁，出汗多时及时更换。

---

统一着装对于陪诊师来说是展示专业形象的重要手段，它具有多方面的积极意义。首先是**识别性**，统一着装让客户一眼就能认出你是陪诊师，便于寻求帮助；其次是**专业性**，统一着装体现这是正规服务，区别于随意穿着的普通访客；再次是**规范性**，着装规范是服务规范的外在表现，反映公司的管理水平；此外还有**平等性**，统一着装消除个人差异，统一服务形象；最后是**自律性**，穿上工装就进入工作状态，提醒自己保持专业态度。

着装基本规范需要男女分别遵守，确保整体形象专业得体。**男士标准着装**方面，上装应选择公司统一的工作T恤或衬衫，颜色以藏蓝、深灰、黑色为主，面料挺括不易起皱，保持干净整洁无污渍无破损，衬衫领口袖口保持干净；下装应选择深色西裤或休闲裤，牛仔裤可以但需干净整洁无破洞，裤子长度适中不拖沓，系皮带样式简洁；鞋子应选择深色皮鞋或休闲鞋，保持干净定期擦拭，不穿拖鞋凉鞋运动鞋，鞋底要防滑（医院地面可能有水）；配饰方面可佩戴普通手表，不戴夸张项链手链，不戴耳环，不纹身外露。

**女士标准着装**方面，上装应选择公司统一的工作T恤或衬衫，颜色以藏蓝、深灰、黑色、浅蓝为主，保持干净整洁无污渍无破损，不穿暴露或过于紧身的衣服，不穿低胸露肩露背装；下装应选择深色西裤或西裙，裙子长度在膝盖附近不过短，穿裙装时配肉色或黑色丝袜无破洞，不穿超短裙短裤；鞋子应选择深色皮鞋或布鞋，低跟或平跟方便行走，不穿高跟鞋（不安全且累），不穿拖鞋凉鞋，鞋底防滑；配饰方面可佩戴简洁的耳钉（一对）和普通手表，不戴夸张首饰，项链不外露。

工装管理规范确保着装始终保持最佳状态，延长服装使用寿命同时维护专业形象。日常管理方面，工装要勤洗勤换保持干净，定期检查有破损及时修补或更换，不擅自修改工装款式，不在工装上乱涂乱画，下班后及时更换保持工装整洁。特殊场景着装方面，冬季时工装外可穿统一的外套或大衣，进入医院室内可脱下外套，保持整体着装协调，不穿过于臃肿的羽绒服；夏季时选择透气吸汗的面料，注意走光问题，办公室可备一件外套（医院空调可能较冷），不穿过于暴露的夏装；疫情期间按要求佩戴口罩，可佩戴护目镜面屏，勤洗手注意防护，可佩戴一次性手套。

---

仪态举止是职业形象的重要组成部分，通过得体的身体语言展现专业素养。**标准站姿**要求头正（两眼平视前方，下颌微收）、肩平（双肩放松，稍向下沉）、胸挺（胸部挺起，腹部收紧）、腰直（腰背挺直）、臂垂（双臂自然下垂于身体两侧）、腿并（两腿并拢直立）、脚平（双脚脚跟靠拢，脚尖呈V字形或与肩同宽）。需要避免的禁忌站姿包括弯腰驼背无精打采、双手叉腰或抱胸、身体歪斜靠在墙上、手插口袋或摆弄东西、抖动腿脚或身体晃动、与患者站着说话时距离过近或过远。服务场景中的站姿应用也很重要：等候患者时应保持标准站姿耐心等候；与患者交谈时应保持适当距离（1米左右）身体微前倾；听医生说话时应站姿端正认真倾听；排队等候时应保持良好站姿不东张西望。

**标准坐姿**要求入座轻稳，坐椅子的三分之二，上身保持挺直，双膝并拢（女性）或与肩同宽（男性），双手自然放在膝上或桌上，离座时轻缓不发出声响。需要避免的禁忌坐姿包括瘫坐在椅子上、跷二郎腿且抖腿、双腿叉开过大、脚踩在其他物品上、手托腮或趴在桌上、频繁挪动椅子发出声响。服务场景中的坐姿应用包括：候诊时应端正就坐不东张西望；陪患者说话时身体微倾表示关注；等候检查时应安静就坐可适当查看资料。

**标准走姿**要求上身挺直头正肩平，双眼平视前方，手臂自然摆动幅度适中，步伐稳健步幅适中，脚步轻盈不发出过大声响。陪诊服务对走姿有特殊要求：陪同患者时步伐要配合患者速度，患者行动不便时要放慢脚步，走在患者侧前方一步位置不时回头关注，上下楼梯过门槛时要提醒患者，人多拥挤时要注意保护患者。需要避免的禁忌走姿包括走路弯腰驼背、步伐过快或过慢、脚步过重声响过大、东张西望左顾右盼、走路时看手机（危险且不专业）、抢在患者前面走不顾及患者。

**手势**是仪态举止的重要补充，恰当的手势能够增强沟通效果。**引导手势**要求五指并拢掌心向上，手臂自然弯曲指向目标方向，同时配合语言说明。**递接物品手势**要求双手递接表示尊重，文字朝向对方，尖锐物品尖端朝向自己，递水杯时握住杯柄。需要避免的禁忌手势包括用手指指人、手势幅度过大、摆弄手指或指甲、双手抱胸（有距离感）、叉腰（有攻击性）、手插口袋（不礼貌）。

---

### 【本章小结】

职业形象是陪诊师建立信任的第一步，包括仪容仪表、着装规范、仪态举止等多个方面。干净整洁的仪容、专业规范的着装、得体的仪态举止，共同构成了陪诊师的专业形象，能够快速获得患者和家属的信任。

## 第二章 沟通礼仪与话术技巧

沟通是陪诊师与患者建立信任、传递信息的核心技能，良好的沟通能够大大提升服务质量和客户体验。**沟通的3V原则**揭示了有效沟通的构成要素：Visual（视觉）占沟通效果的55%，包括面部表情、肢体语言、眼神交流和外观形象；Vocal（声音）占沟通效果的38%，包括语速、音量、语调和语气；Verbal（语言）占沟通效果的7%，包括说话内容、用词选择和逻辑表达。这一原则给我们的启示是：沟通不仅是说什么，更重要的是怎么说，你的表情、声音和肢体语言比说话内容更重要。

**有效沟通的7C原则**为陪诊师提供了全面的沟通指南。首先是**Clear（清晰）**，要求表达清晰不模糊，使用简单易懂的语言，避免专业术语和缩写，一句话只说一个意思，重要内容重复强调。其次是**Concise（简洁）**，要求言简意赅不啰嗦，不说废话套话，重点突出层次分明，长话短说避免冗长，不重复相同内容。再次是**Complete（完整）**，要求信息完整不遗漏，说清楚时间地点人物事情，不遗漏关键信息，必要时确认对方是否听清。第四是**Correct（正确）**，要求信息准确不误导，不传递虚假信息，不确定的不说不猜测，专业问题建议咨询医生。第五是**Courteous（礼貌）**，要求态度礼貌尊重对方，使用礼貌用语，尊重患者的感受，不打断对方说话。第六是**Concrete（具体）**，要求表达具体不抽象，用具体事例说明，给出明确的指引，避免模糊的表述。第七是**Considerate（体贴）**，要求换位思考体谅对方，站在患者角度考虑，理解患者的焦虑情绪，适时给予安慰和支持。

倾听是沟通中最重要的技能之一，认真倾听能够体现对患者的尊重并准确理解患者需求。倾听之所以重要，是因为倾听是对说话者的尊重，只有认真听才能准确理解对方的意思，良好的倾听能让对方愿意多说，倾听还能发现对方的真实需求。**有效倾听的技巧**包括四个方面：**专注倾听**要求看着对方的眼睛（不回避但也不盯着看），身体微向前倾表示关注，不做其他事情（不看手机、不东张西望），适时点头表示在听；**不随意打断**要求让对方把话说完，即使有不同意见也要等对方说完，插话前先说“不好意思打断一下”；**适时回应**可以用“嗯”、“是的”、“我理解”等词语，重复对方的关键词确认理解，用“您是说...对吗？”确认理解；**同理心回应**可以说“我理解您的心情”、“换成是我也会着急的”、“您肯定很担心吧”。倾听的禁忌包括假装在听实际在想自己的事、边听边做其他事情、频繁打断对方说话、急于发表自己的意见、听的时候皱眉头或面露不耐烦。

---

语言表达是陪诊师展示专业素养的重要窗口，恰当的语言能够拉近与患者的距离。**礼貌用语的使用**是基本功，基本礼貌用语包括问候语（您好、早上好、下午好、欢迎您）、感谢语（谢谢、非常感谢、麻烦您了、谢谢您的配合）、道歉语（对不起、不好意思、让您久等了、非常抱歉）、请求语（请...、麻烦您...、可否请您...、劳驾...）、告别语（再见、您慢走、祝您早日康复、有需要随时联系我）。使用礼貌用语要把握四个要点：真诚（发自内心不是敷衍）、及时（该用时就要用）、适度（不过度不失礼）、自然（融入日常对话不生硬）。

**称谓的艺术**体现对患者的尊重，使用恰当的称谓能够让患者感到被重视。通用称谓包括先生/女士（最安全的称呼）、叔叔/阿姨（对老年人）、小朋友/同学（对儿童青少年）、老师（对知识分子或不确定职业的尊称）。需要避免的称谓包括“喂”、“那个”（不礼貌）、“老头”、“老太婆”（不尊重）、直呼其名（除非很熟）、“病人”（太冷冰冰，应说“患者”或直接称呼）。称谓技巧方面，初次见面用尊称，熟悉后可以更亲切但保持尊重，观察对方习惯顺应对方偏好，不确定时可以问“请问我怎么称呼您比较合适？”

**语速、音量、语调的控制**直接影响沟通效果，需要根据不同情况灵活调整。语速控制方面，正常语速为每分钟120-150字，对老年人和听力不好的人要放慢，说重要信息时要放慢，不要太快（对方听不清）也不要太慢（让人着急）。音量控制方面，以对方能听清为宜，医院环境要适当放低，对听力不好的人适当提高，不要大声嚷嚷（不礼貌且影响他人），也不要太小声（对方听不清）。语调控制方面，语调要温和亲切，有适当的抑扬顿挫不要太平淡，表达关心时语调要轻柔，强调重要信息时语调可以略高，避免生硬冷冰冰的语调。

**赞美与鼓励的技巧**能够增强患者的信心和配合度，真诚的赞美不花钱但价值连城。赞美的重要性体现在：赞美能让对方心情愉快，赞美能拉近彼此距离，赞美能增加对方的配合度。有效赞美的技巧包括：**具体而不空泛**，不好的是泛泛地说“您真棒”，好的是具体地说“您今天状态真好，比上次精神多了！”；**真诚而不虚伪**，要发自内心不夸大其词不敷衍了事；**及时而不滞后**，发现优点立即赞美，配合好后立即肯定。常用赞美和鼓励话术包括：“您今天气色真好！”、“您理解得真快！”、“您配合得真好！”、“别担心，一切都会顺利的！”、“检查结果很好，您可以放心了！”、“您比上次好多了，继续加油！”

---

**常用服务话术模板**帮助陪诊师在不同场景下得体表达，提升服务的专业度和客户满意度。**见面接待话术**用于初次接触，包括初次见面时说“您好！我是今天陪您就诊的陪诊师小李，这是我的工作证。您是王阿姨吧？咱们又见面了，今天感觉怎么样？”；接站接人时说“您好！请问是张先生吗？我是陪诊师小李，您一路辛苦了！东西重不重？我来帮您拿吧。咱们现在去医院，大概需要20分钟车程。”；确认需求时说“我先跟您确认一下今天的安排：咱们今天是看心内科李主任的号，时间是上午10点。主要是复查血压和心脏情况，对吗？您还有其他需要我帮忙的吗？”

**就诊过程话术**用于候诊和就诊环节，包括候诊等待时说“我们前面还有3位患者，大概需要等40分钟左右。您先坐这儿休息一下，我去给您倒杯水。要是觉得累可以靠一会儿，快到号了我叫您。”；医生叫号时说“王阿姨，叫到我们的号了，咱们进去吧。别紧张，我陪着您呢。一会儿您有什么问题都可以问医生，我帮您记下来。”；就诊中协助沟通时说“李主任，我是患者的陪诊师。患者主要是这两周血压有点不稳，早晨起来经常头晕，您帮忙看看是不是需要调整用药？”；就诊后确认医嘱时说“王阿姨，刚才医生说的我都记下来了，我跟您再说一遍：第一，降压药改成每天早上吃两片；第二，下周再来复查一次；第三，注意低盐饮食，少盐少油。您看我记的对吗？还有什么不明白的吗？”

**结束服务话术**用于服务收尾，包括服务结束道别说“王阿姨，今天的就诊就全部结束了，药也取好了，用法用量我都写在药盒上了。您回家记得按时吃药，下周复诊时间我提前提醒您。回去路上注意安全，祝您早日康复！”；服务满意度确认时说“张叔叔，今天的服务您还满意吗？有什么我做得不好的地方您尽管提，我以后改进。要是您觉得我服务还可以，麻烦帮我在平台上给个好评，谢谢您了！”；跟进回访时（第二天电话回访）“王阿姨您好，我是小李。昨天看完病回家一切都顺利吧？药按时吃了吗？有没有什么不舒服？有任何问题随时给我打电话啊。”

**特殊情况话术**用于应对突发状况，包括患者情绪焦虑时说“我特别理解您的心情，换成是我也会担心的。不过您看，我们已经找到最好的专家了，现在医学这么发达，肯定会有办法的。您先别太着急，咱们一步一步来。”；候诊时间太长患者不耐烦时说“真是不不好意思让您等这么久，今天患者确实比较多。我再去看看前面还有几位，争取尽量早点到我们。您先喝点水，再耐心等一会儿，谢谢您的理解。”；需要排队较长时间时说“这个检查今天人比较多，大概需要排一个半小时队。我在这里排队，您先去那边椅子上坐着休息，快到了我去叫您。这样您就不用站着累了。”；患者行动不 便时说“您慢点儿，不着急，我扶着您。前面有个台阶，小心脚下。来，我帮您拿着包，您扶好扶手。”

---

### 【本章小结】

沟通是一门艺术，也是陪诊师最重要的技能之一。遵循沟通的基本原则，掌握礼貌用语、恰当称谓、语速语调控制、赞美鼓励等语言技巧，熟练运用各种服务场景的话术模板，能够大大提升服务质量和客户满意度。

## 第三章 医患沟通中的注意事项

医患沟通是陪诊服务中的重要环节，妥善处理与医生的关系对于顺利就诊至关重要。**尊重医生的专业权威**是医患沟通的基础，医生是专业人士，医学知识是多年学习和积累的，医生工作繁忙压力大需要被理解和尊重，尊重医生才能获得更好的沟通效果，和谐的医患关系对患者最有利。**尊重医生的具体体现**包括四个方面：**遵守就诊秩序**要求按号就诊不插队，不随意闯入诊室，不在诊室外大声喧哗，一个患者看完再进下一个；**珍惜医生时间**要求提前准备好要问的问题，说话简洁不啰嗦，不东拉西扯说与病情无关的事，不问过于宽泛的问题；**信任医生专业**要求不随意质疑医生的诊断，不拿网上搜来的信息跟医生辩论，有疑问礼貌请教不是质问，不信任可以换医生但不要当场争执；**表达感谢**要求医生看完后说声“谢谢医生辛苦了”，医生加班加点时表示理解，治疗效果好时真诚感谢。

**诊室沟通礼仪**需要陪诊师特别注意，因为诊室是医生工作的核心区域。**进入诊室**时要轻轻敲门得到允许再进入，进门后问好“医生您好！”，随手关门（保护患者隐私），不将无关人员带入诊室。**诊室内行为**要求患者坐下陪诊师站在患者侧后方，不抢话让患者先叙述病情，患者叙述不清楚时适当补充，认真听医生说话及时记录重点，不打断医生说话，手机静音不在诊室接电话。**与医生对话的技巧**方面，提问时要提前准备好问题清单，一个问题得到解答后再问下一个，使用开放性问题如“医生，这个药有什么需要注意的吗？”，不使用质问语气如“你怎么连这个都不知道？”；确认时要医生说完后重复确认“您是说每天吃两次，每次一片对吗？”，重要信息可以让医生写下来，不明白的及时问不要不懂装懂；结束沟通时要问完所有问题礼貌致谢“谢谢医生，耽误您时间了！”、“医生您辛苦了！”，轻轻带上门离开。

**处理医患矛盾的技巧**是陪诊师必须掌握的重要技能，常见可能出现矛盾的场景包括候诊时间太长患者不满、医生态度不好患者生气、诊疗意见患者不认同、检查结果不满意等。陪诊师在矛盾中的**角色定位**很重要：不是法官不评判谁对谁错，不是辩手不帮任何一方争吵，是协调者帮助双方理性沟通，是缓冲器避免矛盾升级。**处理矛盾的步骤**包括四个阶段：**及时隔离**要求先把患者带离冲突现场，用“咱们先出去，我跟您慢慢说”安抚，避免在诊室或走廊争吵；**安抚情绪**要求先处理情绪再处理问题，用“我理解您现在很生气，换做是我也会不高兴的”表达理解，让患者把情绪发泄出来；**理性分析**要求等情绪平复后分析问题，客观说明情况不偏袒任何一方，可以说“今天患者确实比较多，医生也在加班加点看”或“医生可能确实有点着急，但他说的治疗方案是对的”；**解决问题**要求提出可行的解决方案，如“我去跟医生说说，看能不能帮您再加个号？”或“如果您对这个方案不放心，我可以帮您约个专家再看看”。处理矛盾的禁忌包括火上浇油帮患者骂医生、反过来指责患者不对、站在一边看热闹、让矛盾升级为肢体冲突、参与医闹或过激行为。

---

与患者及家属的有效沟通需要深入理解患者的特殊心理状态，采取有针对性的应对策略。**患者常见的心理特点**主要包括四种：**焦虑恐惧**表现为对疾病的担心、对检查治疗的恐惧、对未知的不安、对费用的担忧，应对方式是多给予安慰和鼓励，详细解释流程减少不确定感，用成功案例增强信心，陪伴就是最好的安慰；**脆弱敏感**表现为情绪容易波动、对他人态度很敏感、容易想多往坏处想，应对方式是说话更加小心谨慎，多观察患者情绪变化，避免刺激患者的话语，多给予积极的心理暗示；**依赖心理**表现为对医生和陪诊师产生依赖、什么都希望帮忙做、难以自己做决定，应对方式是给予适当的支持，鼓励患者保持独立性，引导患者自己做决定，不过度包办代替；**易怒情绪**表现为一点小事就发火、把情绪发泄到陪诊师身上、情绪来得快去得也快，应对方式是理解这是疾病带来的不是针对陪诊师，不与患者计较不顶嘴，等情绪过去再沟通，适当转移注意力。

**沟通中的同理心表达**是建立信任的关键，同理心就是站在对方角度思考，理解对方的感受，并且把这种理解表达出来。同理心不同于同情心：同情心是“”你真可怜”（居高临下），而同理心是“我能理解你的感受”（平等尊重）。**同理心表达的步骤**包括三个阶段：**观察和倾听**要求观察对方的情绪，认真听对方说什么，理解对方为什么会有这样的感受；**表达理解**要求说出对方的感受，可以说“您现在肯定很担心吧？”或“遇到这种事谁都会着急的”；**表达支持**要求让对方知道你在支持他，可以说“别担心，我会陪着您的”或“有什么需要随时告诉我”。常用同理心话术包括：“我特别理解您的心情”、“换成是我也会担心的”、“您肯定很不容易”、“我知道您现在很难受”、“别着急，咱们一起想办法”。

**避免沟通中的雷区**是陪诊师必须牢记的，**绝对不能说的话**包括六类：**冷漠的话**如“不知道”、“别问我，问医生去”、“跟我说没用”，正确说法是“这个问题我帮您问问医生”；**不耐烦的话**如“怎么这么多问题”、“刚才不是说过了吗”、“你怎么回事啊”，正确说法是“没关系，我再跟您说一遍”；**负面的话**如“你这个病麻烦了”、“这个检查很疼的”、“你怎么才来啊，早干嘛去了”，正确说法是“现在医疗技术很发达，会有办法的”；**评判的话**如“你这就是自己吓自己”、“早听医生的就不会这样了”、“你怎么这么不听话”，正确说法是“我们听听医生怎么说”；**承诺的话**如“放心，肯定能治好”、“这个医生一定能看好你的病”、“做完这个检查就没事了”，正确说法是“我们尽力配合医生治疗”；**泄露隐私的话**如“这个病我之前陪别人也看过”、“某某名人也得这个病”、“你这个病会不会传染啊”，应该尊重患者隐私不议论病情。

---

医院环境中的沟通礼仪有其特殊性，需要陪诊师特别注意细节。**保持安静的环境**对医院非常重要，因为患者需要休息，医生需要专注工作，嘈杂的环境影响患者情绪，安静是对他人的尊重。具体做法包括说话尽量轻声，不在走廊大声交谈，手机调至静音或震动，不在公共区域打电话，走路脚步放轻，轻开轻关门，提醒陪同家属保持安静。

**保护患者隐私**是法律要求也是职业道德，隐私保护的重要性体现在病情是患者的隐私受法律保护，保护隐私是对患者的尊重，泄露隐私可能造成严重后果。具体做法包括不在公共场合谈论患者病情，不在电梯里走廊上讨论检查结果，与医生沟通时关好诊室门，患者的病历资料妥善保管，不随意翻看患者的检查报告，不向第三方透露患者信息，不在朋友圈或社交媒体发布患者信息。

**与其他工作人员的沟通**体现陪诊师的专业素养。与护士沟通时应礼貌称呼“护士您好！”，不要叫“服务员”或“那个护士”，护士工作繁忙尽量一次性说清楚问题，问题解决后说声谢谢，理解护士工作的辛苦。与挂号收费人员沟通时应提前准备好相关证件和钱，按顺序排队不插队，说话客气礼貌，遇到系统问题耐心等待不要指责工作人员，有问题好好沟通。与其他陪诊师沟通时应同行之间互相尊重，不互相贬低不抢单，可以交流经验互相学习，遇到问题可以互相帮助，共同维护行业形象。

---

### 【本章小结】

医患沟通是陪诊服务的重要内容。与医生沟通要尊重专业、遵守秩序、珍惜时间；与患者沟通要理解患者的特殊心理状态，运用同理心表达，避开沟通雷区；在医院环境中要保持安静、保护隐私、与其他工作人员礼貌沟通。

## 第四章 不同场景下的礼仪要求

不同服务场景有不同的礼仪要求，陪诊师需要灵活应对各种情况。**门诊就诊礼仪**贯穿患者就医的全过程，每个环节都有相应的礼仪要点。**预约挂号环节**要求提前预约提醒患者就诊时间，告知需要携带的资料（身份证、医保卡、病历、检查报告等），提醒空腹等特殊要求，就诊前一天再次确认提醒。**签到取号环节**要求提前到达医院预留充足时间，帮患者取号确认诊室位置，告知大概等候时间，安排患者在合适位置休息等候。**候诊等待环节**要求陪同患者等候不擅自离开，随时关注叫号情况，患者需要去卫生间时陪同或告知位置，候诊时可以聊天安抚但保持安静，不催促医生不在诊室门口张望。**诊室就诊环节**要求叫号后陪同患者进入诊室，帮患者整理好病历资料递给医生，站在患者侧后方不影响医生，患者叙述不清时适当补充，认真记录医嘱不明白及时确认，就诊结束感谢医生带好所有物品。**检查检验环节**要求提前了解检查位置和注意事项，告知检查大概需要的时间，陪同排队等候可让患者坐着休息，检查前再次确认注意事项（如空腹、憋尿等），检查中在外面等候不擅自进入检查室，检查结束提醒患者拿好随身物品。**缴费取药环节**要求可让患者休息自己去排队缴费，取药时核对药名数量用法，不清楚的问药师不要不懂装懂，把每种药的用法用量写清楚告诉患者，特殊药品注意事项重点强调。

**住院探视与陪护礼仪**需要遵守医院的特殊规定。**住院探视礼仪**方面，探视时间要遵守医院探视时间规定，避开患者休息和治疗时间，探视时间不宜过长（一般30分钟左右），不要太早或太晚探视；探视准备要提前与患者或家属联系确认方便，准备合适的礼品（水果、营养品等），了解患者病情避免说不该说的话，不在患者病情严重或情绪不好时探视；探视中要进病房先敲门，轻声问候说话声音放低，坐在床边椅子上不坐在病床上，多安慰鼓励少谈论病情，不影响其他患者休息，病房内其他患者休息时更加注意；特殊注意不要探视传染病人（除非做好防护），不带小孩去ICU等重症病房，不在患者面前流泪或表现难过，不随意触碰医疗设备。**住院陪护礼仪**方面，日常护理要协助患者洗漱进食时动作轻柔，注意保护患者隐私避免暴露，翻身擦身等操作注意遮挡，随时观察患者状态及时发现异常，护理前后洗手注意卫生；与医护配合要医生查房时在一旁站立等待，护士操作时不随意打扰，有问题等医护空闲时再问，对医护人员的服务表示感谢，不随意评论医护的工作；病房生活要保持患者个人卫生和床单位整洁，保持病房安静不大声说话，手机调静音不在病房打电话，看电视戴耳机或调小音量，不影响其他患者休息，注意个人卫生不在病房吃异味食物。

---

**接送与出行礼仪**体现陪诊师的服务周到程度。**接站接机礼仪**要求提前确认车次航班信息是否准点，提前到达等候不要让客人等，准备接站牌写上客人名字，了解客人样貌特征方便辨认；接到客人时要主动上前打招呼“您好！是张先生吗？我是小李，欢迎您！”，主动帮忙拎行李（重物为主），引导客人到停车场或乘车点；乘车礼仪要求为客人开车门用手挡住车门上沿，请客人先上车坐在后排，客人坐稳后再关门注意不要夹到客人，自己坐在副驾驶位置，行车中可以适当聊天但不影响司机开车，到达后先下车为客人开门；路上交流可以介绍一下城市和医院情况，了解客人的需求和安排，告知接下来的行程安排，回答客人的问题，气氛轻松愉快不冷场。

**陪同出行礼仪**需要根据不同的交通方式采取相应措施。步行陪同时走在患者侧前方一步距离，速度配合患者步伐，随时回头关注患者，遇到台阶门槛及时提醒，人多的地方注意保护患者，过马路时走在来车一侧保护患者。乘坐电梯时要按住电梯门请患者先进入，进入后站在按键附近方便操作，主动询问去几楼并按下，电梯内保持安静，到达时按住门请患者先出。乘坐公共交通时要协助患者上下车，帮患者找座位或安排优先座位，搀扶患者站稳扶好，保护患者的财物安全，提前告知下车站点。

---

**家庭访问礼仪**与医院服务有显著不同，需要陪诊师格外注意。**上门前准备**方面，提前预约要提前与患者或家属约好时间，确认具体地址和路线，告知大概需要多长时间，确认患者在家且方便接待；自身准备要求穿着整洁的工装，携带工作证件，准备好需要的资料和物品，不空手上门（可带少量水果等小礼品），注意个人卫生无异味；时间观念要求准时到达不迟到，也不要早到太多（可能对方还没准备好），如遇堵车等情况提前打电话说明，预计到达时间提前5分钟通知对方。

**上门服务礼仪**的各个环节都有讲究。进门时要按门铃或轻轻敲门，听到应答再进，进门后主动问好“张阿姨您好，打扰您了！”，主动换鞋或穿鞋套，不随意参观房间。就坐时要等主人招呼再坐下，坐在主人指定的位置，坐姿端正不瘫坐，不随意乱动主人家的物品，不东张西望。交流时要说话声音适中不影响家人，先说明来意和要做的事情，控制时间不要耽误太久，患者或家人倒水时起身道谢，不随意打听家庭隐私，不评论主人家的装修摆设等。告别时要事情办完后及时告辞不久留，说“那我就不打扰您休息了”，感谢主人的接待，出门时说“请留步，不用送了”，轻轻带上门。

---

### 【本章小结】

不同的服务场景有不同的礼仪要求。医院内服务要注意各环节的礼仪细节，接送出行要全程贴心照顾，家庭访问要尊重主人的生活习惯。掌握不同场景的礼仪规范，能够让服务更加专业周到，提升客户体验。

## 第五章 特殊人群沟通技巧

与特殊人群沟通需要根据其身心特点采取针对性的策略，陪诊师应当灵活应对。**老年人的身心特点**决定了沟通方式，**生理特点**包括视力下降看不清楚、听力下降听不清楚、记忆力减退容易忘事、行动迟缓反应变慢、身体疾病多经常不舒服；**心理特点**包括缺乏安全感需要更多关心、孤独感强希望有人陪伴说话、自尊心强希望被尊重、有些固执不愿意改变、容易焦虑担心、对死亡有恐惧。了解这些特点有助于陪诊师更好地理解老年患者的行为和情绪。

与老年人沟通需要掌握特定的技巧，**耐心是第一位**，说话速度要慢吐字要清晰，老年人反应慢要给足够的反应时间，没听清就重复一遍不要不耐烦，可以说“没关系，我再说一遍”，一遍不行就两遍两遍不行就三遍。**提高音量但不喊**方面，对听力不好的老人适当提高音量，但不是大喊大叫（不礼貌），要面对面说话让老人能看到嘴型，重要内容可以写下来，必要时附在老人耳边轻声说。**多用尊称表达尊重**方面，使用“叔叔”、“阿姨”、“爷爷”、“奶奶”等称呼，说话客气礼貌，多征求老人意见“您看这样行吗？”，不命令不指挥，用“我们现在去做检查好不好？”征询同意。**多倾听多陪伴**方面，老年人喜欢回忆往事耐心听他们说，适时回应“真的吗？”、“太不容易了！”，即使话题重复也要耐心听，陪伴本身就是最好的服务。**关注情绪多鼓励**方面，老人情绪低落时及时安慰，可以说“您今天气色真好！”、“您比上次好多了！”、“有我陪着您呢，不用担心”。**记忆力不好的应对**方面，重要事情多说几遍，写在纸上让老人带着，设置提醒闹钟，就诊前再次提醒注意事项，不要因为老人忘事而责怪。

与老年人沟通有明确的**禁忌行为**需要避免：说话太快老人跟不上、声音太小或太大喊、不耐烦打断老人说话、用“你怎么连这个都记不住”指责老人、把老人当小孩一样哄（要尊重）、在老人面前和别人小声说话（老人会多心）、频繁看手表（老人会觉得你嫌他麻烦）。

---

儿童就医是陪诊服务中的特殊场景，**儿童的心理特点**因年龄段而异。**婴幼儿（0-3岁）**对陌生人有恐惧感，容易哭闹，注意力时间短，对疼痛敏感。**学龄前儿童（3-6岁）**好奇心强喜欢提问，想象力丰富，怕打针吃药，需要表扬和鼓励。**学龄儿童（6-12岁）**开始有自己的想法，自尊心增强，怕被嘲笑，对疾病开始有认识，会担心影响学习。**青少年（12-18岁）**有叛逆心理，在意同龄人看法，希望被当作成年人对待，有隐私意识，担心疾病影响形象。

与儿童沟通需要采取不同的策略，**与婴幼儿沟通**时要态度温和面带微笑，说话声音轻柔，可以用玩具转移注意力，适当的肢体接触（征得家长同意），打针检查时可以适当遮挡不让孩子看到。**与学龄前儿童沟通**时要蹲下来说话与孩子视线齐平，用孩子能听懂的语言，可以说“咱们来做个游戏好不好？”，多表扬多鼓励“你真棒！真勇敢！”，可以适当给点小奖励（贴纸等），打针前如实告诉会有点疼但很快就好，不要骗孩子说“不疼”。**与学龄儿童沟通**时要把孩子当小大人对待，尊重孩子的意见，解释为什么要做检查，鼓励孩子勇敢面对，保护孩子的自尊心不在别人面前批评孩子，可以和孩子聊聊学校、兴趣爱好拉近距离。**与青少年沟通**时要尊重孩子的独立性和隐私，像朋友一样交流不摆架子，不把孩子当小孩教训，涉及隐私的检查要注意保护，不在家长面前追问孩子不愿说的问题，可以聊些青少年感兴趣的话题（游戏、明星等）。

**儿童就医安抚技巧**能够帮助孩子克服恐惧心理。**看病前心理建设**要提前告诉孩子要去医院，简单说明去做什么，不要用“不听话就带你去打针”吓唬孩子，可以说“医生会帮你检查一下，这样你就不难受了”。**检查中的安抚**要陪同在孩子身边，握住孩子的手，和孩子说话转移注意力，可以说“你看墙上这个画真好看”，数数唱歌分散注意力，及时表扬“你真棒！马上就好了！”。**检查后鼓励**要说“你今天真勇敢！”、“表现太好了，奖励你一个小贴纸！”，可以和建议和孩子约定给孩子一点小奖励。

---

**重症与绝症患者的沟通**是最具挑战性的场景，需要陪诊师具备高度的专业性和情商。**绝症患者心理变化的五个阶段**是由库伯勒-罗斯提出的经典理论：**否认期**表现为不相信诊断结果，到处检查求证，逃避现实，可以说“这不可能，肯定是误诊了！”；**愤怒期**表现为情绪激动易怒，可能会把愤怒发泄到别人身上，充满怨气和不满，可以说“为什么是我？这不公平！”；**协议期**表现为开始接受现实，与命运“讨价还价”，积极配合治疗抱有希望，可以说“让我好起来吧，我愿意...”；**抑郁期**表现为情绪低落沉默寡言，对什么都没兴趣，甚至有轻生念头，可以说“我还能活多久？还有那么多事没做...”；**接受期**表现为接受了现实，情绪相对平静，开始安排后事，可以说“好吧，既然这样...”。了解这些阶段有助于陪诊师理解患者的行为并采取适当的应对策略。

针对不同阶段的**沟通要点**各有侧重。**否认期**要不给急于让患者接受现实，给患者一些时间，不指责患者“你怎么不面对现实”，陪伴倾听让患者把情绪发泄出来，可以说“我理解您现在的心情”。**愤怒期**要理解愤怒是正常反应不是针对陪诊师，不要把患者的话往心里去，不反驳不争论，让患者把愤怒发泄出来，可以说“我知道您现在很难受”。**协议期**要鼓励患者积极配合治疗，给予患者希望，帮助患者完成心愿，不轻易承诺“一定能治好”，可以说“我们一起努力”。**抑郁期**要多陪伴少说话，有时默默陪伴比说什么都好，不要强迫患者“开心一点”，密切关注患者心理状态防止自杀风险，及时与家属和医生沟通。**接受期**要尊重患者的意愿，帮助患者完成未了的心愿，与患者谈论生死时保持坦然，帮助患者减少遗憾，不刻意回避死亡话题。

与重症患者沟通还有重要的**注意事项**：**真话与善意谎言的平衡**要求不一定非要把所有真相都告诉患者，根据患者的心理承受能力决定，家属的意见很重要，可以说“情况是有些严重，但我们会尽力的”，不要直接说“你没救了，还有三个月”。**不空洞地安慰**要求不说“别担心，会好起来的”（患者知道不会好），可以说“有什么我能帮您做的吗？”或“有什么您的心愿，我帮您完成”。**倾听最重要**要求让患者说出心里的话，不要急于安慰或给建议，有时只是倾听就足够了，握着患者的手默默陪伴。**关注生命质量**要求多谈论如何让患者过得舒服一点，帮助患者减少痛苦，谈论患者感兴趣的话题，帮助患者回顾人生找到意义。

---

### 【本章小结】

不同的人群有不同的身心特点，沟通方式也应有所不同。与老年人沟通要耐心、尊重、多陪伴；与儿童沟通要蹲下来说话、多表扬鼓励、根据不同年龄段调整方式；与重症患者沟通要理解其心理变化，在不同阶段采取不同的沟通策略，倾听和陪伴比说话更重要。

3. 面对绝症患者，你认为最难的是什么？如何克服？

## 第六章 礼仪沟通案例分析

### 案例一：耐心沟通化解老人的不信任

**案例背景**：张阿姨，72岁，第一次使用陪诊服务。女儿在外地工作，帮她约了陪诊师小王。张阿姨一辈子省吃俭用，觉得花钱请陪诊是浪费，对小王很不信任，态度冷淡，说话也不太客气。

**服务过程**：初次见面时张阿姨看到小王就说：“就是你啊，我女儿真是乱花钱，我自己能看病，不用你陪。你该干嘛干嘛去吧，我不用你。”小王没有生气，微笑着说：“阿姨，我理解您的想法，要是我可能也觉得没必要。不过您女儿也是工作太忙实在走不开，担心您一个人不方便。反正钱都已经付了，您就让我陪您一趟吧，就当多个伴，有个人帮您排队拿东西也好。您说呢？”张阿姨没再说什么，但还是不太搭理小王。候诊时张阿姨想喝水，小王默默去接了温水递过来。张阿姨说了声“谢谢”，态度缓和了一些。小王陪张阿姨聊天，得知她有高血压，经常头晕。小王说：“阿姨，您有高血压可得多注意，头晕的时候千万别自己出来，容易摔倒。今天有我陪着您，您就放心吧。”做检查时张阿姨听力不好，医生说话她听不清，总是问“你说什么？”医生有点不耐烦了。小王凑到张阿姨耳边，把医生的话一字一句大声说清楚，同时记录下来。张阿姨感激地说：“谢谢你啊小伙子，我这耳朵真是越来越不好使了，要不是你我都不知道医生说什么。”取药时小王把每种药的用法用量都用大号字体写在纸上，还在药盒上做了标记。张阿姨看着小王认真的样子，彻底放下了戒心。

**服务结果**：服务结束时，张阿姨拉着小王的手说：“小伙子，今天真是谢谢你了。一开始我还觉得请陪诊没用，现在看来真是太值了。以后我看病还找你！”后来张阿姨不仅自己成了常客，还介绍了好几个老姐妹。

**案例点评**：面对不理解和不信任时，保持耐心和微笑最重要；不要争辩，用实际行动证明自己的价值；站在对方角度说话，更容易获得认同；细节最能打动人，用心服务客户能感受到。

---

### 案例二：一句话引发的医患矛盾

**案例背景**：患者李先生因为腹痛到医院就诊，陪诊师小赵陪同。排队等了两个多小时，李先生本来就有点烦躁。终于叫到号了，医生简单问了几句就开了检查单，让去做B超。

**矛盾发生**：小赵看到检查单上写着“腹部B超”，随口问了一句：“医生，用不用憋尿啊？上次我陪另一个病人做B超好像要憋尿。”医生本来就忙，听了有点不高兴：“你是医生还是我是医生？用不用憋尿我不知道吗？”小赵也有点生气，回了一句：“我不就是问一下吗，至于这么大口气吗？”两人你一言我一语吵了起来。患者李先生本来就等得不耐烦，看到这种情况也加入进来指责医生态度不好，场面一度很混乱。最后虽然还是做了检查，但大家心情都不好，患者觉得医生服务差，医生觉得陪诊师不懂事，小赵也觉得很委屈。

**问题分析**：小赵的问题包括问问题的时机和方式不对，不应该用“另一个病人”做对比有质疑医生的意味，医生回了一句后不应该顶嘴。更好的做法是私下问医生“医生，麻烦问一下，这个B超有什么需要注意的吗？”，即使医生态度不好也不要当场顶嘴，可以事后再跟患者解释，不要当着患者的面和医生冲突。

**经验总结**：永远不要当着患者的面和医生争执，无论你觉得自己多有道理；问问题要谦虚，不要用质疑的语气；有矛盾私下解决，不要让患者夹在中间；你的言行代表专业形象，要学会控制情绪。

---

### 案例三：巧妙安抚哭闹的儿童

**案例背景**：5岁的小女孩朵朵因为发烧需要抽血化验，一看到护士拿出针就开始大哭，拼命挣扎，妈妈怎么哄都没用，场面很尴尬。陪诊师小陈在旁边，她是两个孩子的妈妈，很有经验。

**安抚过程**：小陈走过去，蹲下来，和朵朵视线齐平，温和地说：“朵朵，你好呀，我是陈阿姨。我知道你现在有点害怕，对不对？”朵朵哭着点点头。小陈继续说：“其实阿姨小时候也特别怕打针，每次都哭得特别大声，比你哭得还厉害呢！”朵朵停止了哭泣，好奇地看着小陈。小陈说：“后来我发现了一个秘密，其实打针就像被小蚂蚁咬了一下，就疼那么一下下，数三个数就好了。我们来试试好不好？你要是表现勇敢，阿姨这里有小贴纸奖励你哦！”小陈拿出准备好的卡通贴纸，朵朵眼睛亮了。小陈说：“来，我们把眼睛闭上，数1、2、3，数到3就好了。我陪着你呢，不怕！”在小陈的引导下，朵朵闭上眼睛，真的数起数来。护士趁这个机会快速扎针抽血，很快就完成了。朵朵睁开眼睛，惊讶地说：“真的不怎么疼！”小陈立刻表扬：“朵朵太棒了！真勇敢！来，这是给你的奖励，你要哪个贴纸？”朵朵开心地选了一个公主贴纸，刚才的害怕完全不见了。

**案例点评**：蹲下来说话与孩子视线齐平，减少距离感；同理心表达告诉孩子“我也害怕过”，让孩子觉得被理解；用孩子能听懂的语言解释，不欺骗也不恐吓；适当的奖励机制能有效激励孩子；转移注意力是很好的方法。

---

### 案例四：面对绝症患者的沉默陪伴

**案例背景**：王女士，45岁，晚期癌症患者。丈夫陪她来北京看病，陪诊师老周负责接待。来北京之前，王女士已经知道了自己的病情，情绪很低落，一路上很少说话。

**服务过程**：老周没有像对待其他病人那样热情地说很多话，只是默默地帮他们安排好住宿，第二天准时来接。就诊过程中，老周只是默默地帮着拿资料、排队，很少说话。等候检查的时候，王女士突然哭了起来，说：“我觉得特别没意思，治不治都一样，花这么多钱干嘛。”老周没有说“别担心，会好起来的”这种空洞的安慰，只是默默地递上纸巾，等王女士哭了一会儿，才慢慢地说：“我能理解你的感受。我妈当年也是这个病，那段时间她也特别难受。”王女士抬起头，看着老周。老周继续说：“但是你看，你丈夫这么陪着你，为你跑前跑后，你还有什么想做的事、想见的人，现在去做也不晚。至少咱们努力过了，以后不后悔。”王女士沉默了很久，然后点了点头。接下来的几天，老周还是话不多，但总是很贴心地照顾着。比如知道王女士胃口不好，特意帮她找了一家做家常菜的馆子；天气好的时候，建议他们去附近的公园走走。最后离开北京的时候，王女士的丈夫握着老周的手说：“谢谢你，这几天辛苦你了。你话不多，但我们都感受到你的用心了。”

**案例点评**：面对绝症患者，有时沉默的陪伴比千言万语更有力；不要空洞地安慰“会好起来的”，患者知道这不是真话；适当分享类似经历，能让患者觉得被理解；在生活细节上给予照顾，比说什么都重要；帮助患者面对现实，找到活下去的意义。

---

## 【课程总结】

本课程系统介绍了陪诊师职业礼仪的各个方面，包括职业形象与着装规范、沟通礼仪与话术技巧、医患沟通注意事项、不同场景礼仪要求，以及与老年人、儿童、重症患者等特殊人群的沟通技巧，并通过4个真实案例进行了深入分析。

**核心要点回顾**：职业形象是建立信任的第一步，7秒决定第一印象；沟通中视觉和声音比说话内容更重要；倾听比说话更重要，同理心是沟通的金钥匙；不同场景有不同的礼仪要求，要灵活应变；与特殊人群沟通要根据其身心特点调整方式。

**礼仪的本质**：礼仪不是刻板的规矩，而是发自内心的尊重和关心。真正的礼仪是让对方感到被尊重、让对方感到被理解、让对方感到舒服自在、让对方感受到你的真诚。

**下一步行动建议**：对照课程内容，检查自己的职业形象，找出需要改进的地方；录制自己服务时的说话声音，检查语速音量语调是否合适；整理一份不同场景的服务话术模板，勤加练习；在服务中有意识地运用同理心表达，观察对方的反应。

通过本课程学习，学员将掌握人体基本结构和生理常识，了解常见疾病的认知和预防，学会解读常见检查项目，掌握常用药物基本知识，具备化验单阅读入门能力，并能将这些知识运用到实际陪诊服务中。

## 第一章 人体基本结构与生理常识

人体是一个复杂而精密的有机整体，由化学元素、细胞、组织、器官和系统等多个层次构成，不同层次之间相互协调，共同维持生命的正常运转。**从化学水平来看**，人体由60多种元素组成，其中氧、碳、氢、氮四种主要元素占据了人体组成的96%，此外还有钙、磷、钾、硫、钠、氯、镁等元素参与构成人体的各种结构。**从细胞水平来看**，细胞是人体结构和功能的基本单位，人体约有40万亿至60万亿个细胞，这些细胞形态各异、功能分工明确，包括负责运动的肌细胞、传递信息的神经细胞、执行运输功能的血细胞等。**从组织水平来看**，形态相似、功能相同的细胞和细胞间质构成组织，人体主要有四大基本组织：上皮组织、结缔组织、肌肉组织和神经组织。**从器官水平来看**，不同组织有机结合形成具有一定形态和功能的器官，如心脏、肺、肝脏、肾脏、胃、大脑等。**从系统水平来看**，若干器官组合成系统，共同完成某一生理功能，人体共有九大系统协同工作。

人体九大系统包括：**运动系统**由骨、关节和肌肉组成，主要功能是运动、支持身体和保护内脏；**消化系统**包括口腔、食管、胃、肠、肝、胰等器官，负责消化食物和吸收营养物质；**呼吸系统**包括鼻、咽、喉、气管和肺，主要进行气体交换，吸入氧气并排出二氧化碳；**泌尿系统**包括肾、输尿管、膀胱和尿道，功能是排出代谢废物和多余水分；**生殖系统**包括男女内外生殖器，负责繁衍后代；**内分泌系统**包括垂体、甲状腺、胰岛、肾上腺等腺体，通过分泌激素调节代谢、生长发育等生理功能；**免疫系统**包括淋巴结、脾、胸腺和骨髓，主要功能是防御病原体入侵和清除体内异己物质；**神经系统**包括脑、脊髓和神经，负责调节和控制全身各系统的活动；**循环系统**包括心脏、血管和血液，负责运输营养物质和氧气，同时带走代谢废物。

人体重要器官分布在头部、胸部和腹部三个主要区域。**头部**的重要器官包括：大脑位于颅腔内，是控制全身活动的神经中枢；眼位于眼眶内，是视觉器官；耳位于颞骨内，是听觉和平衡器官；鼻位于面部中央，既是呼吸通道又是嗅觉器官；口位于面部下方，负责进食和言语功能。**胸部**的重要器官包括：心脏位于胸腔中部偏左、两肺之间，是循环系统的核心；肺位于胸腔两侧，左右各一，是气体交换的场所；气管位于胸腔前部，连接喉和肺；食管位于气管后方，连接咽和胃。**腹部**的重要器官包括：胃位于左上腹、食管下方，是消化系统的重要器官；肝位于右上腹、膈肌下方，是人体最大的实质性器官；胆囊位于肝下方，用于储存和浓缩胆汁；胰位于胃后方，分泌胰液和胰岛素；脾位于左上腹，是重要的免疫器官；肾位于腰部脊柱两侧，左右各一，是泌尿系统的核心器官；小肠位于腹腔中部，是消化吸收的主要场所；大肠围绕在小肠周围，主要功能是吸收水分和形成粪便。

## 第二章 重要生理指标与正常值

掌握重要生理指标的正常范围是理解人体健康状态的基础，这些指标包括生命体征、血液常规指标、生化指标以及其他生理参数。**体温是反映人体基础代谢状态的重要指标**，不同测量部位的正常值略有差异：腋下正常值为36.0至37.2摄氏度，口腔正常值为36.3至37.2摄氏度，直肠正常值为36.5至37.7摄氏度；当体温超过37.3摄氏度时称为发热，其中37.3至38摄氏度为低热，38.1至39摄氏度为中度发热，39.1至41摄氏度为高热，超过41摄氏度为超高热。**脉搏（心率）反映心脏跳动的频率**，成人安静状态下的正常值为每分钟60至100次，平均约72次每分；一般老年人偏慢，女性稍快，儿童较快；当心率低于每分钟60次时称为心动过缓，高于每分钟100次时称为心动过速。**呼吸频率**在成人安静状态下为每分钟12至20次，呼吸与脉搏之比约为1比4，低于每分钟12次为呼吸过缓，高于每分钟20次为呼吸过速。**血压包括收缩压（高压）和舒张压（低压）**，收缩压正常值为90至139毫米汞柱，舒张压正常值为60至89毫米汞柱；理想血压应低于120/80毫米汞柱，正常高值为120至139/80至89毫米汞柱，达到或超过140/90毫米汞柱可诊断为高血压，低于90/60毫米汞柱为低血压。

血液常规检查是临床最常用的基础检查项目，主要包括红细胞相关指标、白细胞相关指标和血小板相关指标。**红细胞相关指标**包括：红细胞计数（RBC）正常值男性为4.0至5.5乘以10的12次方每升，女性为3.5至5.0乘以10的12次方每升；血红蛋白（Hb）正常值男性为120至160克每升，女性为110至150克每升；红细胞压积（HCT）正常值男性为40%至50%，女性为35%至45%。**白细胞相关指标**包括：白细胞计数（WBC）正常值为4.0至10.0乘以10的9次方每升；白细胞分类中，中性粒细胞占50%至70%，淋巴细胞占20%至40%，单核细胞占3%至8%，嗜酸粒细胞占0.5%至5%，嗜碱粒细胞占0%至1%。**血小板相关指标**中，血小板计数（PLT）正常值为100至300乘以10的9次方每升。

生化检查反映人体重要脏器的功能状态，主要包括血糖、血脂、肝功能和肾功能等指标。**血糖指标**中，空腹血糖正常值为3.9至6.1毫摩尔每升，餐后2小时血糖应小于7.8毫摩尔每升，糖尿病诊断标准为空腹血糖大于等于7.0毫摩尔每升或餐后2小时血糖大于等于11.1毫摩尔每升。**血脂指标**中，总胆固醇（TC）应小于5.2毫摩尔每升，甘油三酯（TG）应小于1.7毫摩尔每升，低密度脂蛋白胆固醇（LDL-C）应小于3.4毫摩尔每升，高密度脂蛋白胆固醇（HDL-C）应大于1.0毫摩尔每升。**肝功能指标**中，谷丙转氨酶（ALT）和谷草转氨酶（AST）的正常值均为0至40单位每升，总胆红素（TBIL）正常值为3.4至17.1微摩尔每升，白蛋白（ALB）正常值为35至55克每升。**肾功能指标**中，肌酐（Cr）正常值男性为53至106微摩尔每升、女性为44至97微摩尔每升，尿素氮（BUN）正常值为2.9至8.2毫摩尔每升，尿酸（UA）正常值男性为208至428微摩尔每升、女性为155至357微摩尔每升。

其他常用的生理指标还包括**体重指数（BMI）**和**血氧饱和度**等。体重指数的计算公式为BMI等于体重（千克）除以身高（米）的平方，正常范围为18.5至23.9，低于18.5为偏瘦，24至27.9为超重，达到或超过28为肥胖。血氧饱和度正常值为95%至100%，低于95%为血氧降低，低于90%为低氧血症，需要立即就医处理。

---

### 【本章小结】

了解人体基本结构和生理常识是陪诊师的基础知识。人体由细胞、组织、器官、系统组成，有九大系统协同工作。掌握生命体征、血常规、生化等重要生理指标的正常值，能够帮助我们更好地理解患者的健康状况和检查结果。

## 第三章 常见疾病认知与预防

### 第一节 循环系统常见疾病

**高血压是最常见的慢性病之一**，被称为“无声的杀手”，早期可能没有明显症状，但血压持续升高会逐渐损害心、脑、肾等重要器官。高血压的诊断标准是收缩压大于等于140毫米汞柱或舒张压大于等于90毫米汞柱，按照血压水平可分为三级：1级高血压（轻度）为140至159/90至99毫米汞柱，2级高血压（中度）为160至179/100至109毫米汞柱，3级高血压（重度）为大于等于180/110毫米汞柱。**高血压的常见症状**包括头晕、头痛、颈项僵硬、疲劳、心悸、视力模糊和鼻出血等，但很多患者早期并无明显不适，仅在体检时发现。**高血压的危险因素**包括遗传因素、高盐饮食、肥胖、长期精神紧张、过量饮酒和缺乏运动等。**高血压的并发症**非常严重，主要包括脑卒中（俗称中风）、心肌梗死、心力衰竭、慢性肾病和视网膜病变等。**高血压的预防和日常注意事项**包括：低盐饮食，每天盐摄入量控制在5克以下；控制体重在正常范围内；规律进行适度的体育运动；戒烟限酒；保持心情舒畅、避免过度紧张；定期监测血压变化；遵医嘱坚持服药，不能擅自停药或换药。

**冠心病即冠状动脉粥样硬化性心脏病**，是由于冠状动脉狭窄或阻塞导致心肌缺血缺氧引起的疾病，是中老年人最常见的心脏病类型。**冠心病的常见类型**包括心绞痛、心肌梗死、无症状心肌缺血、缺血性心肌病和猝死等。**冠心病的典型症状**表现为胸痛，性质可为压榨感、紧缩感或烧灼感，同时伴有胸闷和气短，疼痛可放射至左肩、左臂、下颌和背部，常在劳累或情绪激动时诱发，休息或含服硝酸甘油后可缓解。**冠心病的危险因素**分为不可改变因素（年龄、性别、遗传）和可改变因素（高血压、高血脂、糖尿病、吸烟、肥胖、缺乏运动）。**冠心病发作时的急救要点**包括：立即停止活动，就地休息；舌下含服硝酸甘油；迅速拨打120急救电话；保持呼吸道通畅；有条件时给予吸氧。**冠心病的预防措施**包括：积极控制血压、血脂和血糖；彻底戒烟并限制饮酒；合理安排饮食，做到低油低盐；适度进行运动，但避免剧烈运动；保持情绪稳定，避免大喜大悲；冬季注意保暖，避免寒冷刺激；定期进行健康体检。

**心律失常是指心脏跳动的频率或节律出现异常**，表现为心跳过快、过慢或不规则。**心律失常的常见类型**包括早搏（分为房早和室早）、心动过速、心动过缓、房颤（心房颤动）和传导阻滞等。**心律失常的症状表现**多样，主要有心悸、心慌、心跳漏拍感，还可出现头晕、乏力和胸闷气短，严重时可发生晕厥。**心律失常患者的日常注意事项**包括：避免过度劳累和情绪激动；不饮用浓茶、咖啡和酒精等刺激性饮品；保持规律作息，坚决不熬夜；定期做心电图检查以监测心律变化；严格按照医嘱服用控制心律的药物。

### 第二节 内分泌代谢常见疾病

**糖尿病是一种以胰岛素分泌不足或作用缺陷为特征的慢性代谢性疾病**，会导致血糖升高。**糖尿病主要分为三种类型**：1型糖尿病表现为胰岛素绝对缺乏，多见于青少年患者，需要终身注射胰岛素治疗；2型糖尿病以胰岛素抵抗为主，多见于中老年人，占全部糖尿病患者的90%以上；妊娠糖尿病是指在妊娠期间发生的血糖异常。**糖尿病的典型症状概括为“三多一少”**：多饮表现为喝水明显增多；多食表现为食欲亢进、进食量增加；多尿表现为尿量增多；体重减少表现为体重逐渐下降。**糖尿病的诊断标准**为空腹血糖大于等于7.0毫摩尔每升，或餐后2小时血糖大于等于11.1毫摩尔每升，或随机血糖大于等于11.1毫摩尔每升并伴有典型症状。**糖尿病的并发症**分为急性和慢性两类：急性并发症包括酮症酸中毒和高渗昏迷，可能危及生命；慢性并发症包括糖尿病肾病、糖尿病视网膜病变（严重者可失明）、糖尿病足（严重者需截肢）、神经病变和心血管疾病等。**糖尿病的日常管理遵循“五驾马车”原则**：第一是饮食控制，控制每日总热量摄入，合理搭配各类营养素；第二是运动治疗，坚持适度运动有助于控制体重和改善胰岛素敏感性；第三是药物治疗，遵医嘱按时服用降糖药物或注射胰岛素；第四是血糖监测，定期监测血糖水平并做好记录；第五是健康教育，系统学习糖尿病相关知识。**糖尿病患者日常注意**事项包括：饮食要定时定量，避免暴饮暴食；避免空腹运动以防低血糖发生；随身携带糖果以备低血糖时急救使用；定期检查眼底、肾功能和足部情况；不能随意停药或调整药物剂量。

**高脂血症是指血液中脂质成分异常升高的状态**，包括高胆固醇血症和高甘油三酯血症等类型。**血脂指标的解读**如下：总胆固醇（TC）理想水平应小于5.2毫摩尔每升；甘油三酯（TG）理想水平应小于1.7毫摩尔每升；低密度脂蛋白胆固醇（LDL-C）被称为“坏胆固醇”，与动脉粥样硬化关系最为密切，水平越低越好；高密度脂蛋白胆固醇（HDL-C）被称为“好胆固醇”，具有保护血管的作用，水平越高越好。**高脂血症的危害**主要表现在：引发动脉粥样硬化，增加冠心病和脑梗塞的发病风险；导致脂肪肝的发生；严重高甘油三酯血症时还可诱发急性胰腺炎。**高脂血症的生活方式干预**包括：严格控制饮食，减少饱和脂肪和胆固醇的摄入；坚持规律运动，每周至少进行150分钟中等强度的有氧运动；积极控制体重，将BMI维持在18.5至23.9的正常范围；戒烟并限制饮酒；定期复查血脂水平以监测治疗效果。

### 第三节 呼吸系统常见疾病

**感冒和流感是常见的呼吸道疾病**，但两者在病原体、症状表现和严重程度上有明显区别。**普通感冒**主要由鼻病毒、冠状病毒等病原体引起，症状相对较轻，包括鼻塞、流涕、咽痛、咳嗽和低热等，传染性较弱，病程通常为5至7天。**流行性感冒（流感）**由流感病毒引起，症状明显较重，包括高热、剧烈头痛、全身肌肉酸痛和明显乏力，呼吸道症状相对较轻，传染性很强，容易造成爆发流行，病程可达7至14天，并发症包括肺炎和心肌炎等，严重时可致人死亡。**两者的区别要点**在于：流感的全身症状重而呼吸道症状轻，普通感冒则恰恰相反；流感常常伴有高热，而普通感冒多为低热或不发热。**预防流感的措施**包括：每年秋季接种流感疫苗；养成勤洗手的良好习惯；尽量避免前往人群密集的公共场所；保持室内空气流通；加强体育锻炼以增强体质。

**慢性阻塞性肺疾病（简称COPD）**是慢性支气管炎和肺气肿的总称，以持续性气流受限为特征，且呈进行性发展、不可逆转。**COPD的主要症状**包括慢性咳嗽、咳痰、气短或呼吸困难、喘息和胸闷，晚期还可出现体重下降和食欲减退等表现。**COPD的危险因素**中，吸烟是最主要的致病因素，此外还包括职业粉尘和化学物质暴露、空气污染、反复呼吸道感染以及遗传因素等。**COPD患者的日常注意**事项包括：坚决戒烟，这是最重要且最有效的措施；避免接触各种刺激性气体；积极预防感冒；必要时进行家庭氧疗；坚持呼吸功能锻炼；加强营养支持以改善机体状况。

---

### 第四节 消化系统常见疾病

**胃炎和消化性溃疡是常见的消化系统疾病**，根据病程和病因可分为不同类型。**急性胃炎**的常见病因包括不洁饮食、药物损伤、酒精刺激和应激反应等，主要症状有上腹部疼痛、恶心、呕吐和食欲不振。**慢性胃炎**主要由幽门螺杆菌感染、饮食不规律和药物因素等引起，主要表现为上腹不适、饱胀、嗳气和反酸等症状。**消化性溃疡**根据发病部位不同分为胃溃疡和十二指肠溃疡：胃溃疡表现为餐后疼痛，十二指肠溃疡表现为空腹痛和夜间痛，进食后疼痛可缓解；消化性溃疡的并发症包括出血、穿孔、幽门梗阻和癌变等。**胃病患者的日常注意**事项包括：规律饮食，定时定量，避免过饥过饱；避免摄入辛辣、刺激性食物；戒烟戒酒；尽量避免服用损伤胃黏膜的药物；保持心情舒畅，避免精神紧张和焦虑。

**脂肪肝是指肝细胞内脂肪堆积过多的病理状态**，轻者可以没有任何症状，严重者可发展为肝硬化。**脂肪肝根据病因分为两型**：酒精性脂肪肝由长期过量饮酒引起；非酒精性脂肪肝则与肥胖、糖尿病和高脂血症等因素密切相关。**脂肪肝的症状**表现：多数患者没有任何症状，往往在体检时被发现；部分患者可出现乏力和右上腹不适等症状；严重时可出现黄疸和肝功能异常。**脂肪肝的干预措施**包括：严格戒酒；积极控制体重；调整饮食结构，减少高脂肪食物摄入；增加有氧运动量；有效控制血糖和血脂水平；定期复查肝功能和肝脏B超。

---

### 第五节 骨关节常见疾病

**骨质疏松是一种以骨量减少、骨组织微结构破坏为特征的疾病**，会导致骨脆性增加，容易发生骨折。**骨质疏松的高危人群**包括：绝经后女性，由于雌激素水平下降导致骨量快速流失；老年人，随着年龄增长骨密度逐渐下降；缺乏运动者，骨骼缺乏机械刺激会加速骨量丢失；钙和维生素D摄入不足者；长期服用糖皮质激素的患者。**骨质疏松的常见症状**包括：腰酸背痛，这是最常见的首发症状；身高变矮和驼背，这是由于椎体压缩性骨折所致；容易发生骨折，常见部位包括髋部、脊柱和腕部。**骨质疏松的预防措施**包括：补钙，成人每日钙摄入量应达到800至1000毫克；补充维生素D，以促进钙的吸收和利用；坚持适度运动，有助于增加骨密度；多晒太阳，皮肤经阳光照射可合成维生素D；注意预防跌倒，特别是老年人要增强防摔意识。

**骨关节炎是以关节软骨退行性变为特征的疾病**，多见于中老年人，好发于膝关节、髋关节和脊柱等负重关节。**骨关节炎的主要症状**包括：关节疼痛，早期较轻，后期加重；疼痛在活动后加重，休息后可缓解；关节僵硬，尤其在晨起时明显，活动后可改善；关节活动受限，严重时影响日常活动；关节肿胀和畸形。**骨关节炎患者的日常注意**事项包括：严格控制体重，减轻关节负担；避免长时间站立、爬楼梯和爬山等加重关节负荷的活动；注意关节保暖，避免受凉；选择对关节友好的运动方式，如游泳和骑自行车等；必要时使用拐杖辅助行走，以减轻关节压力。

## 第四章 常见检查项目解读

### 第一节 实验室检查

**血常规检查是临床最常用的基础检查项目**，主要用于检查血液中各种细胞的数量和形态，能够辅助诊断感染、贫血和血液系统疾病等。**白细胞计数（WBC）**升高常见于细菌感染、炎症反应、应激状态和白血病，降低则见于病毒感染、化疗放疗后和自身免疫性疾病。**中性粒细胞百分比（NEUT%）**升高通常提示细菌感染或急性炎症，降低则可能为病毒感染或某些药物影响。**淋巴细胞百分比（LYMPH%）**升高常见于病毒感染和淋巴细胞白血病，降低见于免疫缺陷状态和激素治疗期间。**红细胞计数（RBC）和血红蛋白（Hb）**降低提示贫血，升高则见于红细胞增多症和脱水状态。**血小板计数（PLT）**升高可见于感染、出血后反应和血小板增多症，降低则见于血小板减少性紫癜、化疗后和再生障碍性贫血等。**陪诊师需要注意**：血常规结果需要结合临床症状综合判断，轻度异常不一定有病理意义，单次异常需要复查确认，如有疑问应建议患者咨询医生而不是自行诊断。

**生化检查是评估脏器功能的重要检查**，主要包括肝功能、肾功能、血糖和血脂等项目。**肝功能检查中的谷丙转氨酶（ALT）和谷草转氨酶（AST）**升高提示肝细胞损伤，常见原因包括病毒性肝炎、脂肪肝、药物性肝损伤和酒精性肝病，其中AST与ALT的比值大于2时提示酒精性肝病的可能。**胆红素（TBIL和DBIL）**升高可导致黄疸，直接胆红素升高为主时考虑梗阻性黄疸，间接胆红素升高为主时考虑溶血性黄疸。**白蛋白（ALB）**降低见于营养不良、肝硬化、肾病综合征和慢性消耗性疾病。**肾功能检查中的肌酐（Cr）**升高提示肾功能不全，其水平受肌肉量影响，老年人和消瘦者可能偏低；**尿素氮（BUN）**升高见于肾功能不全、高蛋白饮食、消化道出血和脱水等情况；**尿酸（UA）**升高见于痛风、肾功能不全、高嘌呤饮食和肿瘤等。**血糖检查中的空腹血糖（GLU）**正常值为3.9至6.1毫摩尔每升，6.1至7.0毫摩尔每升为空腹血糖受损（属于糖尿病前期），大于等于7.0毫摩尔每升可诊断糖尿病但需重复确认。**血脂检查中的总胆固醇（TC）和甘油三酯（TG）**升高提示高脂血症，甘油三酯极高时需警惕急性胰腺炎风险；**低密度脂蛋白胆固醇（LDL-C）**被称为“坏胆固醇”，与动脉粥样硬化关系最密切，根据心血管危险分层有不同的控制目标；**高密度脂蛋白胆固醇（HDL-C）**被称为“好胆固醇”，具有保护心血管的作用，其降低是心血管疾病的危险因素。

**其他常用的实验室检查还包括尿常规、大便常规和肿瘤标志物等**。**尿常规检查**可发现多种异常：尿蛋白阳性提示肾脏疾病可能；尿糖阳性提示糖尿病可能；尿红细胞阳性提示血尿，常见于结石、感染和肾炎等；尿白细胞阳性提示尿路感染；尿酮体阳性提示酮症，常见于糖尿病酮症和饥饿状态。**大便常规加潜血检查**中，白细胞阳性提示肠道感染，红细胞阳性提示下消化道出血，潜血阳性提示上消化道出血（需排除饮食因素的影响）。**肿瘤标志物检查**包括多种项目：甲胎蛋白（AFP）主要用于肝癌筛查，癌胚抗原（CEA）主要用于消化道肿瘤辅助诊断，CA199用于胰腺癌和胆道肿瘤筛查，CA125用于卵巢癌筛查，前列腺特异性抗原（PSA）用于前列腺癌筛查；需要特别注意的是，肿瘤标志物升高不等于患有肿瘤，正常也不能完全排除肿瘤，需要结合影像学检查和临床表现综合判断。

---

### 第二节 影像学检查

**X线检查是最常用、最基础的影像学检查方法**，利用X射线穿透人体后不同组织密度不同形成黑白对比影像。**X线检查的常用部位**包括：胸部X线（胸片）用于检查肺、心脏和肋骨，是呼吸系统和心血管疾病的基本筛查手段；骨骼X线用于检查骨折、关节病变和骨肿瘤；腹部平片用于检查肠梗阻、结石和消化道穿孔等急症。**X线检查前的注意事项**包括：检查前需摘除检查部位的金属物品，如项链、首饰和皮带扣等；拍摄胸片时需要深吸气后屏住呼吸以获得清晰图像；孕妇禁止进行X线检查；儿童检查时需要保护性腺部位。**X线的常见异常表现**包括：肺部阴影可见于炎症、结核和肿瘤；肺纹理增粗常见于支气管炎和长期吸烟者；骨折表现为骨皮质不连续；心影增大提示心脏扩大。

**CT检查即计算机断层扫描**，利用X线围绕人体旋转扫描，通过计算机重建出断层图像，分辨率比X线高，能够发现更细小的病变。**CT检查的常用部位**包括：头颅CT用于检查脑出血、脑梗塞、脑肿瘤和外伤等；胸部CT用于检查肺癌、肺炎、肺结核和纵隔病变等；腹部CT用于检查肝、胆、胰、脾、肾等腹部脏器的病变；脊柱CT用于检查椎间盘突出、骨折和脊柱病变。**CT分为平扫和增强两类**：平扫CT是普通扫描，不需要注射造影剂；增强CT需要静脉注射造影剂，使病变更清晰，有助于鉴别诊断。**CT检查前的注意事项**包括：摘除所有金属物品；增强CT需要空腹4至6小时；检查前应告知医生是否有碘过敏史；肾功能不全者慎做增强CT；孕妇禁止进行CT检查；增强CT检查后应多饮水以促进造影剂排出。**CT的优缺点**：优点是分辨率高、检查速度快、适用范围广；缺点是有辐射，辐射剂量比X线大。

**核磁共振（MRI）检查是利用磁共振现象成像的技术**，没有电离辐射，对人体无害，但检查费用较高。**MRI检查的常用部位**包括：头颅MRI对脑肿瘤、脑血管病和脊髓病变的显示比CT更清晰；脊柱MRI用于检查椎间盘突出、脊髓病变和脊柱肿瘤；关节MRI用于检查韧带、半月板和软骨损伤；腹部MRI特别适合肝脏病变的检查。**MRI检查前的注意事项**非常重要：绝对禁忌是体内有金属植入物，如心脏起搏器、人工耳蜗和金属异物等，金属物在磁场中会移动造成严重伤害；检查前需摘除所有金属物品，包括假牙、首饰、皮带、手表等；检查时间较长，通常需要15至60分钟，期间需要保持静止不动；检查过程中噪音较大，可以佩戴耳塞；幽闭恐惧症患者可能无法耐受。**MRI的优缺点**：优点是无辐射、软组织分辨率高、可进行多平面成像；缺点是检查时间长、费用高、有金属禁忌、噪音较大。

**B超检查是利用超声波反射成像的技术**，具有无辐射、无创、便捷和费用低等优点，是临床广泛使用的检查方法。**B超检查的常用部位**包括：腹部B超用于检查肝、胆、胰、脾、肾等实质脏器；泌尿系B超用于检查肾、输尿管、膀胱和前列腺；妇科B超用于检查子宫和卵巢；产科B超用于胎儿检查和孕期监测；心脏彩超用于评估心脏结构和功能；血管彩超用于检查颈动脉和四肢血管。**B超检查前的注意事项**：腹部B超需要空腹8小时以上以减少胃肠气体干扰；泌尿系和妇科B超检查前需要憋尿使膀胱充盈，以便更好地显示相关结构；经阴道B超检查需要先排空膀胱。**B超的优缺点**：优点是无辐射、无创、便捷、费用低、可实时动态观察；缺点是受气体干扰较大，图像清晰度有限，检查结果依赖操作者的经验和技术水平。

---

### 第三节 其他检查

**心电图检查是记录心脏电活动的图形**，是一种无创、便捷且应用广泛的检查方法。**心电图检查的目的**包括：诊断各种心律失常；诊断心肌缺血和心肌梗死；了解心脏是否扩大或肥厚；监测药物对心脏的影响；评估心脏起搏器的功能。**心电图检查前的注意事项**包括：检查前避免剧烈运动以免影响结果；放松心情，避免紧张情绪；保持安静环境；不要空腹检查，因为低血糖状态可能影响结果。**心电图的常见异常**包括：窦性心动过速或过缓；早搏（分为房早和室早）；房颤；ST-T改变提示心肌缺血可能；传导阻滞等。**陪诊师需要注意**：心电图反映的是检查当时心脏的电活动情况，是即时性的；心电图异常不等于患有心脏病，心电图正常也不能完全排除心脏病，需要结合症状和其他检查综合判断。

**内镜检查可以直接观察消化道黏膜病变**，主要包括胃镜和结肠镜两种。**胃镜检查**食管、胃和十二指肠黏膜，适用于上腹痛、反酸、吞咽困难、黑便、呕血和不明原因贫血等情况的患者；检查前需要空腹8至12小时；无痛胃镜通过静脉麻醉完成，检查过程中患者处于睡眠状态，但需要有人陪同；检查后2小时才能进食，无痛胃镜检查当天不能驾驶车辆。**结肠镜检查**结肠和直肠黏膜，适用于便血、腹痛、腹泻、便秘、大便习惯改变以及肠癌筛查等；检查前需要进行严格的肠道准备，通常需要服用泻药清洁肠道，检查前1至2天应进食少渣饮食；检查后应注意有无腹痛和便血等异常情况。

## 第五章 常用药物基本知识

### 第一节 药物基本知识

**药物是用于预防、治疗、诊断疾病，有目的地调节人体生理功能的物质**，正规药物都明确规定有适应症、用法和用量。**药物按照来源可分为三类**：天然药物包括中药、植物药和动物药等；化学药物是通过化学方法合成的药物；生物药物包括疫苗、抗体和细胞因子等。**药物按照处方管理可分为两类**：处方药（标记为Rx）必须凭医生处方才能购买和使用；非处方药（标记为OTC）不需要处方，可自行购买使用，相对较为安全。**药物按照给药途径可分为四类**：口服给药包括片剂、胶囊、颗粒和口服液等；注射给药包括静脉、肌肉和皮下注射等；局部给药包括外用软膏、滴眼剂、滴鼻剂和栓剂等；吸入给药包括气雾剂和雾化吸入等。

**药物的作用分为治疗作用和不良反应两类**：治疗作用是指能够达到防治疾病目的的作用；不良反应是指与治疗目的无关，给患者带来不适或痛苦的反应。**常见的不良反应类型包括**：**副作用**是在治疗剂量下出现的与治疗目的无关的反应，一般较轻微可以耐受，例如感冒药引起嗜睡、降压药引起头晕等；**毒性反应**是由剂量过大或用药时间过长引起的严重不良反应，对机体有明显损害，例如肝毒性、肾毒性和耳毒性等；**过敏反应**是免疫系统对药物的异常反应，与剂量无关而与个人体质有关，表现为皮疹、瘙痒、发热、哮喘，严重时可发生过敏性休克；**后遗效应**是停药后血药浓度已降至有效浓度以下但仍残存的药理效应，例如服用安眠药后第二天早晨仍有困倦感；**停药反应**是突然停药后原有疾病加重的现象，例如长期服用降压药突然停药导致血压反跳。

**影响药物作用的因素来自药物本身和机体两方面**。**药物方面的因素**包括：剂量，剂量越大作用越强但毒性也可能越大；剂型，不同剂型吸收速度不同；给药途径，不同途径的生物利用度不同，一般规律是静脉大于吸入大于肌肉大于皮下大于口服大于直肠大于皮肤。**机体方面的因素**包括：年龄，儿童和老年人对药物更敏感；性别，女性对某些药物更敏感；体重，体重大者可能需要较大剂量；病理状态，肝肾功能不全会影响药物的代谢和排泄；心理因素，安慰剂效应也会影响药物效果。**饮食对药物的影响**也不容忽视：空腹服药吸收快，饭后服药吸收慢但对胃刺激小；某些食物会影响药物吸收，例如钙会降低四环素的吸收；酒精会影响药物代谢，服药期间应避免饮酒。

### 第二节 常用药物分类及代表药

**心血管系统常用药物主要包括降压药、抗心绞痛药、调脂药和抗血小板药等**。**降压药根据作用机制分为五类**：第一类是钙通道阻滞剂（CCB），代表药物有硝苯地平、氨氯地平和非洛地平，降压效果明确、适用范围广，副作用包括头痛、面部潮红和脚踝水肿等；第二类是血管紧张素转换酶抑制剂（ACEI），代表药物有卡托普利、依那普利和贝那普利，对心肾有保护作用，适合合并糖尿病和肾病的患者，副作用是干咳（发生率约20%）和血管性水肿；第三类是血管紧张素Ⅱ受体拮抗剂（ARB），代表药物有氯沙坦、缬沙坦和厄贝沙坦，作用与ACEI类似但没有干咳的副作用；第四类是β受体阻滞剂，代表药物有美托洛尔和比索洛尔，能够减慢心率，适合合并冠心病和心衰的患者，副作用包括心动过缓、乏力和支气管痉挛等；第五类是利尿剂，代表药物有氢氯噻嗪、吲达帕胺和呋塞米，降压作用温和，常与其他降压药联合使用，副作用包括电解质紊乱、尿酸升高和影响血糖等。**抗心绞痛药物**包括硝酸甘油（舌下含服用于急救，缓解心绞痛急性发作）、硝酸异山梨酯（用于预防心绞痛发作）和美托洛尔（减少心肌耗氧）。**调脂药物**中，他汀类药物如阿托伐他汀和瑞舒伐他汀主要用于降低胆固醇，贝特类药物如非诺贝特主要用于降低甘油三酯。**抗血小板药物**中，阿司匹林用于心脑血管病的二级预防，氯吡格雷用于阿司匹林不能耐受或需要更强抗血小板作用的情况。

**内分泌系统常用药物主要包括口服降糖药和甲状腺疾病用药等**。**口服降糖药根据作用机制分为四类**：第一类是双胍类，代表药物是二甲双胍，是2型糖尿病的首选药物，不增加体重、不引起低血糖，副作用包括胃肠道反应和罕见的乳酸酸中毒；第二类是磺脲类，代表药物有格列本脲、格列美脲和格列齐特，能够促进胰岛素分泌、降糖作用强，副作用是低血糖和体重增加；第三类是α-葡萄糖苷酶抑制剂，代表药物有阿卡波糖和伏格列波糖，能够延缓碳水化合物吸收、降低餐后血糖，副作用是腹胀和排气增多；第四类是DPP-4抑制剂，代表药物有西格列汀和沙格列汀，作用温和、低血糖风险低、不影响体重。**胰岛素**是1型糖尿病患者必须使用的药物，2型糖尿病患者在口服药控制不佳时也需要使用，必须皮下注射，最大副作用是低血糖。**甲状腺疾病用药**包括左甲状腺素钠（优甲乐）用于甲状腺功能减退的替代治疗，通常需要终身服药，以及甲巯咪唑（他巴唑）用于治疗甲状腺功能亢进。

**呼吸系统常用药物主要包括止咳药、祛痰药、平喘药和感冒药等**。**止咳药**分为中枢性镇咳药（如右美沙芬，无成瘾性；可待因，有成瘾性）和外周性镇咳药（如那可丁）。**祛痰药**包括氨溴索、乙酰半胱氨酸和羧甲司坦等。**平喘药**包括β受体激动剂（如沙丁胺醇/万托林，用于急救；特布他林）、茶碱类（如氨茶碱、茶碱缓释片）、抗胆碱药（如异丙托溴铵）和激素吸入剂（如布地奈德、氟替卡松，用于控制气道炎症）。**感冒药**大多为复方制剂，同时包含解热镇痛、抗过敏、缩血管和镇咳等成分，使用时注意不要重复用药以免药物过量。

**消化系统常用药物主要包括抑酸药、胃黏膜保护剂、促胃动力药和泻药等**。**抑酸药**包括质子泵抑制剂（PPI），如奥美拉唑、兰索拉唑和雷贝拉唑，抑酸作用最强；还有H2受体拮抗剂，如法莫替丁和雷尼替丁，抑酸作用中等。**胃黏膜保护剂**包括硫糖铝、枸橼酸铋钾，以及铝碳酸镁（达喜），后者同时有中和胆汁的作用。**促胃动力药**包括多潘立酮（吗丁啉）、莫沙必利和伊托必利等。**泻药**分为三类：容积性泻药如乳果糖和聚乙二醇较安全，适合老年人和长期使用；刺激性泻药如番泻叶、大黄和酚酞作用较强，不建议长期使用；润滑性泻药如开塞露和甘油灌肠剂用于局部，适合急性便秘的处理。

**解热镇痛抗炎药是常用的对症处理药物**。**对乙酰氨基酚（扑热息痛、泰诺林）**具有解热镇痛作用，抗炎作用较弱，对胃刺激小，但过量可导致肝损伤，使用时注意不要超量服用。**布洛芬**同时具有解热、镇痛和抗炎作用，对胃有一定刺激，胃不好的人应谨慎使用。**阿司匹林**具有解热镇痛作用，小剂量使用时用于抗血小板、预防心脑血管病，对胃刺激较大，肠溶片相对好一些，哮喘和胃溃疡患者应慎用。

### 第三节 安全用药知识

**安全用药需要遵循一些基本原则**。**首先要遵医嘱用药**，不能自行增减药物剂量，不能自行停药，也不能自行换药，任何用药方案的调整都应该在医生指导下进行。**其次要按时按量用药**，一天服用3次的药物不是跟着三餐吃，而是每8小时服用一次，定时服药可以保持稳定的血药浓度从而保证疗效，如果漏服了一般想起时立即补服，但如果接近下次服药时间则应跳过本次，不要加倍服用。**第三要掌握正确的给药方式**，口服药物一般用温水送服，不要用茶水或饮料服用；肠溶片、缓释片和控释片不能掰开或嚼碎服用；舌下含服的药物如硝酸甘油应该放在舌下而不是吞服；外用软膏要按说明书使用，注意用量和疗程。**第四要注意饮食对药物的影响**，有些药物需要空腹服用（如吗丁啉、奥美拉唑），有些药物需要饭后服用（如对胃有刺激的药物），还有些药物不能与某些食物同服（如头孢类药物不能喝酒）。

**老年人用药需要特别注意**。**老年人用药的特点**包括：肝肾功能减退，药物代谢和排泄速度减慢，药物容易在体内蓄积；对药物敏感性增加，容易发生不良反应；常同时患有多种疾病，用药种类较多；记忆力减退，容易漏服或错服药物。**老年人用药原则**包括：受益原则，即确有必要才用药；五种药物原则，同时用药最好不超过5种；小剂量原则，从较小的剂量开始，逐渐增加；择时原则，根据时间生物学选择最佳给药时间；暂停用药原则，怀疑发生不良反应时及时停药观察。**特别提醒**老年人：不要自行购买所谓“特效药”或“偏方”；不要轻信广告宣传和病友推荐；定期清理家庭药箱，过期药物及时丢弃；用药前仔细阅读说明书；有疑问及时咨询医生或药师。

**常见的用药误区需要纠正**。**误区一是“是药三分毒，能不吃就不吃”**，正确的观点是该用的药必须用，例如高血压和糖尿病患者不能随便停药，不用药的后果往往比药物副作用严重得多。**误区二是“副作用大的药不是好药”**，正确的观点是副作用是药品的固有属性，不一定会发生在每个患者身上，医生选择药物时会权衡利弊，出现副作用应及时就医而不是自行停药。**误区三是“别人用着好的药我也能用”**，正确的观点是每个人的情况不同，适合别人的不一定适合自己，用药要个体化，不能盲目跟风。**误区四是“中药没有副作用”**，正确的观点是是药就有副作用，中药也不例外，很多中药有肝毒性或肾毒性，中药也需要在医生指导下使用。**误区五是“进口药、贵药就是好药”**，正确的观点是适合自己的才是好药，很多国产药效果很好且价格便宜，不应盲目迷信进口药。

## 第六章 化验单阅读入门

### 第一节 化验单阅读的基本原则

**正确认识参考值是解读化验单的基础**。参考值（正常值）是指健康人群中某项指标的数值范围，通常取95%可信区间，这意味着有5%的健康人检测结果也可能在正常范围之外，不同实验室和不同检测方法的参考值可能有所差异。**正确解读参考值需要注意**：在参考值范围内不一定完全正常，某些疾病的早期指标可能仍在正常范围内；超出参考值范围不一定有病，轻度异常可能没有临床意义；需要结合临床症状和其他检查综合判断，动态变化比单次结果更重要。

**影响检验结果的因素分为分析前、分析中和分析后三个方面**。**分析前因素占检验误差的60%至70%**，包括患者因素（如年龄、性别、饮食状态、剧烈运动、情绪紧张、体位变化、月经周期、妊娠以及吸烟饮酒等）和标本因素（如采集时间、采集部位、抗凝剂使用、标本溶血或脂血以及保存运输条件等）。**分析中因素占检验误差的10%至20%**，主要包括仪器性能、试剂质量和操作人员技术水平等。**分析后因素占检验误差的10%至20%**，包括结果审核、报告书写和结果解读等环节。

**化验单阅读的基本方法分为三步**。**第一步是看清基本信息**，包括患者姓名、性别、年龄、送检科室和诊断、检验日期和时间、标本类型等，这些信息有助于判断结果的可靠性。**第二步是逐项查看结果**，包括结果数值、与参考值对比、标注的异常符号（↑表示升高、↓表示降低、H表示高、L表示低）、注意单位等。**第三步是综合分析**，包括相关指标联合分析、与历史结果对比、结合临床症状判断，必要时咨询医生。

### 第二节 常见化验单解读实例

**血常规化验单的解读需要关注各项细胞指标的变化**。以一份典型报告为例：白细胞计数12.5乘以10的9次方每升（参考值4.0至10.0）升高，中性粒细胞百分比78%（参考值50%至70%）升高，淋巴细胞百分比18%（参考值20%至40%）相对降低，中性粒细胞绝对值9.75乘以10的9次方每升（参考值2.0至7.0）升高，红细胞计数、血红蛋白和血小板计数均在正常范围内；这份报告提示可能存在细菌感染，因为白细胞和中性粒细胞升高是细菌感染的常见表现，淋巴细胞相对降低是因为中性粒细胞升高所致，结合患者如有发热、咳嗽等症状，可支持感染的诊断。再以另一份报告为例：白细胞计数3.5乘以10的9次方每升降低，血红蛋白95克每升降低，血小板计数85乘以10的9次方每升降低，这三系均降低的情况需要高度警惕，可能提示再生障碍性贫血、骨髓增生异常综合征、白血病或脾功能亢进等疾病，必须进一步检查并建议患者到血液科就诊。

**生化化验单的解读需要结合多个指标综合分析**。以一份肝功能异常报告为例：谷丙转氨酶125单位每升（参考值0至40）升高，谷草转氨酶85单位每升（参考值0至40）升高，总胆红素25微摩尔每升（参考值3.4至17.1）升高，白蛋白38克每升在正常范围，γ-谷氨酰转肽酶95单位每升（参考值10至60）升高；这份报告显示转氨酶明显升高提示肝细胞损伤，可能原因包括病毒性肝炎、脂肪肝、酒精性肝病或药物性肝损伤，其中γ-谷氨酰转肽酶升高明显提示酒精性肝病的可能性较大，需要进一步检查乙肝五项、丙肝抗体和肝脏B超等。以一份肾功能异常报告为例：肌酐156微摩尔每升（参考值53至106）升高，尿素氮10.5毫摩尔每升（参考值2.9至8.2）升高，尿酸520微摩尔每升（参考值208至428）升高，估算肾小球滤过率52毫升每分钟（参考值大于90）降低；这份报告显示肌酐和尿素氮升高提示肾功能不全，估算肾小球滤过率52毫升每分钟属于慢性肾脏病3期（中度肾功能损害），尿酸同时升高可能是高尿酸血症导致肾损害，也可能是肾脏排尿酸能力下降所致，需要查明原因并到肾内科就诊以保护肾功能。

**血脂化验单的解读需要了解各指标的意义和目标值**。以一份典型报告为例：总胆固醇6.8毫摩尔每升（参考值小于5.2）升高，甘油三酯2.5毫摩尔每升（参考值小于1.7）升高，低密度脂蛋白胆固醇4.2毫摩尔每升（参考值小于3.4）升高，高密度脂蛋白胆固醇0.9毫摩尔每升（参考值大于1.0）降低；这是典型的高脂血症表现，其中低密度脂蛋白胆固醇升高是最主要的心血管危险因素，高密度脂蛋白胆固醇降低也是危险因素之一，需要采取生活方式干预并考虑药物治疗；需要注意的是，低密度脂蛋白胆固醇的控制目标应根据心血管危险分层确定，对于极高危患者目标值应小于1.8毫摩尔每升，对于高危患者应小于2.6毫摩尔每升，不是简单看参考值。

---

### 第三节 常见检验误区与注意事项

**化验单解读存在一些常见认识误区需要澄清**。**误区一是“指标异常就是有病”**，实际上很多轻度异常是生理性的或由检验误差引起，一次异常不能确诊需要复查，而且参考值取的是95%范围，5%的健康人检测结果可能在正常范围之外。**误区二是“指标正常就是没病”**，很多疾病早期指标可能仍在正常范围内，有些疾病影响的指标不在常规检查范围内，体检正常不代表完全健康，有症状还是要及时就医。**误区三是“肿瘤标志物升高就是癌症”**，肿瘤标志物特异性不高，很多良性疾病也会导致升高，升高需要进一步检查但不要恐慌，正常也不能完全排除肿瘤的可能。**误区四是“不同医院的结果可以直接比较”**，不同实验室的检测方法、仪器和试剂可能不同，参考值也可能不同，最好在同一家医院复查以便前后比较。

**陪诊师在化验单解读中应明确能做什么和不能做什么**。**陪诊师能做的**包括：帮患者查看结果是否有异常标记；向患者解释基本的医学常识和指标含义；提醒患者哪些异常需要重点关注；帮助患者整理历史结果便于对比分析；协助患者向医生提问。**陪诊师不能做的**包括：不能“解读”结果给出诊断；不能说“你这个就是某某病”；不能建议患者使用什么药物；不能说“这个没事，不用看医生”；不能仅凭化验单就下结论。**陪诊师应该使用的正确说法**包括：“这个指标有点高或低，具体意义需要让医生结合您的情况看看”；“这个异常可能和某某因素有关，不过得医生判断”；“这个指标比上次好或不好了，一会儿问问医生”；“有几个异常，等下让医生重点看看”。

化验单阅读是陪诊师必备的实用技能。本章介绍了化验单阅读的基本原则，包括正确认识参考值、了解影响检验结果的因素、掌握基本阅读方法，通过血常规、生化、血脂等常见化验单的实例解读，帮助学员掌握基本的解读能力，同时明确了陪诊师在化验单解读中的注意事项和职业边界。

## 第七章 医疗知识应用案例

### 案例一：高血压患者就医全程协助

**案例背景**：王先生，58岁，发现高血压5年，平时服药不规律，血压控制不佳，最近经常头晕。女儿在外地工作，帮他预约了专家号，请陪诊师小李陪同就诊。**陪诊前准备工作**包括：首先需要充分了解患者情况，患者有高血压病史5年，目前服用硝苯地平缓释片但服药不规律，经常漏服，平时偶尔测血压大概在160/95毫米汞柱左右，最近一周头晕明显特别是早上起床时，而且一直没有定期复查；同时要帮助整理患者正在服用的药物清单、记录最近几次血压测量值，并列出患者想要咨询医生的问题，包括为什么血压总是控制不好、头晕是不是高血压引起的、是否需要换药、以及平时需要注意什么等。**就诊过程协助**包括：提前提醒患者早上空腹（可能需要抽血检查），到医院后先测量血压（结果是165/98毫米汞柱），候诊时和患者沟通确认没有遗漏的问题；见医生时协助患者清晰完整地描述病情，如实补充患者容易遗漏的信息（如女儿反映他经常漏服药物，有时两三天都不吃），并认真记录医生的建议：调整药物方案为氨氯地平5毫克每天一次和比索洛尔2.5毫克每天一次、每天早晚各测一次血压并记录、低盐饮食每天盐摄入量不超过5克、一个月后复查；就诊后取药时核对药品名称和剂量，用大号字体在药盒上标注用法，帮患者设置手机服药提醒，详细讲解注意事项。**后续跟进工作**包括：第二天电话随访确认患者已按时服药，提醒患者监测血压，一周后再次随访了解血压控制情况和有无不适，提前提醒患者复查时间。

**案例点评**：这个案例体现了陪诊服务的专业价值。首先，充分的诊前准备是服务质量的基础，只有了解患者情况才能提供有针对性的服务。其次，协助患者清晰、完整地向医生描述病情非常重要，很多患者因为紧张或表述不清而遗漏重要信息。第三，准确记录医嘱，用患者容易理解的方式传达，是陪诊师的核心能力之一。第四，用实际行动帮助患者落实医嘱，如设置提醒、制作记录表格等增值服务能显著提高治疗依从性。第五，诊后跟进体现服务的完整性和专业性，也是建立长期信任关系的重要环节。

### 案例二：糖尿病患者化验结果解读与沟通

**案例背景**：张阿姨，62岁，2型糖尿病10年，平时服用二甲双胍和格列美脲，但饮食控制不好，很少监测血糖。最近体检发现血糖很高，还有蛋白尿，女儿很担心，陪她来内分泌科就诊，请陪诊师小王陪同。**化验单解读准备工作**包括：整理化验单发现多项异常，空腹血糖10.5毫摩尔每升（正常3.9至6.1）升高，糖化血红蛋白9.2%（正常小于6.5%）升高，尿常规尿蛋白（++）升高，尿微量白蛋白与肌酐比值350毫克每克（正常小于30）升高，肌酐112微摩尔每升（正常44至97）升高，血脂方面胆固醇6.5毫摩尔每升、甘油三酯2.8毫摩尔每升、低密度脂蛋白胆固醇4.2毫摩尔每升均升高；根据这些异常准备问题清单，包括血糖控制不好怎么办、尿蛋白是不是说明肾有问题了、要不要打胰岛素、以及饮食具体要注意什么等。**协助沟通与解读工作**包括：向医生准确描述患者病情，认真记录医生医嘱：血糖方面加用DPP-4抑制剂西格列汀，购买血糖仪每天监测血糖并记录，目标为空腹小于7毫摩尔每升、餐后小于10毫摩尔每升、糖化血红蛋白小于7%；肾脏方面尿蛋白阳性提示糖尿病肾病早期，加用ARB类药物既降压又降尿蛋白，控制血压小于130/80毫米汞柱，定期复查肾功能和尿蛋白；血脂方面加用他汀类调脂药，低密度脂蛋白胆固醇目标小于1.8毫摩尔每升（糖尿病属于极高危人群）；生活方式方面严格糖尿病饮食、控制主食量、适当运动每周至少150分钟、控制体重。**向患者解释与宣教工作**包括：用通俗易懂的语言向张阿姨解释各项异常，例如用温度计比喻解释糖化血红蛋白反映的是三个月平均血糖、用“水管漏水”比喻解释尿蛋白提示肾损害但仍属早期、及时治疗可以延缓进展、用具体例子说明饮食控制方法如原来一顿吃两碗饭改成一碗半、原来爱吃红烧肉改成每周吃一次每次两三块、粥和稀饭升糖快尽量少喝改成喝牛奶或豆浆，帮患者在手机上设置测血糖闹钟并准备记录本方便记录每次测量结果。

**案例点评**：这个案例展示了陪诊师的健康教育能力。首先，用比喻和生活化的语言解释医学问题，患者更容易理解和接受。其次，糖尿病管理需要细致、具体的指导，而不是空泛的说教，要告诉患者具体怎么做而不是只说“要控制饮食”。第三，陪诊师不仅要陪同就诊，更要帮助患者理解和落实医嘱。第四，健康教育是陪诊服务的重要增值部分，专业的健康教育可以显著提高患者的自我管理能力。

### 案例三：冠心病患者紧急情况处理

**案例背景**：李先生，65岁，冠心病病史3年，去年放了心脏支架，今天来医院常规复查，陪诊师小张陪同。在等待叫号的时候，李先生突然说胸口不舒服。**紧急情况处理过程**分为四步：第一步是立即评估，小张立即询问李叔叔怎么不舒服，得知胸口闷像压了块石头有点喘不上气，观察到李先生面色苍白、额头有汗、手捂着胸口，初步判断可能是心绞痛发作。第二步是立即采取措施，扶李先生坐下保持安静，从他口袋里拿出硝酸甘油协助舌下含服，立即去叫医生和护士，同时给李先生家属打电话告知情况。第三步是配合医生处理，医生很快赶来做心电图提示心肌缺血表现，让先含服硝酸甘油观察5分钟如果不缓解需要紧急处理，小张在旁边安抚李先生情绪、监测脉搏和面色、协助护士给李先生吸氧，5分钟后李先生胸痛缓解。第四步是后续安排，医生建议住院进一步检查治疗，小张协助办理急诊住院手续、联系家属告知住院安排、整理李先生的随身物品和病历资料、安慰家属说明情况。**经验总结**包括：紧急情况处理要点是保持冷静不慌乱因为你的情绪会影响患者，第一时间寻求专业帮助不要自己处理同时采取必要措施如协助含服硝酸甘油和让患者安静休息，安抚患者情绪因为紧张会加重心肌缺血，及时联系家属告知情况和安排。陪诊师应具备的能力包括识别常见急症表现、掌握基本急救知识、具备应急处理能力和良好的沟通协调能力。**重要提醒**：陪诊师不是医生，不要尝试超出能力范围的处理，立即寻求专业医疗帮助是第一位的，陪诊师的角色是协助和配合而不是独立处理。

### 案例四：老年人多重用药整理与指导

**案例背景**：王奶奶，78岁，患高血压、糖尿病、冠心病、骨关节炎等多种疾病，每天要吃十几种药，经常搞不清什么药什么时候吃，有时候漏服有时候重复吃，家里药堆得乱七八糟。子女请陪诊师小周帮忙整理药物，陪同就诊调整用药。**药物整理过程**分为五步：第一步是收集所有药物，让王奶奶把所有正在吃的药都拿出来包括处方药、非处方药和保健品，共收集到15种药物，包括降压药3种、降糖药2种、抗血小板药1种、调脂药1种、胃药2种、止痛片2种以及钙片维生素D鱼油等保健品4种。第二步是制作详细的药物清单，列明每种药物的名称、规格、用法、适应症和备注。第三步是发现问题，发现存在重复用药如两种胃药作用类似可能不必要、两种止痛药同时使用增加副作用风险，药物相互作用如布洛芬会影响降压药和阿司匹林的效果并增加胃肠道出血风险，用药时间不明确如有些药应该饭前吃有些饭后吃但王奶奶都一起吃，以及自行购买药物多如很多药是王奶奶自己在药店买的没有医生指导。第四步是陪同就诊调整用药，小周带着整理好的药物清单陪同王奶奶看老年科医生，医生看了清单后认为药物确实太多需要精简，调整方案包括奥美拉唑和铝碳酸镁选一种症状明显时临时用铝碳酸镁不需要长期吃两种，停掉布洛芬只用对乙酰氨基酚减少对胃和肾脏的负担，二甲双胍改成缓释片一天一次减少服药次数，保健品可以继续吃但不要指望有治疗作用。第五步是用药指导与管理，制作服药时间表将药物按时间分为早餐前、早餐后、晚餐后、睡前三组，必要时加一栏如胃痛时用铝碳酸镁、关节痛时用对乙酰氨基酚，购买一周分装药盒分成早中晚睡前四格帮王奶奶把一周的药都分装好，设置四个服药时间的闹钟提醒，每周上门检查服药情况有问题及时联系医生。

**案例点评**：这个案例体现了陪诊师在用药管理方面的专业价值。首先，老年人多重用药是普遍问题，需要专业的用药管理。其次，陪诊师可以通过药物整理、制作清单和时间表帮助老年人规范用药，显著提高用药依从性。第三，发现潜在的药物问题如重复用药和药物相互作用，及时建议医生调整可以避免药物不良反应。第四，定期随访和持续管理确保用药方案的落实，体现了陪诊服务的长期价值。

## 【课程总结】

本课程系统介绍了陪诊师需要掌握的医疗常识，包括人体基本结构与生理常识、常见疾病认知与预防、常见检查项目解读、常用药物基本知识、化验单阅读入门，并通过4个真实案例展示了医疗知识在实际陪诊服务中的应用。

**核心要点回顾**：首先，要掌握基本生理指标正常值，理解人体基本结构和功能，这是理解患者健康状况的基础。其次，要了解高血压、糖尿病、冠心病等常见疾病的基本知识和注意事项，才能更好地与患者沟通。第三，要熟悉血常规、生化、影像等常见检查的目的和意义，协助患者理解检查结果。第四，要掌握常用药物的分类、作用和注意事项，帮助患者正确用药。第五，要学会基本的化验单阅读方法，知道哪些异常需要重点关注。第六，医疗知识的应用要注意边界，绝对不能超出陪诊师的执业范围。

**重要提醒**：陪诊师不是医生，我们学习医疗知识的目的是更好地理解患者的病情和需求、更好地协助医患沟通、更好地解释和传达医嘱、及时发现异常情况提醒患者就医，但绝对不能自行诊断、推荐用药或根据检查结果给出结论。

**下一步行动建议**：首先，制作一份常用生理指标正常值速查表，方便服务时快速查阅。其次，整理一份常见疾病基本知识点清单，定期复习巩固。第三，准备一个小本子，服务中遇到不懂的医学问题及时记录，事后查阅或请教专业人士。第四，服务中涉及医疗问题时，始终保持谦虚谨慎的态度，建议患者咨询医生。

## 【学习目标】

通过本课程学习，学员将全面掌握陪诊服务的完整流程，包括接单前的准备工作、客户对接与需求评估、诊前准备流程、就诊当日服务全流程、诊后跟进与服务闭环、特殊情况处理流程，建立标准化、规范化的服务意识，提升服务质量和客户满意度。

## 第一章 接单前的准备工作

接单前的准备工作是整个陪诊服务的基础和起点，做好充分的准备能够让后续的服务更加顺畅，减少意外情况的发生，提升客户的满意度和信任感。这部分工作主要包含三个核心方面：信息与工具准备、客户信息收集与分析、心态与专业准备。每个环节都至关重要，需要陪诊师认真对待，不能有丝毫马虎。

**1.1 信息与工具准备**

陪诊师在接单后、正式服务前，需要做好充分的信息收集和工具准备工作。首先是**个人专业形象准备**，这包括着装准备、仪容仪表和精神状态三个方面。在着装方面，陪诊师应当穿着统一工装或职业装，保持干净整洁的外观，鞋子选择深色皮鞋或休闲鞋且保持干净，不穿拖鞋、凉鞋、运动鞋等不适合医院环境的鞋子，女士不穿高跟鞋以方便行走。在仪容仪表方面，头发要整齐不披头散发，面部清洁女士淡妆，指甲修剪干净不涂夸张指甲油，口气清新服务前不吃有异味食物，手部清洁勤洗手。在精神状态方面，要精神饱满面带微笑，态度热情积极主动，不把个人情绪带到工作中，前一天保证充足睡眠。其次是**服务工具准备**，分为证件类、记录类、沟通类和便民物品四大类。证件类包括身份证、工作证/工牌、健康证（如需要）、核酸检测证明（根据当时要求）。记录类包括笔记本和笔（记录医嘱）、垫板（方便在医院书写）、手机（保持电量充足，备充电宝）、充电线、充电宝。沟通类包括客户电话提前存入通讯录、微信/短信沟通记录完整保存、服务协议/合同电子版备份。便民物品包括纸巾、湿巾、矿泉水（2瓶）、备用口罩、免洗消毒液、糖果（防止低血糖）、塑料袋（装呕吐物、垃圾等）。特殊情况准备包括轮椅（行动不便患者提前准备）、雨伞（看天气预报）、外套（医院空调可能较冷）、老花镜（老年人可能需要）。最后是**医院信息准备**，陪诊师需要提前熟悉医院的基本信息，包括医院地址、交通路线、门诊楼和急诊楼位置、挂号处和缴费处位置、各科室分布（内科、外科、妇科等在哪一层）、检验科和影像科及药房位置、卫生间和饮水处及休息区位置、电梯和扶梯位置以及哪部电梯人少等。同时还需要了解挂号与预约信息，包括预约挂号时间、预约科室和医生、挂号费用、取号方式和地点、取号截止时间。检查相关信息包括各项检查的注意事项（空腹、憋尿等）、检查科室位置、检查大概需要的时间、取报告的时间和方式。交通与停车信息包括停车场位置和收费标准、周边公交/地铁站、医院入口哪个方便、哪个电梯人少速度快。

**1.2 客户信息收集与分析**

在正式服务前，陪诊师需要全面收集和分析客户信息，为后续的服务做好铺垫。首先是**基本信息收集**，包括客户基本信息和患者基本情况两个方面。客户基本信息包括姓名、性别、年龄、联系电话、住址/接站地点、紧急联系人及电话。患者基本情况包括所患疾病、主要症状、行动能力（是否需要轮椅、能否独立行走）、语言表达能力（是否耳聋、口齿是否清楚）、认知能力（是否有痴呆、意识不清）、过敏史（药物、食物等）、是否有传染病。家属情况包括是否有家属陪同、家属与患者关系、家属对患者病情的了解程度、谁是主要决策人。其次是**需求评估**，分为服务需求评估和风险评估两个方面。服务需求评估中的基本需求包括本次就诊目的（初诊、复查、取药、做检查等）、需要哪些具体服务（挂号、陪同、取报告、代问诊等）、服务时间段（上午、下午、全天）、是否需要接送服务。特殊需求包括是否需要轮椅、是否需要翻译（外地患者、外籍人士）、是否需要协助办理住院、是否有宗教信仰或特殊饮食习惯。期望目标包括患者或家属希望达到什么效果、有什么特别担心或在意的事情、对服务有什么具体要求。风险评估中的健康风险包括病情是否稳定、是否有急性发作的可能、是否有跌倒和晕厥风险、是否需要特殊护理。沟通风险包括患者或家属是否情绪不稳、是否有医患矛盾史、是否对医院或医生有偏见、期望值是否过高。服务风险包括服务难度有多大、是否需要额外的人力支持、是否在自己的能力范围内、是否需要拒绝或转介。最后是**诊前沟通确认**，在服务前一天需要与客户进行详细沟通，确认基本信息、提醒注意事项、了解患者情况、确认交通和停车。具体话术如："您好，我是明天陪您就诊的陪诊师小李。跟您确认一下，明天上午9点在XX医院门诊楼门口见面对吗？您是看心内科王主任的号对吗？"同时要提醒注意事项："明天需要空腹抽血，今晚12点以后就不要吃东西喝水了哦。需要做B超的话要憋尿，可以早上起来不要排尿。把您之前的病历、检查报告、身份证、医保卡都带好。"还要了解患者情况："您现在身体怎么样？明天行动方便吗？需要我给您准备轮椅吗？有没有什么药物过敏？"并确认交通和停车："您明天怎么过来？开车的话医院南门有停车场，坐地铁的话2号线XX站B口出来就是医院正门。"在服务当天早上还要再提醒："XX叔叔早上好，我是小李。咱们今天9点医院见，别忘了带病历资料和相关证件。路上注意安全，咱们一会儿见！"

**1.3 心态与专业准备**

除了物质和信息的准备，陪诊师还需要在心态和专业能力方面做好准备。首先是**服务心态准备**，需要具备空杯心态、同理心、责任心和耐心四个方面。空杯心态要求陪诊师认识到每个客户都是新的，都有不同需求，不要凭经验想当然，认真对待每一次服务不掉以轻心。同理心要求陪诊师站在患者角度考虑问题，理解患者的焦虑和不安，感受患者的痛苦和困难，不要不耐烦、不要嫌麻烦。责任心要求陪诊师把患者的事当成自己的事，认真负责不敷衍了事，对服务质量负责、对患者安全负责。耐心要求陪诊师认识到老年人反应慢要多给点时间，患者情绪不好要多些理解，排队等候不要急躁，问题多要一遍遍耐心解答。其次是**专业知识准备**，包括疾病相关知识、沟通技巧准备和应急预案准备三个方面。疾病相关知识包括了解患者所患疾病的基本知识、知道常规检查项目和目的、了解常用药物和注意事项、知道可能的并发症和风险。沟通技巧准备包括想好如何跟医生介绍病情、准备好患者可能会问的问题、想好如何安抚患者情绪、准备好应对突发情况的话术。应急预案准备包括如果患者突发不适怎么办、如果医生号停诊了怎么办、如果检查做不完怎么办、如果患者和医生发生争执怎么办。

---

### 【本章小结】

接单前的准备工作是优质服务的基础，包括个人形象和工具准备、客户信息收集与需求评估、心态与专业知识准备。充分的准备可以让服务更加顺利，减少意外情况，提升客户满意度。"凡事预则立，不预则废"，准备越充分，服务越从容。

## 第二章 客户对接与需求评估

客户对接与需求评估是陪诊服务的重要环节，它决定了后续服务的方向和质量。在这个阶段，陪诊师需要与客户建立信任关系，深入了解客户的真实需求，制定合理的服务计划，并对客户的期望值进行有效管理。这个环节做好了，后续的服务就会顺利很多；做得不好，可能会导致服务纠纷或者客户不满意。

**2.1 初次见面与建立信任**

初次见面的第一印象至关重要，它直接影响客户对陪诊师专业能力的判断和信任程度。首先是**第一印象建立**，包括准时到达、热情迎接、专业形象展示和贴心细节四个方面。在准时到达方面，陪诊师应当提前15-30分钟到达约定地点，绝对不能迟到，遇到堵车等情况及时告知客户，宁可等客户不能让客户等。在热情迎接方面，看到客户要主动上前打招呼，面带微笑眼神友好，自我介绍如："您好，我是今天陪您的陪诊师小李，您是王阿姨吧？"同时要主动帮拿东西："东西重不重？我来帮您拿吧"。在专业形象展示方面，要佩戴工作证、着装整洁专业、举止得体大方、说话清晰有力。在贴心细节方面，天气冷时提醒多穿点，天气热时递上一瓶水，提醒带好随身物品，主动帮推轮椅。其次是**快速建立信任**，陪诊师需要展现真诚的关心、专业的提问、设身处地为患者着想的态度，以及展示对医院的熟悉。真诚的关心体现在话语中如："阿姨您路上辛苦了，累不累？我们先在这边坐一会儿休息一下再上去。""您今天感觉怎么样？身体有没有不舒服？"专业的提问如："您上次是什么时候来看的？这次主要是哪里不舒服？""您之前都做过哪些检查？这次医生大概会安排什么检查？"设身处地为患者着想体现在如："您这个检查需要空腹，肯定饿坏了，抽完血我先陪您去吃点东西。""前面排队人挺多的，您先坐着休息，我在这里排队，到了叫您。"展示对医院的熟悉如："检验科在三楼，我们先去抽血，然后去二楼做B超。B超需要憋尿，抽完血您多喝水。""这个医生看病很仔细，大概每个病人要看15分钟，我们前面还有3个人，大概还要等40分钟。"最后是**了解真实需求**，陪诊师要通过主动询问、善于倾听、观察非语言信息和挖掘潜在需求来全面了解客户的真实需求。主动询问如："今天除了看医生，还有其他需要我帮忙的吗？""您对这次就诊有什么特别的要求或担心的吗？"善于倾听要求让患者多说自己多听，不要打断患者说话，适时回应如"嗯，我理解"、"是这样啊"，听出患者话里的真实想法。观察非语言信息包括患者的表情和神态、家属之间的眼神交流、患者欲言又止的样子、家属偷偷把你拉到一边说话。挖掘潜在需求例如：患者说"就是来复查一下"，可能还想知道病情有没有进展、要不要调整用药；家属说"就是陪老人来看看"，可能希望你多照顾老人，多跟医生沟通；患者反复问"这个检查疼不疼"，其实是心里害怕，需要安慰和解释。

**2.2 需求确认与服务方案**

在充分了解客户需求后，陪诊师需要与客户确认需求并制定详细的服务计划。首先是**详细需求确认**，陪诊师需要从就诊目的、检查项目、时间安排、特殊需求和家属期望五个方面与客户逐一确认。就诊目的确认如："您这次来主要是想解决什么问题？是哪里不舒服来检查，还是定期复查？"检查项目确认如："医生之前说这次需要做哪些检查？您清楚吗？有没有需要空腹的？"时间安排确认如："您今天大概有多少时间？下午还有别的安排吗？我们尽量在您希望的时间内完成。"特殊需求确认如："您有没有什么特别需要注意的？比如饮食禁忌、行动不方便、需要轮椅等。"家属期望确认如："除了陪诊，您还有什么其他需要我协助的吗？比如跟医生了解病情、帮忙取药等。"其次是**制定服务计划**，包括时间规划、路线规划、人员分工和优先级排序四个方面。时间规划要求预估每个环节需要的时间，合理安排先后顺序，留出弹性时间应对突发情况，尽量减少患者等候时间。路线规划要求设计最优就诊路线，减少来回走动，避开人流高峰，优先做需要空腹的检查。人员分工要求如果有家属陪同，明确各自分工，你负责什么家属负责什么，谁陪患者谁去缴费取药。优先级排序要求明确哪些检查必须今天做，哪些可以下次做，哪些需要预约，先做什么后做什么。最后是**向客户说明服务安排**，用通俗的语言说明今天的安排，解释为什么这样安排，告知可能遇到的情况，征求客户意见。用通俗的语言说明如："阿姨，我跟您说一下今天的安排。我们先去取号，然后等医生叫号。看完医生应该会开检查单，我们先去抽血（因为您空腹），抽完血去吃点东西，然后做B超，最后取药。您看这样安排可以吗？"说明为什么这样安排如："为什么先抽血呢？因为您现在空腹，抽完血就可以吃东西了。B超需要憋尿，抽完血您多喝水，等叫号的时候差不多就憋好了。这样安排最节省时间，您也不会饿太久。"告知可能遇到的情况如："今天是周一，医院人可能比较多，排队时间可能会长一点，您要有个心理准备。如果人实在太多，有些检查可以预约到明天做。"征求客户意见如："您看这样安排行吗？有什么问题或者您有什么想法随时跟我说。"

**2.3 期望值管理**

期望值管理是避免服务纠纷的重要环节，陪诊师需要识别客户的过高期望并进行合理引导。首先是**识别过高期望**，常见的高期望包括："我花了钱，你必须保证我挂上专家号"、"你跟医院熟，能不能让医生给我看得仔细点"、"你能不能让我不用排队，先做检查"、"你认识这个医生吗？能不能跟他说说给我开点好药"、"今天上午必须把所有检查都做完，我下午还有事"等。其次是**合理引导期望**，陪诊师需要提前说明实际情况、说明服务边界、给出替代方案、坦诚沟通不轻易承诺。提前说明实际情况如："现在医院都是系统排队，谁也没办法插队，我会尽量帮您盯着，但是确实没法保证第一个看，请您理解。""专家号确实很难挂，我会尽力帮您抢，但确实不能百分之百保证，挂不上的话我们可以挂其他医生或者预约下次，您看可以吗？"说明服务边界如："我可以帮您排队、跑腿、跟医生沟通，但是医疗上的事情还是要听医生的，我没法干预医生的诊疗决策，这点请您理解。"给出替代方案如："如果今天人太多做不完，我们可以先把费用交了，预约到明天或者后天做，到时候您直接来做就行，不用再挂号了。"坦诚沟通不轻易承诺要求能做到的答应，做不到的明确说做不到，不要为了接单什么都答应，承诺了就一定要做到，做不到的提前说不要等到最后让客户失望。

---

### 【本章小结】

客户对接与需求评估是服务的重要环节。初次见面要建立良好的第一印象和信任关系，通过沟通充分了解客户的真实需求，制定详细的服务计划，并对客户的期望值进行合理管理。充分了解需求是提供优质服务的前提，期望值管理能避免很多服务纠纷。

### 【思考问题】

1. 如何在短时间内与客户建立信任关系？
2. 客户提出你做不到的要求时，如何拒绝又不得罪客户？
3. 为什么要进行期望值管理？不管理会有什么后果？

## 第三章 诊前准备流程

诊前准备是确保就诊当日服务顺利进行的重要保障，它包括医疗资料整理、生活物品准备、预约挂号确认、患者生理和心理准备、流程和路线规划等多个方面。充分的诊前准备可以让就诊过程更加顺畅，减少患者的奔波和等待，显著提升就医体验。

**3.1 资料与物品准备**

在就诊当日出发前，陪诊师需要协助患者准备好所有需要的资料和物品，确保就诊过程不因缺这少那而受影响。首先是**医疗资料整理**，陪诊师需要帮助患者整理好身份证明、病历资料、检查报告和用药记录。身份证明包括身份证、医保卡/社保卡、就诊卡（如果有）、银行卡/微信/支付宝（缴费）。病历资料包括门诊病历本、住院病历复印件（如果住过院）、手术记录（如果做过手术）、病理报告（如果做过病理）。检查报告包括化验单（血常规、生化等）、影像报告（CT、MRI、B超、X光片等）、心电图、其他特殊检查报告。用药记录包括正在服用的药物清单（药名、剂量、用法）、药物包装盒或说明书（方便医生看）、过敏药物记录。资料整理方法包括按时间顺序排列、同类检查放在一起（如所有CT报告放一起）、重要结果用荧光笔标出、制作摘要即主要诊断、重要检查结果、用药情况（方便医生快速了解）。其次是**生活物品准备**，包括患者个人物品和特殊情况准备两类。患者个人物品包括口罩（多备几个）、纸巾、湿巾、水杯、少量的零食（饼干、糖，防止低血糖）、常用药物（降压药、降糖药等，检查完可以吃）、充电宝（手机没电很麻烦）。特殊情况准备针对老年人需要准备老花镜、拐杖、成人纸尿裤（必要时），针对儿童需要准备尿不湿、奶粉、玩具、备用衣物，针对孕妇需要准备靠垫、小零食，针对行动不便者需要准备轮椅、坐垫。最后是**预约与挂号确认**，需要确认挂号信息（挂号是否成功、挂号时间、科室、医生、取号地点和方式、取号截止时间过号作废）、确认预约检查（检查是否预约成功、检查时间地点、检查注意事项如空腹、憋尿、带什么资料、是否需要提前缴费）、确认其他事项（是否需要办理就诊卡、是否需要先充值、医保是否可以用、外地医保是否需要备案）。

**3.2 患者生理与心理准备**

除了物质准备，陪诊师还需要关注患者的生理状态和心理状态，帮助患者做好相应的准备。首先是**生理准备指导**，陪诊师需要根据患者将要做的检查项目，提前告知相关的注意事项。空腹检查提醒如："今晚12点以后就不要吃东西、不要喝水了，明天早上也不要吃早饭，抽完血再吃。""降压药可以照常吃，一小口水送服不影响检查。"憋尿检查提醒如："做泌尿系B超和妇科B超需要憋尿，早上起来不要排尿，或者到医院多喝水。""憋到有明显尿意再去做，不然看不清还得重新憋，耽误时间。"其他检查准备包括做CT增强、胃镜等检查需要家属陪同签字，做胃镜需要空腹8-12小时，做肠镜需要提前喝泻药清肠，女性做妇科检查避开月经期。其次是**心理准备安抚**，陪诊师需要帮助患者缓解紧张焦虑、降低恐惧感、建立合理预期。缓解紧张焦虑如："别紧张，这个检查很快的，几分钟就好了，也不怎么疼。""这个医生看病很仔细，也很有耐心，有什么问题您慢慢问。"降低恐惧感如："抽血就像蚂蚁咬一下，很快就好了，我陪着您，您把头转过去别看。""做胃镜是有点不舒服，但是现在都是无痛的，睡一觉就做完了，醒来什么都不知道。"建立合理预期如："今天人可能比较多，排队时间可能会长一点，我们耐心等等，我陪着您，一会儿就到了。""医生一天要看几十个病人，可能跟您说的时间不会太长，您有什么重要问题先想好，一会儿重点问。"

**3.3 流程与路线规划**

在就诊前，陪诊师需要提前规划好就诊流程和最优路线，确保就诊过程高效顺畅。首先是**就诊流程梳理**，普通门诊基本流程包括取号/签到、候诊等待、医生诊室就诊、开检查单/处方、缴费、做检查/取药、等检查结果、再找医生看结果、结束就诊九个步骤。其次是**最优路线设计**，陪诊师在设计路线时需要遵循以下原则：减少上下楼次数、减少来回走动、先做需要空腹的检查、先做需要预约和人多的检查、检查和取药尽量在同一区域。例如可以这样安排："我们先去一楼取号，然后去三楼心内科候诊。看完医生应该会开抽血和B超单，我们先去二楼检验科抽血（空腹），抽完血去旁边吃早餐，然后去四楼B超室做B超，B超做完差不多结果也出来了，再回三楼找医生看结果，最后去一楼药房取药。这样路线最顺，不用来回跑。"最后是**时间预估与安排**，陪诊师需要了解各环节的大概时间以便合理安排。各环节时间预估包括候诊30-60分钟（专家号可能更长）、医生就诊5-15分钟、缴费5-10分钟、抽血10-20分钟（排队）、B超30-60分钟（排队+检查）、CT/MRI预约可能需要几天当天做的话1-2小时、取药10-20分钟。预留缓冲时间要求每个环节多预留一些时间，防止某个环节耽误影响整体，不要把时间安排太满，告知患者可能需要的总时间。

---

### 【本章小结】

诊前准备是服务顺利进行的重要保障。包括医疗资料整理、生活物品准备、预约挂号确认、患者生理和心理准备、流程和路线规划等。充分的准备可以让就诊过程更加顺畅，减少患者的奔波和等待，提升就医体验。

### 【思考问题】

1. 为什么要提前整理病历资料？整理的要点是什么？
2. 哪些检查需要空腹？哪些需要憋尿？
3. 设计就诊路线时应该遵循什么原则？

## 第四章 就诊当日服务全流程

就诊当日服务是陪诊服务的核心环节，陪诊师需要全程陪同患者完成整个就诊过程。这个过程包括接人与签到、候诊等待、诊室就诊、检查检验、取药与结束等多个环节。每个环节都有具体的服务要点和注意事项，陪诊师需要细心、耐心、专业地完成每一个步骤，让患者感受到贴心和温暖的服务。

**4.1 接人与签到环节**

就诊当日的第一个环节是接人和签到，陪诊师需要准时接患者并完成取号和签到。首先是**准时接人**，陪诊师应当比约定时间提前10-15分钟到达，找个显眼的位置等候，快到时间时电话联系如："阿姨您好，我已经在医院门口了，您到了吗？"看到客户要主动上前打招呼，帮拿东西特别是重物，问候患者身体状况如："今天感觉怎么样？路上顺利吗？"同时要核对资料，提醒带好身份证和医保卡，确认病历和检查报告都带了，确认药物也带了。其次是**取号与签到**，取号流程包括先去自助机取号（比窗口快），不会操作的找志愿者或导诊，取号后核对信息包括姓名、科室、医生、序号、诊室，过号了找护士站重新刷卡排队。签到确认包括有些医院需要到科室护士站签到，把号条交给护士，问清楚大概还要等多久，问清楚候诊区域在哪。注意事项包括取号有时间限制过号可能作废、医保挂号可能需要密码、自费挂号准备好钱或手机支付、号条收好不要弄丢。

**4.2 候诊等待环节**

候诊等待是就诊过程中时间最长的环节，陪诊师需要妥善安排患者休息并提供周到服务。首先是**安排患者休息**，陪诊师要找合适的位置，尽量找离诊室近的位置，找安静一点的位置，老年人尽量找有靠背的椅子，避开空调直吹的位置。同时要照顾患者需求，问要不要喝水，问要不要去卫生间，冷的话给披件衣服，累的话可以靠一会儿。其次是**候诊期间服务**，包括时间管理、信息告知、沟通交流和特殊情况处理。时间管理要求关注叫号屏幕，时不时去诊室门口看看进度，临近时提醒患者做好准备，快到了提前去门口等着。信息告知包括告知前面还有几个人，告知大概还要等多久，有临时情况（医生临时走开）及时告知。沟通交流包括跟患者聊聊天缓解等待的无聊，再次了解病情协助梳理病史，提醒一会儿要跟医生说的重点，解答患者的疑问。特殊情况处理例如：患者等得不耐烦了可以说"我也觉得今天人特别多，我再去看看前面还有几个，尽量催一下，您别着急。"患者着急去卫生间可以说"您去吧，我在这里盯着，到了我给您打电话。"患者饿了可以说"再坚持一下，抽完血就可以吃东西了，我包里有糖，您先吃一块垫垫。"

**4.3 诊室就诊环节**

诊室就诊是整个就诊过程的核心环节，陪诊师需要协助患者与医生进行有效沟通。首先是**进入诊室准备**，准备工作包括把病历资料按顺序整理好，把重点问题再跟患者确认一遍，提醒患者一会儿主要跟医生说什么。进入诊室时要轻轻敲门得到允许再进，进门问好如"医生您好"，随手关门（保护隐私），让患者坐下自己站在患者侧后方。其次是**协助医患沟通**，陪诊师需要协助患者描述病情、记录医嘱和帮助提问。协助描述病情要求先让患者自己说，患者说不清楚和说不完整时适当补充，患者说的太啰嗦和无关紧要时礼貌地帮着总结，患者不好意思说的可以帮着说。例如患者说："我就是最近有点头晕，有时候晚上睡不着觉，胃口也不太好，不知道怎么回事..."陪诊师可以补充："医生，他这个头晕主要是早上起来的时候明显，下午会好一点。血压最近量的大概160/90左右，比之前高了些。现在吃的药是氨氯地平，每天一片。"记录医嘱要求医生说的话快速准确记录，重点记录诊断、检查项目、用药调整、注意事项和复查时间，没听清的及时问如"医生，您刚才说的那个药是每天几次？"，重要内容可以请医生写下来。帮助提问包括提醒患者想问的问题如"您不是想问饮食上要注意什么吗？"，患者不好意思问的帮着问如"医生，他这个情况平时可以喝酒吗？"，用患者更容易理解的方式重复医生的话如"医生的意思是这个药先吃两个月，两个月后复查，对吗？"最后是**就诊结束确认**，离开诊室前要确认所有问题都问完了，确认医生没有其他交代了，带好所有病历资料，问清楚下次复查怎么挂号，感谢医生如"谢谢医生，辛苦了！"。就诊后立即整理包括把医生开的检查单和处方整理好，把刚才记录的医嘱整理一下，跟患者再复述一遍医生说的重点，确认患者都听懂了。

**4.4 检查检验环节**

医生开出检查单后，陪诊师需要陪同患者完成各项检查。首先是**缴费与预约**，缴费可以让患者坐着休息自己去排队缴费，优先用自助机缴费比窗口快，核对缴费项目和金额，保存好缴费单据。检查预约要求有些检查需要先预约，问清楚预约时间和地点，问清楚检查前注意事项，把预约信息记下来告诉患者。其次是**检查陪同**，包括检查前、检查中和检查后三个阶段。检查前要再次确认检查前注意事项（空腹、憋尿等），确认患者身份信息正确，提醒患者把身上金属物品拿出来，安抚患者紧张情绪。检查中要在检查室外等候，不要远离有事能及时找到你，患者出来及时迎上去，询问有没有不舒服。检查后要帮患者拿东西，问清楚取报告的时间和地点，注意患者有没有不适，特殊检查（如胃镜）后按医嘱护理。

**4.5 取药与结束环节**

就诊的最后环节是取药和服务结束，陪诊师需要帮助患者正确取药并做好服务总结。首先是**药房取药**，取药流程包括先到签到机签到或刷卡，等待叫号取药，拿到药后核对药名、数量和剂量，有不明白的问药师。用药指导要把每种药的用法用量和注意事项告诉患者，用大号字写在药盒上，特别强调如"这个药是每天早上吃一片，那个是晚上吃，别搞混了。"提醒可能的副作用如"这个药刚开始吃可能会有点头晕，适应几天就好了，如果严重就来找医生。"其次是**服务结束总结**，今日总结如"阿姨，今天我们看了医生，做了抽血和B超，医生说您血压控制得不太好，给您加了一种药，让您一个月后复查。药我都给您取好了，用法用量我都写在药盒上了，您按时吃。"后续提醒如"明天下午可以取化验报告，您要是不方便来我可以帮您取了给您送过去，或者拍照发给您。一个月后复查别忘了，我提前提醒您。"满意度确认如"今天的服务您还满意吗？有什么我做得不好的地方您尽管提，我以后改进。"送别客户如"您路上注意安全，到家好好休息。有什么问题随时给我打电话。""慢走，祝您早日康复！"

---

### 【本章小结】

就诊当日服务是陪诊服务的核心环节，包括接人与签到、候诊等待、诊室就诊、检查检验、取药与结束等多个环节。每个环节都有具体的服务要点和注意事项，需要细心、耐心、专业地完成，让患者感受到贴心的服务。

## 第五章 诊后跟进与服务闭环

诊后跟进是服务的延伸和升华，也是建立长期客户关系的关键。一个完整的服务闭环不仅包括就诊当日，还延伸到就诊之后。完善的诊后跟进可以显著提升客户满意度和忠诚度，带来更多的转介绍客户。

**5.1 服务结束当日跟进**

服务结束当日的跟进是诊后服务的起点，体现了陪诊师的责任心和专业性。首先是**当日回访**，回访时间应在服务结束后2-4小时，患者到家休息一会儿后进行，不要太晚避免影响休息。回访内容包括确认患者已安全到家，询问就诊后有无不适，提醒按时吃药，确认还有什么疑问，再次强调注意事项。回访话术如："王阿姨您好，我是小李。您到家了吧？今天累不累？有没有哪里不舒服？药都放好了吧？记得按时吃哦。有什么不明白的随时给我打电话。祝您早日康复！"其次是**服务记录整理**，记录服务内容包括服务日期、时间、地点，患者基本信息，就诊科室、医生，主要诊断，做了哪些检查，开了哪些药，医生重要嘱咐。记录服务过程包括服务中遇到的问题，客户反馈和评价，需要改进的地方，客户特殊需求或习惯。保存相关资料包括病历和检查报告照片（征得客户同意），处方照片，服务确认单，客户签字记录。

**5.2 后续跟进服务**

后续跟进服务是维系客户关系的重要环节，包括检查结果跟进、用药与康复跟进、复查提醒与预约三个方面。首先是**检查结果跟进**，取报告服务要按约定时间帮患者取报告，取完后第一时间告知患者，可以送报告上门、邮寄或拍照发微信，提醒患者拿报告找医生看。结果解读提醒要简单说明哪些指标正常和哪些异常如"报告我拿到了，整体还可以，就是血脂有点高，您下次复查的时候让医生看看要不要加药。"同时要提醒"这个结果我只是大概跟您说一下，具体还是要让医生看，以医生说的为准。"其次是**用药与康复跟进**，用药提醒包括第二天提醒吃药如"阿姨，早上的药别忘了吃哦"，提醒可能的副作用如"刚开始吃这个药可能会有点头晕，属于正常反应，如果特别严重就去医院看看"，提醒不要自行停药或改剂量。康复指导包括提醒注意休息，提醒饮食注意事项，提醒适当活动，提醒戒烟戒酒。最后是**复查提醒与预约**，复查提醒要提前1-3天提醒患者复查时间如"王阿姨，您下周三该复查了，需要我陪您去吗？我提前帮您挂号。"确认复查需要带的资料，确认是否需要陪诊服务。预约挂号要提前帮患者预约专家号，提醒预约成功信息，再次确认陪诊时间。

**5.3 服务闭环与客户关系维护**

服务闭环是提升服务品质和建立长期客户关系的关键，需要通过满意度调查、客户关系维护和转介绍口碑建设来实现。首先是**服务满意度调查**，包括正式调查和非正式沟通两种方式。正式调查包括服务结束后发送满意度问卷，电话回访询问满意度，询问服务中哪些地方满意哪些需要改进。非正式沟通包括服务结束时当面询问，微信随访时顺便问一下，观察客户态度和反馈。对不满意的处理包括诚恳道歉，了解不满意的具体原因，提出改进措施，适当补偿如下次服务优惠，争取客户理解和谅解。其次是**客户关系维护**，日常问候包括节日问候，天气变化提醒加衣，患者生日祝福。健康提醒包括慢性病患者定期提醒注意事项，流感季节提醒注意预防，体检季节提醒定期体检。增值服务包括分享靠谱的健康知识，推荐好的医生和医院，解答健康相关疑问，帮忙预约挂号和取报告等小服务。最后是**转介绍与口碑建设**，鼓励转介绍可以在服务结束时说"如果您觉得我服务还可以，有朋友需要陪诊的话欢迎推荐给我，谢谢您！"可以给转介绍一定的优惠或感谢费。建立口碑要求认真服务好每一个客户，因为客户的口碑是最好的广告，老客户推荐是最主要的客源，真诚对待每一位客户自然会有回报。

---

### 【本章小结】

诊后跟进是服务的延伸和升华，也是建立长期客户关系的关键。包括服务结束当日回访、检查结果跟进、用药康复指导、复查提醒预约、满意度调查、客户关系维护等。完善的诊后跟进可以形成完整的服务闭环，提升客户满意度和忠诚度，带来更多的转介绍客户。

## 第六章 特殊情况处理流程

特殊情况处理是考验陪诊师能力的重要环节，考验的是陪诊师在面对突发状况时的应变能力和专业素养。本章介绍患者突发不适、医患纠纷、临时取消、医生停诊、检查做不完等常见特殊情况的处理流程和注意事项。

**6.1 患者突发不适处理**

患者突发不适是最需要紧急处理的情况，陪诊师需要能够识别常见突发情况并采取正确的处理措施。首先是**常见突发情况识别**，常见的突发情况包括晕厥/晕倒，表现为突然意识丧失摔倒在地，面色苍白出冷汗，可能伴有抽搐。心脏病发作表现为胸骨后或心前区疼痛，胸闷压榨感，疼痛可放射至左肩和左臂，伴有出汗、恶心和呼吸困难。脑卒中（中风）表现为突然一侧肢体无力或麻木，突然说话不清或不能说话，突然视物模糊，突然剧烈头痛，突然头晕和站立不稳。过敏性休克表现为用药或接触过敏原后突然出现，皮疹和瘙痒，呼吸困难和胸闷，血压下降和意识不清。其次是**紧急处理流程**，通用处理原则包括立即呼救即大声叫医生护士并拨打120，就地抢救即让患者平卧保持呼吸道通畅，保持冷静即不要慌乱有条不紊，及时联系家属即告知情况。晕厥处理包括立即扶住患者防止摔倒受伤，让患者平卧头稍低脚抬高，解开领口和腰带保持呼吸通畅，可以按压人中穴，一般几分钟后会清醒，清醒后不要立即起身防止再次晕厥，找医生检查原因。胸痛处理包括让患者坐下或半卧位休息不要活动，询问是否随身带硝酸甘油协助舌下含服，立即呼叫医生或推往急诊，测血压和脉搏，安慰患者避免紧张，不要随便搬动患者。过敏处理包括立即停止接触过敏原，让患者平卧保持呼吸道通畅，立即呼叫医生，观察生命体征（血压、脉搏、呼吸），严重过敏需要立即注射肾上腺素（医生来做）。最后是**注意事项**，陪诊师要明确自己的定位是第一目击者和协助者不是专业急救人员，立即寻求专业医疗帮助是第一位的，在专业人员到来前进行必要的初步处理，不要进行超出能力范围的操作。保护自己要注意保护自己避免交叉感染，处理外伤时注意避免接触血液，有条件戴手套操作。记录和沟通要记录事情发生的时间和经过及症状，如实向医生和家属描述情况，不要臆断原因只说看到的，保存好相关证据以防纠纷。

**6.2 医患纠纷处理**

医患纠纷是陪诊服务中可能遇到的棘手问题，陪诊师需要掌握正确的处理原则和流程。首先是**常见纠纷类型**，包括服务态度类如医生态度不好说话生硬、护士操作粗暴、窗口人员不耐烦；流程问题类如排队时间太长、检查预约不上、来回跑冤枉路；医疗问题类如对诊断不满意、对治疗效果不满意、认为医生不负责任。其次是**处理原则与流程**，处理原则包括隔离原则即把患者带离纠纷现场避免矛盾升级，冷静原则即自己先保持冷静不要加入争吵，中立原则即不站在任何一方不偏不倚，解决问题原则即不是追究谁对谁错而是解决问题。处理流程第一步是安抚情绪，先把患者或家属拉到一边如"您先消消气，别生气，生气对身体不好。"给患者倒杯水让患者冷静下来。第二步是倾听抱怨，让患者把不满都说出来，不要打断不要辩解，适时回应如"我理解您的心情，换了是我也会生气的。"第三步是分析原因，等患者情绪平复后客观分析问题如"医生今天病人确实太多了，可能说话有点急，不是针对您。""这个检查确实比较难约，我帮您想想办法。"第四步是解决问题，提出具体的解决方案如"我带您去找护士站说说，看看能不能安排得快一点。""要不我帮您约个其他专家的号，您看行吗？"第五步是后续跟进，问题解决后确认患者满意，事后继续关心患者，避免留下心结。最后是**注意事项**，绝对不要做的包括不要和患者一起骂医生和骂医院，不要火上浇油激化矛盾，不要说"这个医生就是这样的，态度很差"，不要评判谁对谁错。应该做的包括引导患者理性看待问题，帮助患者通过正常渠道反映问题，协助患者解决实际困难，安抚情绪避免矛盾升级。

**6.3 其他特殊情况处理**

除了上述情况，陪诊师还可能遇到患者临时取消、医生临时停诊、检查做不完等特殊情况，需要掌握相应的处理方法。首先是**患者临时取消或改期**，处理流程包括接到通知后立即确认，问清楚原因，确认是否需要改期，协助取消挂号，费用结算按约定，重新预约时间。注意事项包括表示理解不要抱怨，问清楚是否需要帮忙，临时改期的尽量配合调整，按约定处理费用问题避免纠纷。其次是**医生临时停诊**，处理流程包括第一时间告知患者诚恳道歉，解释原因（医生临时有手术和开会等），给出解决方案包括改其他时间或换其他医生或退号退款，帮患者操作改约或退号，征求患者意见尽量满足需求。注意事项包括不是你的责任也要道歉（毕竟你是服务提供者），主动给出解决方案不要等患者问，不要抱怨医院或医生患者会更生气，尽量减少患者的不便和损失。最后是**检查做不完或约不上**，处理流程包括第一时间告知患者情况，解释原因（人太多、机器故障、需要特殊准备等），给出解决方案包括今天能做的先做其他的预约到明天或改天、能否换个也能做的医院、能否先回去改天再来做，帮患者预约好时间，留下联系方式下次来可以继续陪诊。注意事项包括提前预判早点告诉患者不要等到最后，主动想办法不要让患者自己想，尽量减少患者的奔波，该承担的责任要承担该退费的退费。

---

### 【本章小结】

特殊情况处理是考验陪诊师能力的重要环节。本章介绍了患者突发不适、医患纠纷、临时取消、医生停诊、检查做不完等常见特殊情况的处理流程和注意事项。遇到特殊情况要保持冷静，遵循处理原则，以解决问题为导向，妥善处理各种突发状况。
