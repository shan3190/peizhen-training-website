## 第七章 服务流程实战案例

理论学习需要与实践相结合才能真正掌握。以下通过四个真实案例展示不同类型服务的实际操作流程，帮助学员更好地理解和运用所学知识。

**案例一：异地患者首次就诊全程服务**

张先生，55岁，山东人，在当地医院检查发现肺部有结节，怀疑肺癌，想到北京大医院进一步确诊。女儿在北京工作，帮他预约了北京某三甲医院胸外科专家号，请陪诊师小王全程陪同。张先生第一次来北京，对医院完全不熟悉。在服务前一天沟通时，小王说："张先生您好，我是明天陪您就诊的小王。您明天是坐高铁来北京对吧？我明天早上8点在高铁站出口等您，举个写着您名字的牌子。您把之前做的CT片子和报告都带好，身份证、医保卡也别忘了。北京现在天气有点冷，多穿点衣服。明天见！"

接站与前往医院时，小王准时在高铁站出口等候，看到张先生主动上前说："您是张先生吧？一路辛苦了！我来帮您拿行李。"然后帮张先生提着行李引导到停车场，车上简单聊天了解张先生情况，介绍医院基本情况说："张先生，咱们今天看的是胸外科李主任，他是这方面的专家，号特别难挂，您女儿真挺用心的。一会儿见了医生您把您的情况详细说说，有什么问题尽管问。"

医院就诊流程的第一步是取号与候诊，到达医院先帮张先生取号，确认诊室位置带张先生到候诊区说："咱们号比较靠前，前面还有2个人，很快就到了。您先坐这儿休息一下，我去给您倒杯水。"第二步是诊室就诊，叫号后陪同进入诊室，帮张先生把CT片子放在观片灯上，协助张先生描述病情说："医生，他是一个月前体检发现的肺结节，当地医院说可能不太好，想来北京确诊一下。这是他的CT片子和报告。"然后认真记录医生的每一句话，包括结节大小8mm有恶性征象、建议做PET-CT和肿瘤标志物检查、如果PET-CT提示恶性建议手术切除。第三步是开单与缴费，医生开了检查单后让张先生在诊室外面坐着休息，小王去排队缴费，缴完费回来跟张先生说："费用都交好了，我现在带您去做检查。"第四步是检查预约与协调，先去预约PET-CT被告知最早要3天后才能做，张先生说只能在北京待2天想尽快做，小王去找PET-CT中心工作人员协调说明情况，工作人员说有加号名额帮安排到明天下午，跟张先生说明："我跟他们说了您的情况，他们同意给您加个号，明天下午做，这样您后天就能回山东了。"然后去做肿瘤标志物抽血很快就做完了。第五步是后续安排说明，小王跟张先生说："张先生，今天的任务完成了。抽血结果后天早上出来，PET-CT明天下午做，报告后天下午出来。我后天下午帮您取了报告，然后帮您预约李主任下周二的号，您下周二再来北京一趟让李主任看看结果，决定下一步怎么治疗。您看这样安排行吗？"

送站与后续跟进时，当天服务结束送张先生回女儿家，第二天提醒下午做PET-CT的时间和注意事项，后天帮取所有报告拍照发给张先生和他女儿，预约好下周二的专家号，下周二再次陪同就诊确定治疗方案。客户反馈张先生和女儿非常满意说："小王，太谢谢你了！要是没有你，我们父女俩两眼一抹黑，真不知道怎么办才好。你想得太周到了，帮我们解决了大问题。以后我们家人来北京看病都找你！"案例点评认为异地患者对医院完全陌生更需要专业的陪诊服务，要全程陪同从接站到送站提供一站式服务，主动协调解决问题如PET-CT预约超出客户期望，后续跟进到位形成完整的服务闭环，异地患者是高价值客户服务好很容易形成长期合作和转介绍。

**案例二：行动不便老人复查服务**

李阿姨，78岁，家住北京，老伴去世，儿女都在国外。患高血压、糖尿病、冠心病多年，每月需要到医院复查取药。行动不方便，拄着拐杖，眼睛也不太好，不会用智能手机预约挂号。陪诊师小张已经陪她看过好几次了，彼此很熟悉。

服务前准备包括提前一周帮李阿姨预约好专家号，前一天电话提醒："阿姨，明天上午9点我们去医院，您今晚12点以后别吃东西喝水，明天要抽血。早上我8点半到您家接您。"同时准备好轮椅（李阿姨腿脚不好走不了太远）。接人出发时，早上8点半准时到达李阿姨家，敲门进去说："阿姨，我来了！您收拾好了吗？"检查带好病历本、医保卡、常用药物，帮李阿姨穿上外套拎上包，扶着李阿姨慢慢下楼轮椅在楼下等着。

医院就诊的第一步是取号候诊，推轮椅到医院优先走无障碍通道，取号后推到心内科候诊区说："阿姨，您在这儿坐着，我去给您倒杯水。前面还有5个人，大概还要等半小时。"第二步是就诊与沟通，叫号后推轮椅进入诊室说："医生您好，这是李阿姨，今天来复查。她有高血压、糖尿病、冠心病，这次主要是复查一下，看看用不用调药。"医生问："最近血压控制得怎么样？"李阿姨有点记不清，小张拿出血压记录本说："这是她这一个月的血压记录，您看，早上一般140-150/80-85，晚上130-140/75-80。"医生开了抽血、心电图、心脏彩超检查。第三步是陪同检查，先推去抽血说："阿姨，头转过去别看，一会儿就好。您真棒，一点都不害怕！"抽完血让阿姨坐着休息，小张去买早餐（知道阿姨爱吃豆浆油条），然后去做心电图再做心脏彩超，全程推轮椅李阿姨不用走一步路。第四步是看结果取药，检查结果都出来了再找医生看结果，医生说各项指标都还可以药物不用调整，小张去排队取药把每种药的用法用量写在药盒上说："阿姨，这个降压药还是每天早上一片，这个降糖药每天三次，每次一片，饭中吃。"

服务结束送回家时，推轮椅送李阿姨回家，帮李阿姨把药放好贴个提醒纸条在冰箱上，把下次复查的时间写在日历上说："阿姨，我下个月再陪您来。您自己在家注意安全，有什么事随时给我打电话。"客户反馈李阿姨拉着小张的手说："小张，你就像我的亲闺女一样。儿女不在身边，幸好有你陪着我。要是没有你，我一个老太太真不知道怎么去医院。"案例点评认为老年行动不便患者是陪诊服务的核心人群需求稳定，对这类患者服务要更加细致贴心像家人一样照顾，细节服务最能打动人心如记得患者爱吃什么帮贴提醒纸条等，建立信任后会形成长期稳定的服务关系。

**案例三：代问诊服务流程**

王先生，40岁，上海人，工作特别忙经常出差。上个月体检发现甲状腺结节，当地医生说可以观察也可以手术。王先生不想做手术想问问北京的专家有没有更好的治疗方案，但实在抽不出时间来北京，于是请陪诊师小刘帮忙代问诊。

诊前准备时，小刘先跟王先生详细通了一次电话了解具体情况，让王先生把所有检查资料（B超报告、甲功化验单、体检报告等）寄过来，整理王先生想问的问题清单包括：这个结节恶性可能性有多大？是否需要立即手术还是可以观察？如果观察需要多久复查一次？手术的话是微创还是开刀？手术有什么风险和后遗症？如果现在不手术会有什么风险？然后帮王先生预约了北京某三甲医院知名甲状腺专家的号。

就诊当天第一步是取号候诊，按时到医院取号，候诊期间再次熟悉王先生的病例资料。第二步是诊室代问诊，进入诊室跟医生说明情况："医生您好，今天是我替我朋友来问诊的，他本人在上海工作太忙实在抽不出时间来北京。这是他的检查资料，我把他的情况跟您说一下。"然后详细介绍王先生的情况：40岁男性，体检发现甲状腺结节，右侧结节直径1.2cm，B超分级4a级，甲功正常，没有任何症状，当地医生说可以手术也可以观察想听听您的意见。把整理好的问题清单逐条问医生，认真记录医生的每一个回答：4a级结节恶性率大概5-10%、目前1.2cm不算大可以观察也可以手术、观察的话3-6个月复查一次B超、如果担心也可以做穿刺活检明确性质、手术可以做微创颈部没有疤痕、手术风险主要是喉返神经损伤发生率不高。第三步是整理问诊记录，就诊结束后立即整理问诊记录把医生说的每一句话都整理出来，把医生的建议分条列出来，加上自己的理解和说明。第四步是反馈给客户，当天就把整理好的问诊记录发给王先生，电话跟王先生详细沟通："王先生，我今天跟医生沟通完了。医生说您这个结节4a级，恶性率大概5-10%，不算特别高。可以先观察，3-6个月复查一次；也可以直接手术，或者先做穿刺明确性质。手术可以做微创，脖子上不留疤。您看您想选择哪种方案？"解答王先生的后续疑问，并说"如果您想找这个医生做手术，我可以帮您预约住院。"

客户反馈王先生说："小刘，太感谢你了！帮我省了至少两天时间，来回机票钱也省了。你整理的记录比我自己去看记得还详细。以后有需要还找你！"案例点评认为代问诊是重要的服务类型特别适合工作繁忙的人群，代问诊对陪诊师的专业能力要求更高要能准确理解和传达医患双方的意思，详细记录和清晰反馈是代问诊服务的核心价值，代问诊可以延伸后续服务如预约住院和手术陪同。

**案例四：特殊情况（患者突发不适）处理**

张叔叔，65岁，有冠心病史，来医院复查。陪诊师小陈陪同。在候诊的时候，张叔叔突然说胸口不舒服，有点闷疼。

处理过程的第一步是识别情况立即采取措施，小陈注意到张叔叔面色不对眉头紧锁手捂着胸口，立即问："叔叔，您怎么了？胸口不舒服吗？是闷还是疼？"张叔叔说："有点闷，有点疼，喘不上气。"小陈立即扶张叔叔坐下让他靠在椅背上解开领口扣子，说："叔叔您别紧张，放松，深呼吸。您带硝酸甘油了吗？"张叔叔点头，小陈从他口袋里找出硝酸甘油协助舌下含服。第二步是立即呼救，小陈说："叔叔您先坐着休息，我去叫医生，马上回来。"然后立即跑到护士站说明情况："护士您好，那边有个冠心病的病人突然胸痛，麻烦您赶紧过去看看！"护士立即带着血压计和心电图机跟着小陈过去。第三步是配合医护人员处理，护士给张叔叔测血压做心电图说可能是心绞痛发作需要立即到急诊，小陈一边安慰张叔叔一边给张叔叔家属打电话："阿姨您好，我是陪诊小陈。叔叔刚才突然胸口不舒服，护士说可能是心绞痛，现在要去急诊，您别着急，我陪着叔叔呢，您现在往医院赶吧。"小陈推着轮椅把张叔叔送到急诊帮着办手续做检查，医生检查后说是心绞痛问题不大观察一会儿可以回家。第四步是后续安排，家属赶到后小陈详细说明了事情经过和医生的处理意见："叔叔现在没事了，医生说可以回家，继续观察按时吃药。下次如果再出现这种情况立即含硝酸甘油然后打120。"第二天小陈电话回访确认张叔叔情况稳定提醒按时吃药注意休息。

经验总结认为陪诊师要有敏锐的观察力能及时发现患者的异常情况，遇到紧急情况要保持冷静按照流程处理，第一时间寻求专业医疗帮助不要自己硬扛，及时联系家属告知情况让家属放心，事后跟进体现责任心。

## 【课程总结】

本课程系统介绍了陪诊服务的完整流程，包括接单前的准备工作、客户对接与需求评估、诊前准备流程、就诊当日服务全流程、诊后跟进与服务闭环、特殊情况处理流程，并通过4个真实案例展示了不同类型服务的实际操作流程。

**核心要点回顾**：充分的准备是服务成功的基础，准备越充分服务越顺利。充分了解客户需求进行合理的期望值管理可以避免很多纠纷。就诊当日服务要注重细节每个环节都要做到位。诊后跟进是服务的延伸也是建立长期客户关系的关键。特殊情况处理要保持冷静遵循原则以解决问题为导向。标准化的流程加上个性化的服务才能打造优质的服务体验。

**流程的本质**：流程不是束缚而是经验的总结和沉淀。遵循标准化的流程可以减少遗漏和错误，提高服务效率，保证服务质量的稳定性，降低服务风险，让新人快速上手。同时流程也不是一成不变的，要根据实际情况灵活运用，在标准化的基础上提供个性化的服务。

## 【学习目标】

通过本课程学习，学员将掌握常见突发情况的识别方法，学会心肺复苏（CPR）的规范操作，掌握晕厥、抽搐、过敏、心梗、中风等常见急症的处理，了解外伤急救基本技能和急救设备的使用方法，并通过案例学习提升应急处理能力。

> **重要声明**：本课程仅为理论知识培训，不作为执业急救技能需要经过正规机构的实操培训并取得证书后才能进行急救操作！

## 第一章 常见突发情况识别

### 1.1 急救的基本原则

**急救的目的**可以从三个方面来理解，首先是**挽救生命**，包括保持呼吸道通畅、维持呼吸和循环、控制大出血这些最紧迫的措施；其次是**防止病情恶化**，主要是指避免二次伤害、减轻疼痛、稳定病情，避免情况进一步恶化；最后是**促进恢复**，为后续治疗争取时间、减少并发症、提高预后效果，让患者能够更好地恢复健康。

**急救的基本原则**是每个施救者必须牢记的核心理念，**安全第一原则**要求我们首先确保自身安全，再评估现场环境安全，最后才去救助患者，记住不要把自己也变成伤者；**先救命后治伤原则**强调优先处理危及生命的情况，优先级顺序是心跳呼吸骤停、大出血、骨折，要先救命后处理其他问题；**先重后轻原则**要求优先处理重伤者，再处理轻伤者，最后处理轻微伤者，确保最需要帮助的人得到及时救治；**就地抢救原则**指出除非环境危险，否则不要随意搬动患者，就地进行抢救，不要因为等医生到来而耽误最佳抢救时机；**急救与呼救并重原则**提醒我们一边急救一边呼救，尽快拨打120，不要只急救不呼救，也不要只呼救不急救。

**急救的基本步骤**分为四个环节，**第一步评估环境**需要我们判断现场是否安全、有没有漏电火灾爆炸风险、车祸现场有无再次事故风险、自己进去会不会也受伤；**第二步评估病情**需要检查患者意识是否清醒、呼吸是否正常、脉搏有没有、有没有大出血；**第三步紧急呼救**要大声呼救"来人啊！救命啊！"，指定专人拨打120"你，快去打120！"，并说明地点、伤情、人数、联系人等关键信息；**第四步现场急救**包括心肺复苏、止血包扎、骨折固定、搬运患者等具体操作。

---

### 1.2 病情评估方法

**意识评估**是判断患者情况的重要第一步，**判断意识**需要我们轻拍患者双肩、大声呼唤"喂！你怎么了？"、观察有无反应、必要时掐人中确认；**意识状态分类**分为四种情况：清醒状态的患者能回答问题、能按指令动作，嗜睡状态的能唤醒但反应迟钝，昏迷状态的不能唤醒但对疼痛刺激有反应，深昏迷状态的对任何刺激都无反应。

**呼吸评估**需要通过一看二听三感觉的方法，**判断呼吸**时要看胸部有没有起伏、听有没有呼吸声音、感觉有没有气流拂过面颊，评估时间约5-10秒钟；**呼吸异常情况**包括呼吸停止（没有呼吸）、呼吸困难（费力喘息）、呼吸微弱（几乎看不到胸部起伏）、异常呼吸（鼾声、叹息样呼吸）等几种表现。

**循环评估**主要通过触摸脉搏来判断，**判断脉搏**时成人和儿童触摸颈动脉，婴儿触摸肱动脉，触摸时间5-10秒钟；**颈动脉触摸方法**要求在喉结旁开2指位置用食指和中指触摸，不要用拇指触摸，也不要同时触摸两侧颈动脉。

**其他评估**还包括**出血评估**，需要判断有没有明显的外出血、出血量多少、出血速度快慢；**瞳孔评估**需要观察瞳孔是否等大等圆、对光反射是否存在、两侧瞳孔是否对称。

---

### 1.3 拨打急救电话要点

**拨打120的正确方式**需要保持冷静、不要慌张不要哭、说话清晰语速适中、回答调度员问什么答什么；需要说清楚**地点**信息，包括具体地址如XX区XX路XX号XX小区XX号楼XX单元XX室、附近明显标志物如XX超市旁边XX学校对面、怎么进去最方便从哪个门进；还需要说明**伤情**，包括发生了什么事如晕倒心脏病车祸、伤者人数几个人受伤、伤情严重程度有无意识呼吸出血情况；还要提供**联系人**信息，包括你的电话号码、伤者的基本情况年龄性别既往病史；此外还要说明**其他信息**，有没有已经采取的急救措施、有没有特殊情况如电梯坏了小区门禁等。

**注意事项**也很重要，**不要先挂电话**要等调度员问完所有问题、等调度员说可以挂了再挂、因为调度员可能会在电话里指导你急救；**派人接救护车**要求打完电话派人到路口或小区门口等、看到救护车招手示意、带医护人员尽快到达现场；**保持电话畅通**意味着不要占线、可能会回电话询问情况、随时准备接听。

---

### 【本章小结】

掌握急救的基本原则是安全第一、先救命后治伤、先重后轻、就地抢救、急救与呼救并重。病情评估包括意识、呼吸、循环等方面。正确拨打急救电话要说明白地点、伤情、联系人等关键信息，保持冷静，配合调度员。这些是所有急救操作的基础。

## 第二章 心肺复苏（CPR）操作规范

### 2.1 什么是心肺复苏

**心肺复苏（CPR）**即心肺复苏术Cardiopulmonary Resuscitation，是指在心跳呼吸骤停时采取的抢救措施，主要包括胸外按压和人工呼吸两个部分，目的是恢复心跳和呼吸；**心跳呼吸骤停的表现**包括意识丧失、呼吸停止、大动脉搏动消失、面色苍白或紫绀、瞳孔散大等症状，一旦发现这些表现需要立即进行抢救。

**黄金4分钟**是心肺复苏最重要的概念，**时间就是生命**告诉我们心跳停止4分钟内开始CPR存活率可达50%、4-6分钟开始存活率只有10%、超过6分钟存活率仅4%、超过10分钟几乎为0；**大脑缺氧的危害**表现为大脑缺氧4-6分钟、小脑缺氧10-15分钟、延髓缺氧20-30分钟，因此4分钟内开始CPR大部分可以救活且不留后遗症。

---

### 2.2 成人心肺复苏操作步骤

**第一步评估与呼救**需要我们首先**判断意识和呼吸**，轻拍双肩大声呼唤"喂！你怎么了？"，观察胸部有没有反应，观察5-10秒钟，如果没有意识没有呼吸或只有叹息样呼吸就需要立即行动；然后**第二步呼救**要大声喊"来人啊！救命啊！"，指定人打120"你，快去打120！打完告诉我一声！"，指定人拿AED"你，去拿AED！"，需要特别注意的是如果只有你一个人，要先打120再开始CPR。

**第二步胸外按压（C）**是心肺复苏的核心，**摆放体位**要求患者仰卧在坚硬的平面上、解开上衣松开腰带、头部不要高于心脏水平；**按压位置**在两乳头连线中点即胸骨中下1/3处，手掌根部放在这个位置；**按压方法**要求一手掌根放在按压位置、另一手叠放在手背上、手指翘起不要碰到胸壁、手臂伸直肘关节不弯曲、用上身重量垂直向下按压；**按压要点**包括按压深度5-6厘米、按压频率100-120次/分钟、按压与放松时间相等、每次按压后让胸廓完全回弹、按压不要中断尽量减少中断时间。

**第三步开放气道（A）**需要**清理口腔异物**，头偏向一侧用手指抠出口腔内异物，假牙松动的要取下；然后使用**仰头抬颏法**，一手压前额使头后仰，另一手食指和中指抬起下颏，使下颌角与耳垂连线垂直于地面。

**第四步人工呼吸（B）**采用**口对口人工呼吸**，捏紧患者鼻子、你深吸一口气、口对口包住患者的口、缓慢吹气时间1秒钟、看到胸廓隆起就可以了、连续吹2口气；**按压吹气比例**为30次按压配2次吹气，重复循环进行，每五个循环约2分钟检查一次。

**第五步持续复苏**要求我们**持续CPR**以30:2循环进行、不要轻易放弃、直到医护人员到达或患者恢复自主呼吸心跳；**终止CPR的指征**包括患者恢复自主呼吸和心跳、医护人员到达接手、环境危及施救者无法继续、精疲力尽时、医生宣布死亡等情况。

---

### 2.3 儿童和婴儿心肺复苏要点

**儿童CPR（1-8岁）**与成人有所不同，**判断意识**时需要拍击足跟或掐上臂、呼叫患儿名字；**按压位置**在两乳头连线中点稍下方；**按压深度**约5厘米或胸廓前后径的1/3；**按压频率**保持100-120次/分钟；**按压吹气比例**单人施救为30:2、双人施救为15:2；**人工呼吸**可以采用口对口鼻的方式进行。

**婴儿CPR（1岁以下）**需要更加轻柔的操作，**判断意识**时拍击足跟、观察反应；**判断脉搏**需要触摸肱动脉即上臂内侧；**按压位置**在两乳头连线中点稍下方；**按压方法**可以采用两指按压法用两手指按压，或环抱按压法双手环抱胸部两拇指按压；**按压深度**约4厘米或胸廓前后径的1/3；**按压频率**同样保持100-120次/分钟；**人工呼吸**采用口对口鼻吹气，轻轻吹看到胸廓隆起就可以了。

---

### 2.4 CPR常见错误与注意事项

**常见错误**需要我们特别注意避免，**按压位置不对**会导致效果差，位置太高按到胸骨上段、位置太低按到剑突容易骨折、位置偏了按到肋骨导致骨折气胸；**按压深度不够**时太浅没效果，只压下去2-3厘米等于白按，一定要压到5-6厘米才有效果；**按压频率不对**时太慢或太快都没效果，100-120次/分钟是最合适的频率；**手臂弯曲**是用手臂力量按压的错误做法，应该用上身重量，手臂要伸直；**按压中断时间太长**会严重影响效果，中断不要超过10秒钟，换人要快，尽量减少中断。

**注意事项**包括**患者注意保护自己**，施救者要注意不要受伤，可以用膝盖跪在患者两侧，不要弯腰驼背，及时换人按压；**注意保护患者**要求不要用力过猛导致肋骨骨折，不要按压剑突，人工呼吸不要吹太猛；**特殊情况**如孕妇按压位置稍高，肥胖患者用力要足够，胸部外伤者视情况决定是否按压。

---

### 【本章小结】

心肺复苏是急救最重要的技能。成人CPR操作步骤：评估与呼救、胸外按压、开放气道、人工呼吸，遵循C-A-B顺序。按压位置两乳头连线中点，深度5-6cm，频率100-120次/分钟，按压吹气比例30:2。儿童和婴儿CPR有一些特殊要点。要注意避免常见错误，保护自己和患者。

## 第三章 常见急症处理

### 3.1 晕厥的处理

**什么是晕厥**？**晕厥的定义**是指突然的、短暂的意识丧失，由于大脑一过性供血不足引起，一般能自行恢复；**常见原因**包括血管迷走性晕厥最常见由情绪紧张疼痛站立过久引起、体位性低血压由突然站起来导致、心源性晕厥由心脏病引起最危险、脑源性晕厥由脑血管问题导致。

**晕厥的表现**分为**发作前症状**可能出现头晕眼花、恶心出冷汗、面色苍白、视力模糊、耳鸣、全身无力等表现；**发作时表现**为突然摔倒、意识丧失、面色苍白、四肢松软，一般持续几秒钟到几分钟。

**晕厥的处理**需要按步骤进行，**第一步立即平卧**要求立即扶患者躺下、采用头低脚高位即头稍低脚抬高、解开领口和腰带；**第二步保持呼吸道通畅**要求头偏向一侧、防止呕吐物窒息、检查有没有呕吐物；**第三步判断病情**需要判断有没有呼吸心跳，如果没有要立即进行心肺复苏，同时检查有没有受伤；**第四步促醒**可以掐人中、可以扇风，但不要喂水清醒前不要喂任何东西；**第五步后续处理**要求清醒后不要立即站起来，先休息一会儿再慢慢起来，可以喝些糖水，严重情况需要去医院检查；**注意事项**包括不要立即扶患者坐起来或站起来、不要喂水喂药清醒前、不要掐太重、如果5分钟还没醒要打120。

---

### 3.2 抽搐（癫痫）的处理

**抽搐的表现**主要是**癫痫大发作表现**包括突然意识丧失、全身肌肉强直、四肢抽搐、两眼上翻、口吐白沫、牙关紧闭、大小便失禁，一般持续数分钟。

**抽搐的处理**需要科学应对，**第一步确保安全**要求立即扶患者躺下防止摔倒受伤、移开周围危险物品如桌子椅子热水瓶等、头下垫柔软物品；**第二步保持呼吸道通畅**要求头偏向一侧、解开领口、清理口腔分泌物；**第三步防止受伤**特别强调不要按压患者抽搐的肢体容易骨折、不要往嘴里塞任何东西、不要掐人中没用、不要做人工呼吸没用；**第四步观察记录**需要记录抽搐开始时间、观察抽搐部位和表现、观察意识状态；**第五步抽搐结束后**要让患者侧卧休息、检查有没有受伤、安抚患者、拨打120去医院；**绝对不能做的**包括不要往嘴里塞东西手指毛巾筷子等、不要用力按压抽搐的肢体、不要掐人中、抽搐时不要喂水喂药。

---

### 3.3 过敏性休克的处理

**过敏的表现**首先需要了解**常见过敏原**包括药物如青霉素头孢、食物如海鲜坚果、昆虫叮咬如蜜蜂黄蜂等；**轻度过敏**表现为皮肤瘙痒皮疹荨麻疹、脸部嘴唇眼睑肿胀、打喷嚏流鼻涕；**重度过敏即过敏性休克**表现为呼吸困难喉头水肿、血压下降面色苍白出冷汗、意识障碍昏迷，可能危及生命。

**过敏性休克的处理**需要争分夺秒，**第一步立即脱离过敏原**要求停止接触过敏原、如果是昆虫叮咬在伤口近心端扎止血带、不要拔毒刺用卡片刮掉；**第二步立即呼救**要求拨打120、说明是过敏休克；**第三步体位处理**要求平卧脚抬高、呼吸困难可以半卧位、意识不清头偏向一侧；**第四步如果有肾上腺素笔立即注射**，有条件立即注射肾上腺素、选择大腿外侧肌肉注射、这是最有效的救命药；**第五步保持呼吸道通畅**要求解开领口、吸氧如果有、必要时进行心肺复苏；**第六步尽快送医院**要求即使好转也要去医院观察、因为过敏反应可能会反复。

---

### 3.4 急性心肌梗死的处理

**心梗的表现**分为**典型表现**和**不典型表现**，**典型表现**为胸骨后或心前区压榨样疼痛、疼痛可放射至左肩左臂下颌背部、疼痛持续超过15分钟休息或含硝酸甘油不缓解、伴有出汗恶心呕吐呼吸困难、有濒死感；**不典型表现**包括老年人可能只有胸闷气短、糖尿病患者可能没有胸痛只有全身无力、女性可能表现为背痛胃痛。

**心梗的处理**需要争分夺秒，**第一步立即停止活动**要求立即坐下或躺下休息、不要走动、不要用力；**第二步保持镇静**要求不要紧张、深呼吸、避免情绪激动；**第三步舌下含服硝酸甘油**要求硝酸甘油1片舌下含服、5分钟不缓解再含1片、最多含3片、血压低的不要含；**第四步立即呼救**要求拨打120、说明可能是心梗、说清楚地点；**第五步吸氧**要求有条件就吸氧；**第六步密切观察**要求监测意识呼吸脉搏、如果心跳骤停立即进行心肺复苏；**绝对不能做的**包括不要自己走路去医院、不要开车去医院、不要等疼痛缓解再去医院、不要拖延时间。

---

### 3.5 脑卒中（中风）的处理

**中风的表现**采用国际通用的**FAST识别法**，**F即Face脸**表现为一侧脸麻木、口角歪斜、不对称；**A即Arm手臂**表现为一侧手臂无力或麻木、抬不起手臂、两手平举一侧下落；**S即Speech说话**表现为说话不清、不能说话、听不懂别人说话；**T即Time时间**要求立即拨打120、时间就是大脑；**其他表现**包括突然剧烈头痛、头晕站立不稳、视物模糊或成双、意识障碍等。

**中风的处理**同样需要争分夺秒，**第一步立即拨打120**要求认识到中风是急症、时间就是大脑、每耽误1分钟190万个脑细胞死亡；**第二步保持安静**要求让患者平卧、头稍垫高、不要晃动患者；**第三步保持呼吸道通畅**要求头偏向一侧、解开领口、清理呕吐物；**第四步观察病情**要求记录发病时间、观察意识呼吸、有条件测血压；**第五步不要做的**包括不要喂水喂药、不要摇晃患者、不要让患者自己去医院、不要等"看看再说"；**黄金救治时间**强调缺血性中风溶栓时间窗为4.5小时内、越早治疗后遗症越小。

---

### 【本章小结】

本章介绍了晕厥、抽搐、过敏性休克、急性心梗、脑卒中五种常见急症的表现和处理方法。每种急症都有其特定的识别要点和处理原则，掌握这些知识可以在关键时刻挽救生命。记住：遇到急症首先要保持冷静，正确识别情况，立即呼救，采取正确的处理措施，不要做错误的操作加重病情。

## 第四章 外伤急救基本技能

### 4.1 止血技术

**出血的种类**可以从两个维度来分类，**按出血部位分**包括外出血即血液从伤口流出体外、内出血即血液流入体内组织或体腔外面看不到更危险；**按血管类型分**包括动脉出血表现为鲜红色喷射状出血快危险性大、静脉出血表现为暗红色流出状出血较缓慢、毛细血管出血表现为渗血危险性小。

**常用止血方法**有四种主要技术，**指压止血法**是用手指压迫出血血管近心端、适用于动脉出血临时止血、压迫力度要够阻断血流、不能长时间压迫；**加压包扎止血法**是最常用的止血方法、用干净纱布毛巾等盖住伤口、用绷带或布条加压包扎、压力要够能止血又不阻断远端血运；**止血带止血法**适用于四肢大血管出血、其他方法止不住时用、用橡皮管布条等、扎在伤口近心端、不要直接扎在皮肤上要垫衬垫、记录上止血带时间、每40-50分钟放松一次每次放松1-2分钟；**填塞止血法**适用于深部伤口出血、用纱布填塞在伤口内、外面再加压包扎。

**注意事项**包括**应该做的**用干净的材料包扎、包扎力度适当、记录止血带时间、尽快送医院；**不应该做的**用不干净的东西盖伤口、止血带不要用铁丝电线、止血带不要扎太紧或太松、不要忘了松止血带。

---

### 4.2 包扎技术

**包扎的目的**包括保护伤口防止感染、压迫止血、固定敷料和夹板、减轻疼痛；**常用包扎材料**包括绷带、三角巾、就地取材如毛巾布条领带等；**基本包扎方法**有四种技术，**环形包扎法**是最基本的方法、适用于手腕小腿等粗细均匀部位、环形缠绕每圈压住前一圈；**螺旋包扎法**适用于四肢等粗细差不多的部位、先环形包扎几圈、然后斜向上缠绕每圈压前圈1/2-2/3；**8字形包扎法**适用于关节部位、在关节上下8字形缠绕；**三角巾包扎**可用于头部包扎、胸部包扎、手臂悬吊等部位。

**包扎注意事项**要求包扎前先盖敷料、不要太松也不要太紧、四肢包扎要露出指趾端观察血运、打结不要打在伤口上。

---

### 4.3 骨折固定

**骨折的表现**包括疼痛即剧烈疼痛活动时加重、肿胀即受伤部位肿胀、畸形即骨折部位变形、功能障碍即不能活动、骨擦音即骨折端摩擦的声音；**骨折固定的目的**包括减轻疼痛、防止骨折端移动损伤血管神经、便于搬运；**骨折固定方法**需要使用**固定材料**包括夹板即专用夹板或木棍树枝硬纸板等、敷料即纱布棉花等垫在夹板和皮肤之间、绷带布条等固定；**固定原则**要求先止血包扎伤口再固定骨折、固定骨折上下两个关节、不要试图复位骨折、固定要牢固但不要太紧、四肢固定要露出指端观察血运；**常见骨折固定**包括上肢骨折用夹板固定手臂用三角巾悬吊在胸前、下肢骨折用长夹板固定没有夹板可以和健侧腿绑在一起、脊柱骨折不要随意搬动不要让患者坐起或站立用硬板搬运保持脊柱直线不要弯曲扭转；**注意事项**强调不要试图把骨折端复位、不要按摩骨折部位、不要让骨折患者活动、脊柱骨折不要用软担架搬运。

---

### 4.4 搬运技术

**搬运的基本原则**要求先急救包扎固定再搬运、不要随意搬动患者、搬运过程中不要加重损伤、注意保护脊柱脊柱患者要保持直线；**常用搬运方法**包括**单人搬运法**如扶行法适用于清醒能行走的伤者、背负法适用于体重较轻的伤者、抱持法适用于儿童或体重较轻者；**双人搬运法**如椅托式两人像椅子一样搬运、拉车式一人抬头一人抬脚；**三人搬运法**三人并排同时抬起患者适用于脊柱骨折患者；**担架搬运法**是最安全的搬运方法适用于重伤患者、脊柱骨折要用硬板担架；**特殊患者搬运**特别是**脊柱骨折搬运**要求绝对禁止一人抱胸一人抱腿、至少3人最好4-5人、保持脊柱直线不弯曲扭转、用硬板担架、颈部损伤要专人固定头部。

---

### 【本章小结】

外伤急救包括止血、包扎、骨折固定、搬运四项基本技术。止血有指压、加压包扎、止血带等方法；包扎要注意保护伤口、适当加压；骨折固定要固定骨折上下关节，不要试图复位；搬运要注意保护脊柱，避免二次伤害。掌握这些技能可以在外伤现场正确处理，减少伤害。

## 第五章 急危重症识别与就医时机判断

### 5.1 需要立即就医的情况

**必须立即打120的情况**是**危及生命的情况**包括心跳呼吸骤停、意识丧失或昏迷、严重呼吸困难窒息、大出血止不住、严重胸痛怀疑心梗、中风表现FAST任何一项；**需要尽快就医的情况**是**紧急但不立即危及生命**包括持续胸痛不缓解、严重腹痛、严重头痛呕吐、高热不退、严重过敏反应、抽搐发作、急性创伤骨折、服毒药物过量等。

---

### 5.2 常见急症的危险信号

**胸痛的危险信号**包括**高危胸痛**表现为压榨样紧缩样胸痛、胸痛持续超过15分钟不缓解、伴有出汗恶心呕吐、伴有呼吸困难、放射至肩背下颌手臂、休息或含硝酸甘油不缓解；**可能的疾病**包括急性心肌梗死、主动脉夹层、肺栓塞、张力性气胸，这些情况必须立即就医。

**头痛的危险信号**包括**高危头痛**表现为突然发生的剧烈头痛即一生中最痛的头痛、头痛伴有呕吐特别是喷射性呕吐、头痛伴有意识障碍精神异常、头痛伴有肢体无力言语不清、头部外伤后头痛加重、老年人突发头痛；**可能的疾病**包括蛛网膜下腔出血、脑出血、脑膜炎、脑肿瘤，这些情况必须立即就医。

**腹痛的危险信号**包括**高危腹痛**表现为突发剧烈腹痛持续不缓解、腹痛伴有休克表现面色苍白出冷汗血压下降、腹痛伴有呕吐鲜血或便血、腹痛伴有腹肌紧张压痛反跳痛、老年人腹痛、外伤后腹痛；**可能的疾病**包括消化道穿孔、急性胰腺炎、肠梗阻、宫外孕破裂、内脏破裂出血，这些情况必须立即就医。

---

### 5.3 就医时机判断原则

**宁早勿晚原则**强调**时间就是生命**，很多急症越早治疗效果越好，心梗时时间就是心肌、中风时时间就是大脑、创伤时时间就是生命；**不要侥幸心理**包括不要等等看、不要忍忍就过去了、不要怕麻烦、不要怕花钱。

**宁可信其有原则**提醒我们**不要自己诊断**，普通人很难准确判断病情，不要我觉得没事、不要应该没事、专业的事交给专业的人；**宁可错判不能漏判**说明去医院检查没事最好、漏诊后果严重、不要因为怕白跑而耽误。

---

### 5.4 陪诊师在急危重症中的角色

**陪诊师能做的**包括识别危险信号及时发现异常、立即呼救拨打120、在专业人员到来前进行必要的急救、安抚患者和家属情绪、配合医护人员工作、及时联系家属告知情况、保存好相关资料和物品；**陪诊师不能做的**包括不能自己诊断病情、不能给患者用药、不能进行超出能力范围的操作、不能代替医生做决定、不能隐瞒病情或家属。

---

### 【本章小结】

准确识别急危重症的危险信号，把握正确的就医时机非常重要。危及生命的情况要立即打120，紧急情况要尽快就医。胸痛、头痛、腹痛都有其特定的危险信号。就医时机判断要遵循宁早勿晚、宁可信其有的原则。陪诊师在急危重症中要明确自己的角色，做能做的，不做超出能力范围的。

## 第六章 急救设备使用

### 6.1 AED（自动体外除颤器）使用

**什么是AED**？**AED定义**是自动体外除颤器，可以自动分析心律，发现需要除颤的心律自动充电放电，操作简单普通人也能使用；**AED的作用**是室颤是心脏骤停最常见的心律，除颤是治疗室颤最有效的方法，每延迟1分钟除颤存活率下降7-10%，CPR加AED可以大大提高心脏骤停的存活率。

**AED的使用步骤**分为五个步骤，**第一步开**要求打开AED电源开关、听语音提示按提示操作；**第二步贴**要求撕开电极片包装、按图示位置贴在患者胸前、一片贴在右上胸锁骨下、一片贴在左乳头外侧腋中线；**第三步插**要求电极片插头插入AED主机插孔；**第四步析**要求AED自动分析心律、此时所有人不要接触患者、大声说离开患者；**第五步除颤**要求如果建议除颤AED自动充电、充电完成后确认所有人离开患者、按下除颤键放电、放电后立即继续CPR；**重要提示**要求按AED语音提示操作、AED会一步步告诉你怎么做、不要怕错AED不会错放电、贴错也没关系。

**注意事项**包括**AED使用安全**，AED非常安全、不会电击到施救者、不需要专业知识也能使用、按语音提示做就可以了；**AED适用人群**是所有心跳骤停都可以用、成人儿童婴儿都可以用、儿童可以用儿童电极片或成人电极片减半贴；**特殊情况**包括患者胸有水要擦干、有植入起搏器避开、有药物贴片要拿掉。

---

### 6.2 急救包的配置与使用

**急救包基本配置**包括**外伤处理用品**如各种尺寸创可贴、无菌纱布、绷带各种尺寸、三角巾、止血带、消毒棉球碘伏棉片、医用手套、剪刀、镊子；**急救用品**包括医用口罩、一次性呼吸膜人工呼吸用、冰袋、体温计、血压计可选；**药品**包括硝酸甘油心梗用、抗过敏药、止痛药、晕车药、藿香正气水中暑用；**其他用品**包括急救手册、手电筒、哨子、应急联系卡；**急救包使用注意事项**要求定期检查药品有效期、检查用品是否齐全、及时补充消耗的用品；存放位置要求放在容易拿到的地方、放在儿童够不到的地方、服务时随身携带。

---

### 6.3 氧气的使用

**吸氧的适应症**包括需要吸氧的情况有呼吸困难、缺氧表现口唇紫绀、心脏病发作、中风、严重外伤、慢阻肺急性发作；**吸氧的注意事项**包括**安全使用**要求远离火源油污、不要在吸氧时抽烟、氧气瓶要固定好不要摔倒、调节好氧流量；**使用要点**要求一般流量2-4升每分钟、不要开太大、注意观察患者反应、不要长时间高流量吸氧。

---

### 【本章小结】

AED是心脏骤停最重要的急救设备，使用步骤：开、贴、插、析、颤，按语音提示操作即可，安全有效。急救包应配置外伤处理用品、急救用品、常用药品等，定期检查补充。氧气使用要注意安全，调节适当流量。掌握这些设备的使用可以大大提高急救效果。

## 第七章 急救场景案例

### 案例一：商场老人突然晕倒的急救

**案例背景**：你陪客户在商场购物，突然看到不远处一位老人突然晕倒在地，周围的人都围了上去。你作为有急救知识的陪诊师，你该如何处理？

**处理过程**需要按步骤进行，**第一步评估环境安全**要求快速上前先看周围环境是否安全、地面有没有水有没有电、确认安全后再靠近；**第二步判断意识呼吸**要求轻拍老人双肩"大爷！大爷！你怎么了？"、观察胸部有没有起伏5-10秒钟、老人没有反应没有呼吸；**第三步呼救**要求大声喊"来人啊！有人晕倒了！"、指定一个人"你，快去打120！说清楚地点在XX商场XX楼层！"、问"有没有人会急救？"、问"商场有没有AED？快去拿！"；**第四步开始CPR**要求解开老人上衣、找准两乳头连线中点、开始胸外按压、30次按压2次人工呼吸、按100-120次每分钟深度5-6厘米；**第五步AED到达后使用AED**要求AED拿来后立即打开电源、按提示贴电极片、插好插头、让所有人离开AED分析心律、建议除颤就按下除颤键、除颤后立即继续按压；**第六步医护人员到达后交接**要求120到达后向医护人员说明情况"老人大约10分钟前晕倒，我们发现时没有呼吸，立即开始CPR，用AED除颤一次。老人没有反应。"然后交给专业人员处理。

**经验总结**告诉我们遇到晕倒首先判断是不是心跳骤停不要一上来就掐人中、呼救很重要一个人做CPR效果差多人配合效果好、AED越早用越好不要等、不要怕做错做了就比不做强。

---

### 案例二：患者候诊时突发胸痛

**案例背景**：你陪患者李叔叔在医院候诊，李叔叔突然说胸口疼，脸色苍白，出冷汗，你该如何处理？

**处理过程**需要按步骤进行，**第一步立即让患者坐下休息**要求扶患者慢慢坐下让他靠好，让他靠在椅背上深呼吸；**第二步询问病情**要求了解疼痛位置、性质、持续时间等，李叔叔说心口压得慌像有块大石头压着后背也疼了有十分钟越来越厉害，并确认是否有心脏病史；**第三步舌下含服硝酸甘油**要求帮患者拿出硝酸甘油协助含在舌下，让患者把药含在舌头下面不要咽下去；**第四步立即呼救**要求立即跑到护士站说明情况"护士你好，那边有个冠心病的病人突然胸痛，可能是心梗，麻烦你们赶紧过去看看！"；**第五步监测病情**要求回到患者身边观察面色呼吸脉搏，安慰患者不要紧张医生马上就来了，询问患者现在感觉怎么样有没有好一点；**第六步配合医生处理**要求向医生说明情况"医生您好，这位患者有冠心病史，十分钟前突然胸痛，是压榨样疼痛，放射到后背，已经含了硝酸甘油一片。"并配合医生测血压做心电图；**第七步联系家属**要求给患者家属打电话"您好，我是陪诊师小王。李叔叔刚才在医院突然胸痛，医生说可能是心梗，现在要去急诊，您方便现在过来一下吧。"

**经验总结**告诉我们胸痛患者首先要停止一切活动坐下或躺下休息、有冠心病史的患者胸痛要高度怀疑心梗、立即含服硝酸甘油同时呼救、不要让患者自己走动不要拖延。

---

### 案例三：儿童输液时突发过敏

**案例背景**：你陪5岁的小朋友输液，输液5分钟后，小朋友突然说身上痒，出现皮疹，你该如何处理？

**处理过程**需要按步骤进行，**第一步立即停止输液**要求立即按下呼叫铃同时关掉输液调节器停止输液，大声呼叫护士"护士！护士！快来！孩子过敏了！"；**第二步评估病情**要求观察孩子皮疹情况、有没有呼吸困难、面色怎么样，如果意识清楚能说话只有皮疹没有呼吸困难是轻度过敏，如果有呼吸困难喉头水肿面色苍白是重度过敏；**第三步保持呼吸道通畅**要求让孩子坐好解开领口，安慰孩子"宝贝别害怕，阿姨在这儿呢，没事的。"；**第四步配合医生护士处理**要求向护士说明情况"护士你好，孩子输液5分钟后开始痒，出皮疹，可能过敏了。"配合护士更换输液器换上生理盐水，配合医生给抗过敏药；**第五步观察病情变化**要求密切观察孩子的呼吸面色皮疹变化，询问"宝贝，现在感觉怎么样？还痒吗？呼吸困不困难？"如果出现呼吸困难面色苍白等加重要立即告诉医生；**第六步联系家长**要求给家长打电话说明情况。

**经验总结**告诉我们输液过敏要立即停止输液、轻度过敏只有皮疹重度过敏有呼吸困难、过敏可能加重要密切观察、过敏可能发生需要做好急救准备。

### 案例四：患者吃饭时噎住了（海姆立克急救法）

**案例背景**：你陪患者张阿姨在医院食堂吃饭，张阿姨吃着吃着突然说不出话来，手抓喉咙，脸色发紫，你意识到她噎住了，你该如何处理？

**海姆立克急救法**需要按步骤进行，**第一步识别气道异物梗阻**表现为不能说话、不能咳嗽、不能呼吸、手抓脖子V字手势、面色紫绀；**第二步立即施救**要求**成人海姆立克急救法**站在患者身后、双臂环抱患者腰部、一手握拳拇指侧顶住患者脐上两指位置、另一手包住拳头、快速向内向上冲击腹部、反复冲击直到异物排出；**第三步观察效果**要求观察有没有异物咳出来、患者能不能说话呼吸、如果排出成功就成功了、没有排出继续冲击；**第四步如果患者昏迷倒下**要求立即进行心肺复苏；**第五步异物排出后**要求安抚患者、检查有没有受伤、必要时去医院检查。

**海姆立克要点**要求站位在肚脐上两指、向内向上冲击、要有冲击力、不要怕用力、宁可用力大一点不要用太轻没用。

        // DOM 元素
        const contentEl = document.getElementById('content');
        const tocListEl = document.getElementById('toc-list');
        const courseTitleEl = document.getElementById('course-title');
        const progressBar = document.getElementById('progress-bar');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const courseTopProgress = document.getElementById('course-top-progress');
        const courseTotalSections = document.getElementById('course-total-sections');
        const courseCompletedSections = document.getElementById('course-completed-sections');
        const completeAllBtn = document.getElementById('complete-all-btn');

        // 当前课程ID
        let currentCourseId = null;

        // 课程章节配置
        const courseSectionConfig = {
            1: 5,
            2: 6,
            3: 5,
            4: 5,
            5: 6,
            6: 6
        };

        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化 marked.js 配置
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // 从localStorage获取进度
        function getCourseProgress(courseId) {
            const allProgress = JSON.parse(localStorage.getItem('courseProgress') || '{}');
            return allProgress[`course_${courseId}`] || { sections: {}, completed: false };
        }

        // 保存课程进度
        function saveCourseProgress(courseId, progress) {
            const allProgress = JSON.parse(localStorage.getItem('courseProgress') || '{}');
            allProgress[`course_${courseId}`] = progress;
            localStorage.setItem('courseProgress', JSON.stringify(allProgress));
        }

        // 更新章节完成状态
        function toggleSectionComplete(sectionId) {
            const progress = getCourseProgress(currentCourseId);
            const isCompleted = progress.sections[sectionId] || false;
            progress.sections[sectionId] = !isCompleted;

            // 检查是否全部完成
            const totalSections = courseSectionConfig[currentCourseId] || 5;
            const completedCount = Object.keys(progress.sections).filter(k => progress.sections[k]).length;
            progress.completed = completedCount >= totalSections;

            saveCourseProgress(currentCourseId, progress);
            updateSectionButton(sectionId, !isCompleted);
            updateCourseProgress();
        }

        // 更新章节按钮状态
        function updateSectionButton(sectionId, isCompleted) {
            const btn = document.querySelector(`[data-section="${sectionId}"]`);
            if (btn) {
                if (isCompleted) {
                    btn.classList.add('completed');
                    btn.innerHTML = '<i class="fa fa-check-circle"></i> 已完成';
                } else {
                    btn.classList.remove('completed');
                    btn.innerHTML = '<i class="fa fa-circle-o"></i> 完成本章学习';
                }
            }
        }

        // 更新课程进度显示
        function updateCourseProgress() {
            const progress = getCourseProgress(currentCourseId);
            const totalSections = courseSectionConfig[currentCourseId] || 5;
            const completedCount = Object.keys(progress.sections).filter(k => progress.sections[k]).length;

            if (courseTotalSections) courseTotalSections.textContent = totalSections;
            if (courseCompletedSections) courseCompletedSections.textContent = completedCount;

            if (completeAllBtn) {
                completeAllBtn.disabled = progress.completed;
                if (progress.completed) {
                    completeAllBtn.innerHTML = '<i class="fa fa-check-circle mr-1"></i>课程已完成';
                } else {
                    completeAllBtn.innerHTML = '<i class="fa fa-check-circle mr-1"></i>完成全部学习';
                }
            }

            // 更新目录中的完成状态
            Object.keys(progress.sections).forEach(sectionId => {
                if (progress.sections[sectionId]) {
                    const tocLink = document.querySelector(`.toc-link[data-id="${sectionId}"]`);
                    if (tocLink && !tocLink.classList.contains('section-completed')) {
                        tocLink.classList.add('section-completed');
                        tocLink.innerHTML = tocLink.textContent + ' <i class="fa fa-check text-green-500 ml-1"></i>';
                    }
                }
            });
        }

        // 完成所有章节
        function completeAllSections() {
            const progress = getCourseProgress(currentCourseId);
            const totalSections = courseSectionConfig[currentCourseId] || 5;

            // 获取所有章节ID
            const sectionIds = [];
            document.querySelectorAll('.markdown-body h2 span[id]').forEach(h2 => {
                sectionIds.push(h2.id);
            });

            // 标记所有章节为完成
            sectionIds.forEach(id => {
                progress.sections[id] = true;
            });

            progress.completed = true;
            saveCourseProgress(currentCourseId, progress);

            // 更新所有按钮
            sectionIds.forEach(id => updateSectionButton(id, true));
            updateCourseProgress();

            showToast('恭喜！本课程已全部完成');
        }

        // 解析 Markdown 标题用于生成目录
        function extractHeadings(markdown) {
            const headings = [];
            const lines = markdown.split('\n');
            
            lines.forEach(line => {
                const h2Match = line.match(/^## (.+)/);
                const h3Match = line.match(/^### (.+)/);
                
                if (h2Match) {
                    headings.push({
                        level: 2,
                        text: h2Match[1].trim(),
                        id: generateId(h2Match[1])
                    });
                } else if (h3Match) {
                    headings.push({
                        level: 3,
                        text: h3Match[1].trim(),
                        id: generateId(h3Match[1])
                    });
                }
            });
            
            return headings;
        }

        // 生成标题ID
        function generateId(text) {
            return text
                .replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '-')
                .replace(/-+/g, '-')
                .toLowerCase();
        }

        // 为标题添加ID（用于锚点跳转）
        function addHeadingIds(markdown) {
            return markdown.replace(/^(#{2,3}) (.+)$/gm, (match, hashes, text) => {
                const id = generateId(text);
                return `${hashes} <span id="${id}">${text}</span>`;
            });
        }

        // 渲染目录
        function renderToc(headings) {
            tocListEl.innerHTML = '';
            
            headings.forEach(heading => {
                const li = document.createElement('li');
                li.className = `toc-item level-${heading.level}`;
                
                const a = document.createElement('a');
                a.className = 'toc-link';
                a.href = `#${heading.id}`;
                a.textContent = heading.text;
                a.dataset.id = heading.id;
                
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(heading.id);
                    if (target) {
                        const offset = target.offsetTop - 80;
                        window.scrollTo({
                            top: offset,
                            behavior: 'smooth'
                        });
                    }
                    // 移动端点击后关闭菜单
                    if (window.innerWidth <= 768) {
                        closeSidebar();
                    }
                });
                
                li.appendChild(a);
                tocListEl.appendChild(li);
            });
        }

        // 更新目录高亮
        function updateTocHighlight() {
            const headings = document.querySelectorAll('.markdown-body h2 span[id], .markdown-body h3 span[id]');
            const tocLinks = document.querySelectorAll('.toc-link');
            
            let currentId = '';
            
            headings.forEach(heading => {
                const rect = heading.getBoundingClientRect();
                if (rect.top < 150) {
                    currentId = heading.id;
                }
            });
            
            tocLinks.forEach(link => {
                link.classList.remove('active');
                if (link.dataset.id === currentId) {
                    link.classList.add('active');
                }
            });
        }

        // 更新阅读进度
        function updateProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            progressBar.style.width = `${Math.min(progress, 100)}%`;
        }

        // 移动端菜单控制
        function openSidebar() {
            sidebar.classList.add('active');
            overlay.classList.add('active');
            menuToggle.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            menuToggle.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', () => {
            if (sidebar.classList.contains('active')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        overlay.addEventListener('click', closeSidebar);

        // Toast提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 10000;
                animation: fadeInUp 0.3s ease;
            `;
            toast.innerHTML = '<i class="fa fa-check-circle text-green-400 mr-2"></i>' + message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 加载课程内容
        async function loadCourse(id) {
            const course = courses[id];
            currentCourseId = id;
            
            if (!course) {
                contentEl.innerHTML = `
                    <div class="error-tip">
                        <i class="fa fa-exclamation-circle"></i>
                        <h2>课程不存在</h2>
                        <p>未找到对应的课程内容，请返回首页选择其他课程。</p>
                        <a href="index.html" style="color: #2563eb; text-decoration: none; margin-top: 15px; display: inline-block;">
                            返回首页
                        </a>
                    </div>
                `;
                courseTitleEl.textContent = '课程不存在';
                return;
            }
            
            courseTitleEl.textContent = `课程${id}：${course.title}`;
            document.title = `${course.title} - 陪诊师培训`;
            
            // 显示进度条
            courseTopProgress.style.display = 'flex';
            contentEl.classList.add('with-progress');
            
            try {
                // 直接使用嵌入的内容，不再 fetch
                const markdown = course.content;
                
                // 提取标题并渲染目录
                const headings = extractHeadings(markdown);
                renderToc(headings);
                
                // 处理Markdown，移除#符号并添加ID
                const processedMarkdown = addHeadingIds(markdown);
                
                // 渲染内容
                const html = marked.parse(processedMarkdown);
                contentEl.innerHTML = html;
                
                // 移除h1的#符号（如果有的话）
                contentEl.querySelectorAll('h1').forEach(h1 => {
                    h1.textContent = h1.textContent.replace(/^#+\s*/, '');
                });
                
                // 为每个h2标题添加完成按钮
                setTimeout(() => {
                    addCompletionButtons();
                    updateCourseProgress();
                }, 100);
                
            } catch (error) {
                console.error('加载课程失败:', error);
                contentEl.innerHTML = `
                    <div class="error-tip">
                        <i class="fa fa-exclamation-circle"></i>
                        <h2>加载失败</h2>
                        <p>无法加载课程内容，请检查网络连接后重试。</p>
                        <a href="index.html" style="color: #2563eb; text-decoration: none; margin-top: 15px; display: inline-block;">
                            返回首页
                        </a>
                    </div>
                `;
            }
        }

        // 为h2标题添加完成按钮
        function addCompletionButtons() {
            const h2Elements = contentEl.querySelectorAll('h2');
            const progress = getCourseProgress(currentCourseId);
            
            h2Elements.forEach(h2 => {
                const sectionId = h2.id;
                const isCompleted = progress.sections && progress.sections[sectionId];
                
                // 创建按钮
                const btn = document.createElement('button');
                btn.className = `complete-section-btn ${isCompleted ? 'completed' : ''}`;
                btn.setAttribute('data-section', sectionId);
                btn.innerHTML = isCompleted 
                    ? '<i class="fa fa-check-circle"></i> 已完成' 
                    : '<i class="fa fa-circle-o"></i> 完成本章学习';
                btn.onclick = () => toggleSectionComplete(sectionId);
                
                // 在h2后面插入按钮
                h2.parentNode.insertBefore(btn, h2.nextSibling);
            });
        }

        // 初始化
        function init() {
            const courseId = getQueryParam('id') || '1';
            loadCourse(courseId);
            
            // 监听滚动事件
            window.addEventListener('scroll', () => {
                updateProgress();
                updateTocHighlight();
            });
            
            // 初始更新
            setTimeout(() => {
                updateProgress();
                updateTocHighlight();
            }, 500);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
